<style>
    .global-announcement {
        background: linear-gradient(90deg, #b81525 0%, #601dc2 100%);
        color: white;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        z-index: 990; /* 99999'dan 990'a düşürüldü ki yükleme ekranının altında uslu uslu dursun */
        position: relative;
        box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        font-family: 'Poppins', sans-serif;
    }
    .announcement-content {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        justify-content: center;
    }
    .announcement-content p {
        margin: 0;
        line-height: 1.4;
        letter-spacing: 0.5px;
    }
    .announcement-content strong {
        color: #fff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }
    .announcement-content i {
        font-size: 16px;
        color: #fff;
        animation: ring 2.5s infinite;
    }
    .close-announcement {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.7);
        cursor: pointer;
        font-size: 16px;
        padding: 5px;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .close-announcement:hover {
        color: white;
        transform: scale(1.2);
    }
    @keyframes ring {
        0%, 100% { transform: rotate(0deg); }
        10% { transform: rotate(15deg); }
        20% { transform: rotate(-15deg); }
        30% { transform: rotate(10deg); }
        40% { transform: rotate(-10deg); }
        50% { transform: rotate(0deg); }
    }
    @media (max-width: 768px) {
        .global-announcement { 
            flex-direction: column; 
            text-align: center; 
            padding: 12px 30px 12px 10px; 
            font-size: 11px;
        }
        .announcement-content { gap: 8px; }
        .close-announcement { 
            position: absolute; 
            right: 5px; 
            top: 50%; 
            transform: translateY(-50%); 
        }
        .close-announcement:hover { transform: translateY(-50%) scale(1.2); }
    }
</style>
