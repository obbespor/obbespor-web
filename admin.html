<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merkezi Maç Yönetimi | OBB E-SPORTS ADMIN</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        .admin-container { padding: 30px 5%; flex: 1; overflow-x: hidden; }
        .page-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .section-title { font-size: 26px; font-weight: 900; text-transform: uppercase; margin: 0; color: white; }
        .section-title span { color: var(--neon-mor); }

        /* ANA DÜZEN: SOL LİSTE / SAĞ EDİTÖR */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }

        /* SOL PANEL: LİSTELER */
        .sidebar-panel { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #222; }
        .sidebar-tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; background: #050505; color: var(--gri-yazi); transition: 0.3s; font-size: 13px; }
        .sidebar-tab.active { background: var(--neon-mor); color: white; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .list-item { background: #111; border: 1px dashed #333; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .list-item:hover, .list-item.selected { border-color: var(--neon-mor); background: rgba(96, 29, 194, 0.1); transform: translateX(5px); }
        .list-item-badge { font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
        .badge-zarf { background: #ff9800; color: #000; }
        .badge-fikstur { background: #00d2ff; color: #000; }
        .list-item-title { font-size: 14px; font-weight: bold; color: white; margin-bottom: 5px; }
        .list-item-desc { font-size: 12px; color: var(--gri-yazi); }

        /* SAĞ PANEL: EDİTÖR */
        .editor-panel { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; animation: fadeIn 0.4s ease; }
        
        /* YERLEŞTİRME HARİTASI (FİKSTÜR LOKASYONU) */
        .placement-map { background: rgba(96, 29, 194, 0.05); border: 1px dashed var(--neon-mor); padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .placement-title { color: var(--neon-mor); font-size: 14px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .placement-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .form-control { background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: bold; width: 100%; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--neon-mor); }

        /* SKOR VE HARİTA BAŞLIĞI */
        .match-score-header { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid #222;}
        .team-score-input { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .team-name-input { text-align: center; font-weight: 900; background: transparent; border: none; border-bottom: 1px dashed #555; color: white; font-size: 22px; text-transform: uppercase; outline: none; width: 200px; padding-bottom: 5px; transition: 0.3s; }
        .team-name-input:focus { border-bottom-color: var(--neon-mor); }
        .big-score-input { background: #000; border: 2px solid #444; color: white; width: 80px; height: 80px; text-align: center; font-size: 35px; font-weight: 900; border-radius: 15px; outline: none; transition: 0.3s; }
        .vs-text { text-align: center; font-size: 20px; font-weight: 900; color: var(--gri-yazi); display: flex; flex-direction: column; gap: 10px; }
        .map-input { background: #111; border: 1px solid #444; color: var(--neon-mor); padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; text-align: center; text-transform: uppercase; outline: none; width: 140px; }
        
        /* OYUNCU TABLOSU */
        .stats-grid-container { display: flex; flex-direction: column; gap: 20px; }
        .team-stats-box h4 { font-size: 14px; margin-bottom: 10px; text-transform: uppercase; border-left: 4px solid; padding-left: 10px; }
        .player-stat-row { display: grid; grid-template-columns: 80px 1.2fr 1.2fr 40px 40px 40px 50px 50px 50px; gap: 5px; margin-bottom: 8px; align-items: center; background: #0d0d0d; padding: 8px; border-radius: 8px; border: 1px solid #222; }
        .player-stat-row input, .player-stat-row select { background: #000; border: 1px solid #333; color: white; padding: 6px 4px; border-radius: 4px; font-size: 11px; text-align: center; width: 100%; outline: none; }
        .player-stat-row input.ign-input { text-align: left; font-weight: bold; padding-left: 8px; }
        .agent-input-group { display: flex; align-items: center; gap: 5px; }
        .agent-icon { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; border: 1px solid #444; background: #222; }
        .stat-label { font-size: 10px; color: var(--gri-yazi); text-align: center; font-weight: bold; }

        /* BUTONLAR */
        .action-buttons { display: flex; gap: 15px; margin-top: 30px; }
        .btn-save { flex: 2; background: linear-gradient(45deg, #1f8536, #28a745); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(40, 167, 69, 0.4); }
        .btn-reject-env { flex: 1; background: rgba(255, 75, 75, 0.1); border: 1px dashed var(--kirmizi-iptal); color: var(--kirmizi-iptal); padding: 15px; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-reject-env:hover { background: var(--kirmizi-iptal); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .sidebar-panel { height: 400px; }
            .player-stat-row { min-width: 600px; }
            .stats-grid-container { overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ana-siyah, #000); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor, #601dc2);">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>Güvenlik Kontrolü Yapılıyor...</h2>
    </div>

    <div id="header-alani"></div>

    <main class="admin-container">
        <div class="page-header-row">
            <h2 class="section-title">MERKEZİ MAÇ <span>YÖNETİMİ</span></h2>
        </div>

        <div class="dashboard-grid">
            <div class="sidebar-panel">
                <div class="sidebar-tabs">
                    <div class="sidebar-tab active" id="tabZarflar" onclick="switchSidebarTab('zarflar')">
                        <i class="fas fa-envelope"></i> GELEN ZARFLAR
                    </div>
                    <div class="sidebar-tab" id="tabFikstur" onclick="switchSidebarTab('fikstur')">
                        <i class="fas fa-sitemap"></i> FİKSTÜR
                    </div>
                </div>
                <div class="list-container" id="sidebarList">
                    </div>
            </div>

            <div class="editor-panel" id="editorPanel">
                
                <div class="placement-map">
                    <div class="placement-title"><i class="fas fa-map-marker-alt"></i> FİKSTÜR YERLEŞİM BİLGİSİ</div>
                    <div class="placement-grid">
                        <select id="tourneySelect" class="form-control">
                            <option value="OBB 1">OBB 1. TOPLULUK TURNUVASI</option>
                        </select>
                        <select id="stageSelect" class="form-control" onchange="updateDynamicSelectors()">
                            <option value="SON 64">SON 64</option>
                            <option value="SON 32">SON 32</option>
                            <option value="SON 16">SON 16 (Playoff)</option>
                            <option value="ÇEYREK FİNAL">ÇEYREK FİNAL</option>
                            <option value="YARI FİNAL">YARI FİNAL</option>
                            <option value="FİNAL">BÜYÜK FİNAL</option>
                        </select>
                        <select id="matchOrderSelect" class="form-control">
                            </select>
                        <select id="mapOrderSelect" class="form-control">
                            </select>
                    </div>
                </div>

                <div class="match-score-header">
                    <div class="team-score-input">
                        <span style="font-size:10px; color:var(--gri-yazi);">SOL TAKIM (MAVİ)</span>
                        <input type="text" id="teamAName" class="team-name-input" placeholder="TAKIM ADI" onkeyup="syncTeamName('A', this.value)" onblur="fetchProfilesIfMissing('A')">
                        <input type="number" id="scoreA" class="big-score-input" value="0" min="0">
                    </div>
                    <div class="vs-text">
                        VS
                        <input type="text" id="mapNameInput" class="map-input" placeholder="HARİTA">
                    </div>
                    <div class="team-score-input">
                        <span style="font-size:10px; color:var(--gri-yazi);">SAĞ TAKIM (KIRMIZI)</span>
                        <input type="text" id="teamBName" class="team-name-input" placeholder="TAKIM ADI" onkeyup="syncTeamName('B', this.value)" onblur="fetchProfilesIfMissing('B')">
                        <input type="number" id="scoreB" class="big-score-input" value="0" min="0">
                    </div>
                </div>

                <div class="stats-grid-container" style="overflow-x: auto;">
                    <div class="team-stats-box">
                        <h4 id="headerTeamA" style="color: #00d2ff; border-left-color: #00d2ff;">SOL TAKIM <span>(Mavi)</span></h4>
                        <div id="teamAPlayersInputs"></div>
                    </div>
                    <div class="team-stats-box">
                        <h4 id="headerTeamB" style="color: #ff4b4b; border-left-color: #ff4b4b;">SAĞ TAKIM <span>(Kırmızı)</span></h4>
                        <div id="teamBPlayersInputs"></div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-save" id="btnSaveToBracket" onclick="saveToBracket()">
                        <i class="fas fa-check-circle"></i> ONAYLA VE FİKSTÜRE İĞNELE
                    </button>
                    <button class="btn-reject-env" id="btnDeleteOrReject" onclick="rejectOrDelete()">
                        <i class="fas fa-trash"></i> ZARFI REDDET / SİL
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-core.js"></script>

    <script>
        let currentMode = 'zarflar'; // 'zarflar' veya 'fikstur'
        let activeRecordId = null; // Zarf ID'si veya Maç/Map ID'si
        let teamAId_memory = null;
        let teamBId_memory = null;

        async function initMasterManager() {
            await loadAdminComponents('nav-bracket');
            checkAdminAuthAndInit(() => {
                generateEmptyRows('teamAPlayersInputs');
                generateEmptyRows('teamBPlayersInputs');
                updateDynamicSelectors();
                loadSidebarData();
            });
        }

        // --- SOL PANEL LİSTE YÖNETİMİ ---
        function switchSidebarTab(mode) {
            currentMode = mode;
            document.getElementById('tabZarflar').classList.toggle('active', mode === 'zarflar');
            document.getElementById('tabFikstur').classList.toggle('active', mode === 'fikstur');
            document.getElementById('editorPanel').style.display = 'none'; // Ekranı temizle
            activeRecordId = null;
            loadSidebarData();
        }

        async function loadSidebarData() {
            const listContainer = document.getElementById('sidebarList');
            listContainer.innerHTML = '<div style="text-align:center; color:var(--gri-yazi); padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>';

            try {
                if (currentMode === 'zarflar') {
                    // Ajanlardan gelen zarfları çek (SİMÜLASYON: bekleyen_zarflar tablosu)
                    // Gerçek yapıda: .from('bekleyen_zarflar').select('*').eq('durum', 'pending')
                    
                    /* BURAYA GEÇİCİ DEMO VERİSİ KOYUYORUM, VERİTABANINI KURUNCA SİLİP APIYI BAĞLARSIN */
                    const mockZarflar = [
                        { id: 'z1', pc: 'PC-1', map: 'ABYSS', date: 'Az Önce', teamA: 'SANGAL', teamB: 'BBL' },
                        { id: 'z2', pc: 'PC-5', map: 'ASCENT', date: '5 dk önce', teamA: 'FUT', teamB: 'FIRE FLUX' }
                    ];

                    listContainer.innerHTML = '';
                    if(mockZarflar.length === 0) listContainer.innerHTML = '<p style="text-align:center; color:#555;">Bekleyen zarf yok.</p>';
                    
                    mockZarflar.forEach(z => {
                        listContainer.innerHTML += `
                            <div class="list-item" onclick="openEnvelope('${z.id}', '${z.teamA}', '${z.teamB}', '${z.map}')">
                                <span class="list-item-badge badge-zarf"><i class="fas fa-envelope"></i> YENİ ZARF (${z.pc})</span>
                                <div class="list-item-title">${z.teamA} vs ${z.teamB}</div>
                                <div class="list-item-desc">Harita: ${z.map} | Geliş: ${z.date}</div>
                            </div>
                        `;
                    });
                } else {
                    // Fikstürdeki kayıtlı maçları çek (bracket_matches & match_maps)
                    const { data: matches, error } = await window.supabaseClient.from('bracket_matches').select('id, round_name, round_order, match_maps(id, map_order, map_name, score_a, score_b)').order('created_at', { ascending: false }).limit(20);
                    
                    listContainer.innerHTML = '';
                    if (error || !matches || matches.length === 0) {
                        listContainer.innerHTML = '<p style="text-align:center; color:#555;">Kayıtlı maç bulunamadı.</p>';
                        return;
                    }

                    matches.forEach(m => {
                        (m.match_maps || []).forEach(map => {
                            listContainer.innerHTML += `
                                <div class="list-item" onclick="openExistingMap('${m.id}', '${map.id}')">
                                    <span class="list-item-badge badge-fikstur"><i class="fas fa-check"></i> FİKSTÜRDE</span>
                                    <div class="list-item-title">[${m.round_name}] ${m.round_order}. Maç</div>
                                    <div class="list-item-desc">Harita ${map.map_order}: ${map.map_name} (${map.score_a} - ${map.score_b})</div>
                                </div>
                            `;
                        });
                    });
                }
            } catch (err) {
                listContainer.innerHTML = `<div style="color:red; text-align:center;">Hata: ${err.message}</div>`;
            }
        }

        // --- SAĞ PANEL (EDİTÖR) YÖNETİMİ ---

        function updateDynamicSelectors() {
            const stage = document.getElementById('stageSelect').value;
            const matchOrder = document.getElementById('matchOrderSelect');
            const mapOrder = document.getElementById('mapOrderSelect');
            
            matchOrder.innerHTML = '';
            let maxMatch = 1;
            if(stage === 'SON 64') maxMatch = 32;
            if(stage === 'SON 32') maxMatch = 16;
            if(stage === 'SON 16') maxMatch = 8;
            if(stage === 'ÇEYREK FİNAL') maxMatch = 4;
            if(stage === 'YARI FİNAL') maxMatch = 2;

            for(let i=1; i<=maxMatch; i++) matchOrder.innerHTML += `<option value="${i}">${i}. MAÇ</option>`;

            mapOrder.innerHTML = '';
            let maxMap = 1; // BO1 varsayılan
            if (['SON 16', 'ÇEYREK FİNAL', 'YARI FİNAL'].includes(stage)) maxMap = 3; // BO3
            if (stage === 'FİNAL') maxMap = 5; // BO5

            for(let i=1; i<=maxMap; i++) mapOrder.innerHTML += `<option value="${i}">${i}. HARİTA (Map ${i})</option>`;
        }

        // ZARF AÇMA (Ajan programından gelen veriyi ekrana basar)
        function openEnvelope(envId, tA, tB, mapName) {
            activeRecordId = envId;
            document.getElementById('editorPanel').style.display = 'block';
            
            // UI Güncelle
            document.getElementById('btnSaveToBracket').innerHTML = '<i class="fas fa-thumbtack"></i> ONAYLA VE FİKSTÜRE İĞNELE';
            document.getElementById('btnDeleteOrReject').innerHTML = '<i class="fas fa-times"></i> ZARFI REDDET / ÇÖPE AT';

            // Zarf Verilerini Form'a Doldur (Simülasyon)
            document.getElementById('teamAName').value = tA;
            document.getElementById('teamBName').value = tB;
            document.getElementById('mapNameInput').value = mapName;
            
            syncTeamName('A', tA); syncTeamName('B', tB);

            // Gerçekte burada JSON verisini parse edip renderPlayerRows fonksiyonuna göndereceğiz.
            // Boş satırları oluşturup profilleri aramayı tetikleyelim.
            generateEmptyRows('teamAPlayersInputs');
            generateEmptyRows('teamBPlayersInputs');
            fetchProfilesIfMissing('A');
            fetchProfilesIfMissing('B');
        }

        // KAYITLI MAÇI AÇMA
        async function openExistingMap(matchId, mapId) {
            activeRecordId = { matchId, mapId };
            document.getElementById('editorPanel').style.display = 'block';
            
            document.getElementById('btnSaveToBracket').innerHTML = '<i class="fas fa-sync-alt"></i> GÜNCELLE';
            document.getElementById('btnDeleteOrReject').innerHTML = '<i class="fas fa-trash"></i> BU HARİTAYI SİL';

            // Buraya Supabase'den match_maps ve stats verilerini çekip formlara doldurma kodu gelecek.
            // (Eski sistemdeki loadMapStats fonksiyonunun mantığı birebir buraya taşınacak).
            showNotification("Fikstür verisi yükleniyor...", "info");
        }

        // --- YARDIMCI FONKSİYONLAR (ÖNCEKİ KODDAN MİRAS) ---
        function syncTeamName(team, name) {
            const header = document.getElementById(team === 'A' ? 'headerTeamA' : 'headerTeamB');
            const color = team === 'A' ? '#00d2ff' : '#ff4b4b';
            header.innerHTML = `${name.toUpperCase() || 'TAKIM'} <span style="font-size:12px; color:${color}; opacity:0.7;">${team === 'A' ? '(Mavi)' : '(Kırmızı)'}</span>`;
        }

        function generateEmptyRows(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="player-stat-row" style="background: transparent; border: none; padding-bottom: 0;">
                    <span class="stat-label">AJAN</span><span class="stat-label" style="text-align:left;">OYUN İÇİ NİCK</span><span class="stat-label">PROFİL EŞLEŞTİR</span>
                    <span class="stat-label">K</span><span class="stat-label">D</span><span class="stat-label">A</span>
                    <span class="stat-label" style="color:var(--neon-mor);">ACS</span><span class="stat-label" style="color:var(--neon-mor);">ADR</span><span class="stat-label" style="color:var(--neon-mor);">HS%</span>
                </div>
            `;
            for(let i=0; i<5; i++) {
                container.innerHTML += `
                    <div class="player-stat-row">
                        <div class="agent-input-group">
                            <img src="img/agents/unknown.png" class="agent-icon" id="${containerId}_icon_${i}">
                            <input type="text" class="agent-name-input" placeholder="Ajan" onkeyup="updateAgentIcon(this, '${containerId}_icon_${i}')">
                        </div>
                        <input type="text" class="ign-input" placeholder="IGN">
                        <select class="user-matcher-select"><option value="">-- Takım Yazın --</option></select>
                        <input type="number" class="k-input" value="0"><input type="number" class="d-input" value="0"><input type="number" class="a-input" value="0">
                        <input type="number" class="acs-input" value="0"><input type="number" class="adr-input" value="0"><input type="number" class="hs-input" value="0">
                    </div>`;
            }
        }

        function updateAgentIcon(inputEl, iconId) {
            let val = inputEl.value.replace(/[^a-zA-Z0-9]/g, '');
            const icon = document.getElementById(iconId);
            if(val.length >= 2) {
                let formatted = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
                if (formatted === 'Kayo' || formatted === 'KAYO') formatted = 'Kayo'; 
                icon.src = `img/imgagents/${formatted}.webp`;
            } else { icon.src = "img/imgagents/unknown.png"; }
        }

        async function fetchProfilesIfMissing(teamStr) {
            const teamName = document.getElementById(teamStr === 'A' ? 'teamAName' : 'teamBName').value;
            if(!teamName || teamName.length < 2) return;
            
            const containerId = teamStr === 'A' ? 'teamAPlayersInputs' : 'teamBPlayersInputs';
            const selects = document.getElementById(containerId).querySelectorAll('.user-matcher-select');
            
            try {
                const { data: teamData } = await window.supabaseClient.from('tournament_applications').select('id').ilike('team_name', `%${teamName.trim()}%`).single();
                if(!teamData) throw new Error("Bulunamadı");
                
                if(teamStr === 'A') teamAId_memory = teamData.id;
                else teamBId_memory = teamData.id;

                const { data: players } = await window.supabaseClient.from('application_members').select(`user_id, profiles (username, ign)`).eq('application_id', teamData.id).eq('status', 'accepted');
                
                let optionsHtml = '<option value="">-- Manuel Seç --</option>';
                if(players) {
                    players.forEach(p => {
                        const disp = p.profiles?.ign ? `${p.profiles.ign} (${p.profiles.username})` : p.profiles.username;
                        optionsHtml += `<option value="${p.user_id}" data-ign="${p.profiles?.ign||''}">${disp}</option>`;
                    });
                }
                
                selects.forEach(sel => { sel.innerHTML = optionsHtml; });
                showNotification(`${teamName} kadrosu çekildi.`, "success");
            } catch (e) {
                selects.forEach(sel => { sel.innerHTML = '<option value="">Bulunamadı</option>'; });
            }
        }

        // --- VERİTABANINA YAZMA (İĞNELEME / GÜNCELLEME) ---
        async function saveToBracket() {
            if(!activeRecordId) return;

            const tName = document.getElementById('tourneySelect').value;
            const sName = document.getElementById('stageSelect').value;
            const matchO = document.getElementById('matchOrderSelect').value;
            const mapO = document.getElementById('mapOrderSelect').value;

            if(currentMode === 'zarflar') {
                // YENİ EKLE (ZARFI FİKSTÜRE BAĞLA)
                showNotification(`${sName} - ${matchO}. Maç - ${mapO}. Harita yuvasına işleniyor...`, "info");
                // TODO: 1. bracket_matches tablosuna tName, sName, matchO ile Insert/Update yap.
                // 2. match_maps tablosuna mapO ile ekle.
                // 3. match_player_stats tablosuna oyuncuları ekle.
                // 4. bekleyen_zarflar tablosunda bu zarfın durumunu 'processed' yap.
                
                setTimeout(() => {
                    showNotification("Başarıyla Fikstüre İğnelendi!", "success");
                    switchSidebarTab('zarflar'); // Listeyi yenile
                }, 1000);
            } else {
                // MEVCUT MAÇI GÜNCELLE
                showNotification("Harita ve oyuncu verileri güncelleniyor...", "info");
                // TODO: Veritabanında sadece update at.
            }
        }

        async function rejectOrDelete() {
            if(!activeRecordId) return;
            if(confirm("Bu kaydı kalıcı olarak silmek/reddetmek istediğinize emin misiniz?")) {
                if(currentMode === 'zarflar') {
                    // bekleyen_zarflar'dan sil
                    showNotification("Zarf reddedildi ve çöpe atıldı.", "success");
                } else {
                    // match_maps'ten sil
                    showNotification("Harita kaydı silindi.", "success");
                }
                switchSidebarTab(currentMode); // Listeyi yenile
            }
        }

        document.addEventListener('DOMContentLoaded', initMasterManager);
    </script>
</body>
</html>
