<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fikstür ve Puan Durumu | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        :root {
            --grup-a-renk: #008eb4; 
            --grup-b-renk: #b43e3e; 
            --playoff-renk: #9d4edd;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            max-width: 100vw;
            overflow-x: hidden; 
            margin: 0; padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, rgba(96, 29, 194, 0.08) 0%, transparent 60%);
        }

        .fixture-container { 
            width: 100%; 
            max-width: 1300px; 
            margin: 120px auto 50px auto; 
            padding: 0 15px; 
            flex: 1; 
            animation: fadeIn 0.5s ease;
        }
        
        .page-title { text-align: center; color: white; font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .page-title span { color: var(--neon-mor); }
        
        .tourney-subtitle { text-align: center; color: #888; font-size: 16px; font-weight: 300; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; margin-bottom: 40px; }

        .groups-wrapper { display: flex; gap: 30px; margin-bottom: 60px; }
        .group-col { flex: 1; display: flex; flex-direction: column; gap: 30px; min-width: 0; }

        .standings-card { background: rgba(15,15,15,0.8); border: 1px solid #222; border-radius: 12px; overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .group-a .standings-card { border-top: 3px solid var(--grup-a-renk); }
        .group-b .standings-card { border-top: 3px solid var(--grup-b-renk); }
        
        .card-header { padding: 15px; background: rgba(0,0,0,0.6); text-align: center; font-size: 18px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; }
        .group-a .card-header { color: var(--grup-a-renk); }
        .group-b .card-header { color: var(--grup-b-renk); }

        table { width: 100%; border-collapse: collapse; text-align: center; color: white; font-size: 13px; }
        th { padding: 12px 10px; color: var(--gri-yazi); font-weight: bold; background: rgba(255,255,255,0.03); text-transform: uppercase; font-size: 11px; border-bottom: 1px solid #333; white-space: nowrap;}
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-weight: 500; white-space: nowrap;}
        tr:last-child td { border-bottom: none; }
        
        tr.qualified { background: rgba(255, 255, 255, 0.03); }
        tr.qualified td:first-child { border-left: 3px solid #fff; }
        
        .team-cell { display: flex; align-items: center; gap: 10px; text-align: left; padding-left: 15px !important; font-weight: bold; font-size: 13px;}
        .team-cell img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid #444; flex-shrink: 0;}
        .pts-col { font-weight: 900; color: white; font-size: 15px; }

        .matches-list { display: flex; flex-direction: column; gap: 15px; }
        .match-card { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; transition: 0.2s; position: relative; z-index: 2;}
        
        .match-card.clickable-card { cursor: pointer; }
        .match-card.clickable-card:hover { border-color: #666; background: #0d0d0d;}
        .match-card.clickable-card .m-score-box { border-color: var(--neon-mor); background: rgba(157, 78, 221, 0.1); transition: 0.3s; }
        .match-card.clickable-card:hover .m-score-box { transform: scale(1.05); box-shadow: 0 0 15px rgba(157, 78, 221, 0.2); }
        .clickable-icon { position: absolute; bottom: 8px; right: 8px; color: var(--neon-mor); font-size: 10px; opacity: 0.4; transition: 0.3s; }
        .match-card.clickable-card:hover .clickable-icon { opacity: 1; }

        .match-date { text-align: center; font-size: 10px; color: var(--gri-yazi); font-weight: bold; margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 8px; text-transform: uppercase;}
        
        .match-teams { display: flex; justify-content: space-between; align-items: center; width: 100%;}
        .m-team { display: flex; align-items: center; gap: 10px; flex: 1; font-size: 13px; font-weight: bold; color: #ddd; min-width: 0;}
        .m-team.right { flex-direction: row-reverse; text-align: right; }
        .m-team span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;}
        .m-team img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #333; flex-shrink: 0;}
        
        .m-score-box { background: #111; border: 1px solid #444; padding: 4px 12px; border-radius: 6px; font-size: 16px; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0 10px; flex-shrink: 0;}
        .m-score-box span { min-width: 15px; text-align: center; }
        .m-score-box .winner { color: #fff; }
        .m-score-box .loser { color: #666; }
        .m-vs { font-size: 12px; color: #444; font-weight: normal;}
        
        .match-pending .m-score-box { background: transparent; border: none; font-size: 12px; color: #666; }
        .match-pending .m-team { color: #888; }

        .empty-bracket-card { background: #050505; border: 1px dashed #333; border-radius: 8px; padding: 25px; text-align: center; color: #444; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 2;}

        .playoff-wrapper { margin-top: 60px; padding-top: 40px; border-top: 1px solid #222; }
        .playoff-title { text-align: center; color: white; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .bracket-scroll-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 20px 0; max-width: 100vw; }
        .bracket-scroll-wrapper::-webkit-scrollbar { height: 6px; }
        .bracket-scroll-wrapper::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
        .bracket-scroll-wrapper::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .tournament-bracket { display: flex; flex-direction: row; align-items: center; gap: 60px; width: max-content; margin: 0 auto; padding: 0 20px; }
        .bracket-round { display: flex; flex-direction: column; gap: 40px; position: relative; }
        .round-semis .bracket-match { width: 320px; position: relative; }
        .round-final .bracket-match { width: 350px; position: relative; }

        .round-semis .bracket-match::after { content: ""; position: absolute; right: -30px; top: 50%; width: 30px; border-top: 2px solid #333; z-index: 1; }
        .round-semis .bracket-match:first-child::before { content: ""; position: absolute; right: -30px; top: 50%; height: calc(50% + 20px); border-right: 2px solid #333; z-index: 1; }
        .round-semis .bracket-match:last-child::before { content: ""; position: absolute; right: -30px; bottom: 50%; height: calc(50% + 20px); border-right: 2px solid #333; z-index: 1; }
        .round-final .bracket-match::before { content: ""; position: absolute; left: -30px; top: 50%; width: 30px; border-top: 2px solid #333; z-index: 1; }

        .bracket-round-title { text-align: center; color: #666; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .round-final .match-card { border-color: var(--playoff-renk); background: #0a0a0a; box-shadow: 0 0 15px rgba(157, 78, 221, 0.1); padding: 20px;}
        .round-final .match-card.clickable-card:hover { transform: scale(1.03); border-color: #fff; box-shadow: 0 0 25px rgba(157, 78, 221, 0.3);}
        .round-final .m-score-box { background: rgba(157, 78, 221, 0.1); border-color: rgba(157, 78, 221, 0.3); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 99999;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; padding: 10px; box-sizing: border-box;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        
        .modal-content {
            background: #0a0a0a; border: 1px solid #333; width: 100%; max-width: 1000px;
            height: auto; max-height: 95vh; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; overflow: hidden; animation: modalSlideIn 0.3s ease forwards;
        }
        @keyframes modalSlideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header { padding: 15px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: center; align-items: center; position: relative; }
        .modal-header .series-score-wrapper { text-align: center; color: white; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .modal-header .series-title { font-size: 11px; color: var(--gri-yazi); margin-bottom: 5px;}
        .modal-header .series-score { font-size: 24px; }
        
        .modal-close-btn { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #555; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .modal-close-btn:hover { color: #fff; transform: scale(1.1); }

        .map-tabs { background: #0d0d0d; border-bottom: 1px solid #222; display: flex; padding: 10px; gap: 8px; overflow-x: auto; justify-content: center; -webkit-overflow-scrolling: touch;}
        .map-tab-btn { background: #111; border: 1px solid #333; color: var(--gri-yazi); padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; white-space: nowrap; flex-shrink: 0;}
        .map-tab-btn:hover { border-color: #555; color: #fff; }
        .map-tab-btn.active { background: var(--neon-mor); border-color: var(--neon-mor); color: white; box-shadow: 0 0 10px rgba(157, 78, 221, 0.3); }
        .map-tab-btn.disabled { opacity: 0.3; cursor: default; border-style: dashed; }
        
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch;}
        
        .map-score-header { text-align: center; color: #fff; font-size: 16px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; width: 100%;}
        .map-score-header span { color: var(--gri-yazi); }
        .map-score-header .score-a { color: var(--grup-a-renk); }
        .map-score-header .score-b { color: var(--grup-b-renk); }

        .teams-scoreboard-container { display: flex; gap: 20px; }
        .team-a-col, .team-b-col { flex: 1; min-width: 0; background: rgba(0, 0, 0, 0.4); border: 1px solid #222; border-radius: 12px; padding: 15px; overflow-x: auto;}

        .team-title-row { font-size: 14px; font-weight: 900; text-transform: uppercase; padding: 5px 0 15px; border-bottom: 1px dashed #333; margin-bottom: 10px; text-align: center;}
        .team-title-row.team-a { color: var(--grup-a-renk); border-bottom-color: rgba(0, 142, 180, 0.3);}
        .team-title-row.team-b { color: var(--grup-b-renk); border-bottom-color: rgba(180, 62, 62, 0.3);}

        .scoreboard-table { width: 100%; border-collapse: collapse; text-align: right; color: white; font-size: 12px; font-weight: 500;}
        .scoreboard-table th { padding: 8px 5px; color: var(--gri-yazi); font-weight: bold; font-size: 10px; background: transparent; border-bottom: none; white-space: nowrap;}
        .scoreboard-table td { padding: 8px 5px; border-bottom: 1px solid #1a1a1a; white-space: nowrap;}
        .scoreboard-table tr:last-child td { border-bottom: none; }
        
        .scoreboard-table .td-agent { width: 30px; text-align: center; }
        .scoreboard-table .td-name { text-align: left; padding-left: 0; font-weight: 700; color: #fff; max-width: 120px; overflow: hidden; text-overflow: ellipsis;}
        .scoreboard-table th.td-name { color: var(--gri-yazi); font-weight: bold; }
        
        .scoreboard-table .acs-cell { width: 40px; font-weight: 900; color: #fff;}
        .scoreboard-table .k-cell { width: 30px; color: #00ff88; font-weight: 900;}
        .scoreboard-table .d-cell { width: 30px; color: #b43e3e; opacity: 0.8; font-weight: 900;}
        .scoreboard-table .a-cell { width: 30px; color: var(--gri-yazi); font-weight: 900;}

        .agent-score-icon { width: 22px; height: 22px; border-radius: 4px; object-fit: cover; border: 1px solid #333; background: #222; vertical-align: middle;}

        @media (max-width: 768px) {
            .fixture-container { margin-top: 140px; padding: 0 10px; } /* Header'ın ezmesini engeller */
            .page-title { font-size: 28px; }
            .groups-wrapper { flex-direction: column; gap: 40px; }
            
            .match-teams { flex-direction: row; justify-content: space-between; }
            .m-team { flex-direction: column; text-align: center; gap: 4px; }
            .m-team.right { flex-direction: column; }
            .m-team span { max-width: 80px; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;}
            .m-team img { width: 26px; height: 26px; }
            .m-score-box { padding: 4px 8px; font-size: 14px; margin: 0 5px; }
            
            .teams-scoreboard-container { flex-direction: column; gap: 15px;}
            .team-a-col, .team-b-col { padding: 10px; }
            .modal-content { padding: 0; }
            .modal-body { padding: 10px; }
            .scoreboard-table th, .scoreboard-table td { padding: 6px 3px; font-size: 11px;}
            .scoreboard-table .td-name { max-width: 80px; }
            .modal-header .series-score { font-size: 20px; }
            
            .map-tabs { justify-content: flex-start; } 
        }
        

        #loadingScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: #050505; display:flex; justify-content:center; align-items:center; z-index: 9999; color: var(--neon-mor); flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 15px;"></i>
        <h2>Fikstür Yükleniyor...</h2>
    </div>

    <div id="header-alani"></div>

    <main class="fixture-container">
        <h1 class="page-title">TURNUVA <span>FİKSTÜRÜ</span></h1>
        <p class="tourney-subtitle" id="tourneySubtitle">Yükleniyor...</p>

        <div class="groups-wrapper">
            <div class="group-col group-a">
                <div class="standings-card">
                    <div class="card-header">A GRUBU</div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding-left:20px;">Takım</th>
                                    <th>O</th><th>G</th><th>M</th><th>AV</th><th>P</th>
                                </tr>
                            </thead>
                            <tbody id="groupA-table"></tbody>
                        </table>
                    </div>
                </div>
                <div class="matches-list" id="groupA-matches">
                    <h3 style="color:white; font-size:14px; margin: 10px 0 5px; border-left: 3px solid var(--grup-a-renk); padding-left: 10px; text-transform: uppercase;">A Grubu Eşleşmeleri</h3>
                </div>
            </div>

            <div class="group-col group-b">
                <div class="standings-card">
                    <div class="card-header">B GRUBU</div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="text-align:left; padding-left:20px;">Takım</th>
                                    <th>O</th><th>G</th><th>M</th><th>AV</th><th>P</th>
                                </tr>
                            </thead>
                            <tbody id="groupB-table"></tbody>
                        </table>
                    </div>
                </div>
                <div class="matches-list" id="groupB-matches">
                    <h3 style="color:white; font-size:14px; margin: 10px 0 5px; border-left: 3px solid var(--grup-b-renk); padding-left: 10px; text-transform: uppercase;">B Grubu Eşleşmeleri</h3>
                </div>
            </div>
        </div>

        <div class="playoff-wrapper">
            <h2 class="playoff-title">PLAYOFF AŞAMASI</h2>
            <div class="bracket-scroll-wrapper">
                <div class="tournament-bracket">
                    <div class="bracket-round round-semis">
                        <div class="bracket-round-title">Yarı Final</div>
                        <div id="semi-finals-list" style="display: flex; flex-direction: column; gap: 40px;"></div>
                    </div>
                    <div class="bracket-round round-final">
                        <div class="bracket-round-title">Büyük Final</div>
                        <div id="final-match"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="scoreboardModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="series-score-wrapper" id="modalSeriesHeader"></div>
                <button class="modal-close-btn" id="modalCloseBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="map-tabs" id="modalMapTabs"></div>
            <div class="modal-body" id="modalBody">
                <div class="scoreboard-table-area" id="modalStatsTableContainer"></div>
            </div>
        </div>
    </div>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        let activeTournamentId = null;
        let globalTeamMap = {}; 
        let globalCurrentDetailedMatch = null; 

        async function initFixture() {
            try {
                const response = await fetch("components/footer.html");
                if (response.ok) document.getElementById("footer-alani").innerHTML = await response.text();
            } catch(e) {}

            if (typeof checkUserStatus === "function") await checkUserStatus();

            try {
                const { data: tourney } = await window.supabaseClient.from('tournaments')
                    .select('id, name').in('status', ['upcoming', 'ongoing']).order('created_at', { ascending: false }).limit(1).maybeSingle();
                
                if (!tourney) {
                    document.querySelector('.fixture-container').innerHTML = '<h3 style="color:#555; text-align:center; margin-top:50px;">Şu an aktif bir turnuva bulunmuyor.</h3>';
                    return;
                }
                activeTournamentId = tourney.id;
                
                document.getElementById('tourneySubtitle').innerText = tourney.name;

                const { data: allTeams } = await window.supabaseClient.from('teams').select('id, name, logo_url');
                if (allTeams) {
                    allTeams.forEach(t => globalTeamMap[t.id] = t);
                }

                await fetchDataAndCalculate();

            } catch (err) {
                console.error("Fikstür yükleme hatası:", err);
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }

            document.getElementById('modalCloseBtn').addEventListener('click', closeScoreboardModal);
            document.getElementById('scoreboardModal').addEventListener('click', function(e) {
                if (e.target === this) closeScoreboardModal(); 
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.getElementById('scoreboardModal').classList.contains('open')) closeScoreboardModal();
            });
        }

        async function fetchDataAndCalculate() {
            const { data: applications } = await window.supabaseClient.from('tournament_applications')
                .select('group_name, team_id')
                .eq('tournament_id', activeTournamentId)
                .eq('status', 'approved');

            const { data: matches, error: matchesError } = await window.supabaseClient.from('bracket_matches')
                .select('id, round_name, match_date, status, match_format, team_a_id, team_b_id, series_score_a, series_score_b')
                .eq('tournament_id', activeTournamentId)
                .order('created_at', { ascending: true });

            if (matchesError) {
                console.error("Maç çekme hatası:", matchesError);
                return;
            }

            // DİKKAT: SERİ SKORUNU OTOMATİK BULMAK İÇİN TÜM HARİTALARI ÇEKİYORUZ
            const { data: allMaps } = await window.supabaseClient.from('match_maps').select('match_id, score_a, score_b');

            let standings = { 'A': {}, 'B': {} };
            
            if (applications) {
                applications.forEach(app => {
                    let grp = app.group_name; 
                    if (grp) grp = grp.toUpperCase();
                    
                    const tId = app.team_id;
                    const teamInfo = globalTeamMap[tId] || {};
                    
                    if (grp === 'A' || grp === 'B') {
                        standings[grp][tId] = {
                            id: tId, name: teamInfo.name || 'Bilinmiyor', logo: teamInfo.logo_url || 'img/unknown.webp',
                            played: 0, wins: 0, losses: 0, average: 0, points: 0
                        };
                    }
                });
            }

            if (matches) {
                matches.forEach(m => {
                    let grp = getMatchGroup(m.round_name);
                    if (grp && (grp === 'A' || grp === 'B')) {
                        if (m.team_a_id && !standings[grp][m.team_a_id]) {
                            const teamAInfo = globalTeamMap[m.team_a_id] || {};
                            standings[grp][m.team_a_id] = { id: m.team_a_id, name: teamAInfo.name || 'Bilinmiyor', logo: teamAInfo.logo_url || 'img/unknown.webp', played: 0, wins: 0, losses: 0, average: 0, points: 0 };
                        }
                        if (m.team_b_id && !standings[grp][m.team_b_id]) {
                            const teamBInfo = globalTeamMap[m.team_b_id] || {};
                            standings[grp][m.team_b_id] = { id: m.team_b_id, name: teamBInfo.name || 'Bilinmiyor', logo: teamBInfo.logo_url || 'img/unknown.webp', played: 0, wins: 0, losses: 0, average: 0, points: 0 };
                        }
                    }

                    // --- OYNANAN HARİTALARA GÖRE 1-0, 2-1 GİBİ SERİ SKORLARINI HESAPLAMA MANTIĞI ---
                    let winsA = 0;
                    let winsB = 0;
                    const mMaps = allMaps ? allMaps.filter(map => map.match_id === m.id) : [];
                    
                    if (mMaps.length > 0) {
                        mMaps.forEach(map => {
                            if (map.score_a > map.score_b) winsA++;
                            else if (map.score_b > map.score_a) winsB++;
                        });
                        m.display_score_a = winsA;
                        m.display_score_b = winsB;
                    } else {
                        // Eğer maç oynanmış ama harita detayı girilmemişse, 13-5 gibi skorları 1-0'a çevir
                        m.display_score_a = m.series_score_a > 5 ? 1 : (m.series_score_a || 0);
                        m.display_score_b = m.series_score_b > 5 ? 1 : (m.series_score_b || 0);
                    }
                });
            }

            if (matches) {
                matches.forEach(m => {
                    const grp = getMatchGroup(m.round_name);
                    if ((grp === 'A' || grp === 'B') && m.status === 'completed') {
                        const tA = standings[grp][m.team_a_id];
                        const tB = standings[grp][m.team_b_id];
                        if (tA && tB) {
                            tA.played++; tB.played++;
                            
                            // Averaj hesabı için ROUND skorları (Örn 13 - 5) kullanılmaya devam eder
                            tA.average += (m.series_score_a - m.series_score_b);
                            tB.average += (m.series_score_b - m.series_score_a);
                            
                            // Puan tablosu galibiyeti ve puanı için SERİ skorları (1-0) kullanılır
                            if (m.display_score_a > m.display_score_b) {
                                tA.wins++; tA.points += 3; tB.losses++;
                            } else if (m.display_score_b > m.display_score_a) {
                                tB.wins++; tB.points += 3; tA.losses++;
                            }
                        }
                    }
                });
            }

            renderTable('A', standings['A']);
            renderTable('B', standings['B']);

            const groupAMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'A') : [];
            const groupBMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'B') : [];
            const semiMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'SEMI') : [];
            const finalMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'FINAL') : [];

            renderMatchesWithPadding('groupA-matches', groupAMatches, 3, false);
            renderMatchesWithPadding('groupB-matches', groupBMatches, 3, false);
            renderMatchesWithPadding('semi-finals-list', semiMatches, 2, true);
            renderMatchesWithPadding('final-match', finalMatches, 1, true);
        }

        function getMatchGroup(rawName) {
            if (!rawName) return null;
            const name = rawName.toUpperCase();
            if (name.includes('A GRUBU') || name.includes('GRUP A')) return 'A';
            if (name.includes('B GRUBU') || name.includes('GRUP B')) return 'B';
            if (name.includes('YARI') || name.includes('SEMI')) return 'SEMI';
            if (name.includes('FİNAL') || name.includes('FINAL')) return 'FINAL';
            return null;
        }

        function renderTable(groupName, teamsObj) {
            const tbody = document.getElementById(`group${groupName}-table`);
            if(!tbody) return;

            const teamsArray = Object.values(teamsObj);
            teamsArray.sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                return b.average - a.average; 
            });

            let html = '';
            if (teamsArray.length === 0) {
                html = '<tr><td colspan="6" style="color:#555;">Bu grupta takım yok.</td></tr>';
            } else {
                teamsArray.forEach((team, index) => {
                    const rowClass = index < 2 ? 'qualified' : '';
                    const avgDisplay = team.average > 0 ? `+${team.average}` : team.average;
                    
                    html += `
                        <tr class="${rowClass}">
                            <td class="team-cell">
                                <img src="${team.logo}" onerror="this.src='img/unknown.webp'"> 
                                ${team.name}
                            </td>
                            <td>${team.played}</td>
                            <td>${team.wins}</td>
                            <td>${team.losses}</td>
                            <td>${avgDisplay}</td>
                            <td class="pts-col">${team.points}</td>
                        </tr>
                    `;
                });
            }
            tbody.innerHTML = html;
        }

        function renderMatchesWithPadding(containerId, matchArray, maxSlots, isBracket) {
            const container = document.getElementById(containerId);
            if(!container) return;

            const titleEl = container.querySelector('h3');
            let html = titleEl ? titleEl.outerHTML : '';

            for (let i = 0; i < maxSlots; i++) {
                if (matchArray[i]) {
                    html += `<div class="${isBracket ? 'bracket-match' : ''}">${createMatchCardHtml(matchArray[i])}</div>`;
                } else {
                    html += `<div class="${isBracket ? 'bracket-match' : ''}"><div class="empty-bracket-card">Eşleşme Bekleniyor</div></div>`;
                }
            }

            container.innerHTML = html;
        }

        function createMatchCardHtml(m) {
            let dateStr = '';
            if (m.match_date) {
                const parsedDate = new Date(m.match_date);
                if (!isNaN(parsedDate.getTime())) {
                    dateStr = parsedDate.toLocaleString('tr-TR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
                } else {
                    dateStr = m.match_date; 
                }
            }
            
            const teamAInfo = globalTeamMap[m.team_a_id] || {};
            const teamBInfo = globalTeamMap[m.team_b_id] || {};

            const logoA = teamAInfo.logo_url || 'img/unknown.webp';
            const nameA = teamAInfo.name || 'Belirlenmedi';
            const logoB = teamBInfo.logo_url || 'img/unknown.webp';
            const nameB = teamBInfo.name || 'Belirlenmedi';

            let scoreArea = '';
            let statusClass = ''; 
            let clickAction = '';
            let clickIcon = '';

            if (m.status === 'completed') {
                // Ekranda 13-5 yerine display_score (1-0) yansıtılıyor
                const classA = m.display_score_a > m.display_score_b ? 'winner' : 'loser';
                const classB = m.display_score_b > m.display_score_a ? 'winner' : 'loser';
                scoreArea = `
                    <div class="m-score-box">
                        <span class="${classA}">${m.display_score_a}</span>
                        <span class="m-vs">-</span>
                        <span class="${classB}">${m.display_score_b}</span>
                    </div>
                `;
                statusClass = 'clickable-card';
                clickAction = `onclick="openScoreboardModal('${m.id}')"`;
                clickIcon = `<i class="fas fa-search-plus clickable-icon"></i>`;
            } else {
                statusClass = 'match-pending';
                scoreArea = `<div class="m-score-box">VS</div>`;
            }

            const dateHtml = dateStr ? `<div class="match-date">${dateStr}</div>` : '';

            return `
                <div class="match-card ${statusClass}" ${clickAction}>
                    ${clickIcon}
                    ${dateHtml}
                    <div class="match-teams">
                        <div class="m-team">
                            <img src="${logoA}" onerror="this.src='img/unknown.webp'">
                            <span>${nameA}</span>
                        </div>
                        
                        ${scoreArea}
                        
                        <div class="m-team right">
                            <img src="${logoB}" onerror="this.src='img/unknown.webp'">
                            <span>${nameB}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- SKORBORD MODAL MANTIĞI ---

        async function openScoreboardModal(matchId) {
            const modal = document.getElementById('scoreboardModal');
            const mapTabs = document.getElementById('modalMapTabs');
            const statsTableArea = document.getElementById('modalStatsTableContainer');
            
            modal.classList.add('open');
            mapTabs.innerHTML = '<div style="color:#555; padding: 5px 15px; font-size:11px; text-align:center; width:100%;"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>';
            statsTableArea.innerHTML = ''; 

            try {
                const { data: rawMatch } = await window.supabaseClient.from('bracket_matches').select('id, round_name, match_format, team_a_id, team_b_id, series_score_a, series_score_b').eq('id', matchId).single();
                if(!rawMatch) throw new Error("Maç verisi bulunamadı.");

                let correctFormat = rawMatch.match_format;
                if (rawMatch.round_name === 'Yarı Final' || rawMatch.round_name === 'YARI FİNAL') {
                    correctFormat = 'BO3';
                } else if (rawMatch.round_name === 'Final' || rawMatch.round_name === 'BÜYÜK FİNAL') {
                    correctFormat = 'BO5';
                }

                const { data: maps } = await window.supabaseClient.from('match_maps').select('id, map_order, map_name, score_a, score_b').eq('match_id', matchId).order('map_order', { ascending: true });
                
                // Modal içinde de seri skorunu 1-0 gösterebilmek için ufak hesaplama
                let winsA = 0; let winsB = 0;
                if(maps && maps.length > 0) {
                    maps.forEach(map => {
                        if (map.score_a > map.score_b) winsA++;
                        else if (map.score_b > map.score_a) winsB++;
                    });
                } else {
                    winsA = rawMatch.series_score_a > 5 ? 1 : (rawMatch.series_score_a || 0);
                    winsB = rawMatch.series_score_b > 5 ? 1 : (rawMatch.series_score_b || 0);
                }
                rawMatch.display_score_a = winsA;
                rawMatch.display_score_b = winsB;

                globalCurrentDetailedMatch = rawMatch;
                
                renderModalHeader(globalCurrentDetailedMatch, correctFormat);
                renderModalMapTabs(correctFormat, maps);

                if (maps && maps.length > 0) {
                    const firstMapBtn = mapTabs.querySelector('.map-tab-btn[data-played="true"]');
                    if(firstMapBtn) {
                        firstMapBtn.click(); 
                    } else {
                        statsTableArea.innerHTML = '<div style="text-align:center; color:#555; padding: 40px;"><i class="fas fa-map-marked-alt fa-2x" style="margin-bottom:10px;"></i><p>Bu maç için harita detayı bulunamadı.</p></div>';
                    }
                } else {
                    statsTableArea.innerHTML = '<div style="text-align:center; color:#555; padding: 40px;"><i class="fas fa-exclamation-circle fa-2x" style="margin-bottom:10px;"></i><p>Bu maç henüz detaylandırılmadı.</p></div>';
                }

            } catch (err) {
                console.error("Modal yükleme hatası:", err);
                statsTableArea.innerHTML = `<div style="color:#ff4b4b; text-align:center; padding: 40px;"><i class="fas fa-times-circle fa-2x"></i><p>Hata: Veri çekilemedi.</p></div>`;
            }
        }

        function closeScoreboardModal() {
            const md = document.getElementById('scoreboardModal');
            if(md) md.classList.remove('open');
            globalCurrentDetailedMatch = null; 
        }

        function renderModalHeader(match, correctFormat) {
            const headerContainer = document.getElementById('modalSeriesHeader');
            const teamAInfo = globalTeamMap[match.team_a_id] || {};
            const teamBInfo = globalTeamMap[match.team_b_id] || {};

            headerContainer.innerHTML = `
                <div class="series-title">${correctFormat || 'BO1'} - GENEL SERİ SKORU</div>
                <div class="series-score">
                    <span style="color:var(--grup-a-renk)">${teamAInfo.name || 'SOL TAKIM'}</span>&nbsp;&nbsp;
                    ${match.display_score_a} - ${match.display_score_b}&nbsp;&nbsp;
                    <span style="color:var(--grup-b-renk)">${teamBInfo.name || 'SAĞ TAKIM'}</span>
                </div>
            `;
        }

        function renderModalMapTabs(format, playedMaps) {
            const tabsContainer = document.getElementById('modalMapTabs');
            tabsContainer.innerHTML = ''; 
            
            let maxMapCount = 1;
            if(format === 'BO1') maxMapCount = 1;
            else if(format === 'BO3') maxMapCount = 3;
            else if(format === 'BO5') maxMapCount = 5;

            const playedMapsMap = {};
            if (playedMaps) {
                playedMaps.forEach(m => playedMapsMap[m.map_order] = m);
            }

            for (let i = 1; i <= maxMapCount; i++) {
                const mapData = playedMapsMap[i];
                const isPlayed = !!mapData; 
                
                const btn = document.createElement('button');
                btn.className = `map-tab-btn ${isPlayed ? '' : 'disabled'}`;
                const mName = isPlayed && mapData.map_name ? mapData.map_name.toUpperCase() : 'BELİRSİZ';
                btn.innerHTML = isPlayed ? `${i}. HARİTA: ${mName}` : `${i}. HARİTA (Oynanmadı)`;
                btn.dataset.mapOrder = i;
                btn.dataset.played = isPlayed;
                if(isPlayed) btn.dataset.mapId = mapData.id;

                if (isPlayed) {
                    btn.addEventListener('click', function() {
                        tabsContainer.querySelectorAll('.map-tab-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        loadDetailedStats(this.dataset.mapId);
                    });
                }
                tabsContainer.appendChild(btn);
            }
        }

        async function loadDetailedStats(mapId) {
            const tableArea = document.getElementById('modalStatsTableContainer');
            tableArea.innerHTML = '<div style="color:var(--gri-yazi); text-align:center; padding: 20px;"><i class="fas fa-spinner fa-spin"></i> Oyuncu Verileri Çekiliyor...</div>';

            try {
                if(!globalCurrentDetailedMatch) throw new Error("Seçili maç yok.");
                const teamAId = globalCurrentDetailedMatch.team_a_id;
                const teamBId = globalCurrentDetailedMatch.team_b_id;

                const { data: allStats, error: statsError } = await window.supabaseClient.from('match_player_stats').select('user_id, team_id, agent_name, in_game_name, kills, deaths, assists, acs').eq('map_id', mapId);

                if (statsError) throw statsError;

                const teamAStats = (allStats || []).filter(s => s.team_id === teamAId).sort((a, b) => (b.acs || 0) - (a.acs || 0));
                const teamBStats = (allStats || []).filter(s => s.team_id === teamBId).sort((a, b) => (b.acs || 0) - (a.acs || 0));

                renderScoreboardMapStats(teamAStats, teamBStats);

            } catch (err) {
                console.error("Detaylı veri çekme hatası:", err);
                tableArea.innerHTML = '<div style="color:#ff4b4b; text-align:center; padding: 40px;">Hata: Oyuncu verileri okunamadı.</div>';
            }
        }

        function renderScoreboardMapStats(teamAStats, teamBStats) {
            const tableArea = document.getElementById('modalStatsTableContainer');
            const teamAInfo = globalTeamMap[globalCurrentDetailedMatch.team_a_id] || {};
            const teamBInfo = globalTeamMap[globalCurrentDetailedMatch.team_b_id] || {};
            
            // DİKKAT: İsteğin üzerine ortadaki harita adı ve skor yazan gereksiz başlık (map-score-header) tamamen silindi
            tableArea.innerHTML = `
                <div class="teams-scoreboard-container">
                    <div class="team-a-col">
                        <div class="team-title-row team-a">${teamAInfo.name || 'SOL TAKIM'}</div>
                        ${createStatsTableHtml(teamAStats)}
                    </div>

                    <div class="team-b-col">
                        <div class="team-title-row team-b">${teamBInfo.name || 'SAĞ TAKIM'}</div>
                        ${createStatsTableHtml(teamBStats)}
                    </div>
                </div>
            `;
        }

        function createStatsTableHtml(statsArray) {
            let html = `
                <table class="scoreboard-table">
                    <thead>
                        <tr>
                            <th class="td-agent">AJAN</th>
                            <th class="td-name">OYUNCU</th>
                            <th class="k-cell">K</th>
                            <th class="d-cell">D</th>
                            <th class="a-cell">A</th>
                            <th class="acs-cell">ACS</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            if (!statsArray || statsArray.length === 0) {
                html += '<tr><td colspan="6" style="text-align:center; color:#555;">Bu harita için oyuncu verisi girilmemiş.</td></tr>';
            } else {
                statsArray.forEach(p => {
                    let agentName = (p.agent_name || 'unknown').charAt(0).toUpperCase() + (p.agent_name || 'unknown').slice(1).toLowerCase();
                    if(agentName.toLowerCase() === 'kayo') agentName = 'Kayo';

                    html += `
                        <tr>
                            <td class="td-agent">
                                <img src="img/imgagents/${agentName}.webp" class="agent-score-icon" onerror="this.src='img/unknown.webp'">
                            </td>
                            <td class="td-name">${p.in_game_name || 'Bilinmiyor'}</td>
                            <td class="k-cell">${p.kills || 0}</td>
                            <td class="d-cell">${p.deaths || 0}</td>
                            <td class="a-cell">${p.assists || 0}</td>
                            <td class="acs-cell">${p.acs || 0}</td>
                        </tr>
                    `;
                });
            }

            html += '</tbody></table>';
            return html;
        }

        document.addEventListener('DOMContentLoaded', initFixture);

    </script>
</body>
