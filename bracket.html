<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liderlik Tablosu | OBB E-SPORTS</title>
    
    <meta name="description" content="OBB E-Sports turnuvalarının en iyi oyuncuları! En yüksek ACS, K/D ve KPR istatistiklerine sahip e-sporcuları inceleyin.">
    <meta name="theme-color" content="#601dc2"> 
    
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        body { background-color: #050505; color: white; overflow-x: hidden; }
        
        .page-header { text-align: center; padding: 60px 20px 40px; background: radial-gradient(circle at top, #1a0a2e 0%, #050505 100%); border-bottom: 1px solid #222; }
        .page-title { font-size: 38px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; }
        .page-title span { color: var(--neon-mor); text-shadow: 0 0 20px rgba(96, 29, 194, 0.5); }
        .page-subtitle { color: var(--gri-yazi); font-size: 15px; font-weight: 500; margin-bottom: 30px; }

        .filter-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .filter-label { font-size: 13px; font-weight: bold; color: var(--gri-yazi); text-transform: uppercase; }
        .sort-select { background: #111; border: 1px solid var(--neon-mor); color: white; padding: 12px 25px; border-radius: 8px; font-weight: 900; font-size: 14px; cursor: pointer; outline: none; font-family: 'Poppins', sans-serif; box-shadow: 0 0 15px rgba(96, 29, 194, 0.2); }
        .sort-select:focus { border-color: white; }

        .leaderboard-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; min-height: 60vh; }

        /* --- İLK 3 PODYUM TASARIMI --- */
        .podium-wrapper { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 80px; margin-top: 40px; }
        .podium-card { background: #0a0a0a; border: 1px solid #333; border-radius: 16px; padding: 30px 20px; text-align: center; width: 240px; position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        
        .podium-1 { border-color: gold; box-shadow: 0 0 30px rgba(255, 215, 0, 0.15); transform: scale(1.15); z-index: 3; background: linear-gradient(180deg, rgba(255,215,0,0.05) 0%, rgba(10,10,10,1) 100%); }
        .podium-2 { border-color: silver; box-shadow: 0 0 20px rgba(192, 192, 192, 0.1); z-index: 2; height: 95%; }
        .podium-3 { border-color: #cd7f32; box-shadow: 0 0 20px rgba(205, 127, 50, 0.1); z-index: 1; height: 90%; }

        .rank-badge { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 900; color: black; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        .podium-1 .rank-badge { background: gold; }
        .podium-2 .rank-badge { background: silver; }
        .podium-3 .rank-badge { background: #cd7f32; }

        .player-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid #333; background: #111; }
        .podium-1 .player-avatar { border-color: gold; width: 110px; height: 110px; }
        .podium-2 .player-avatar { border-color: silver; }
        .podium-3 .player-avatar { border-color: #cd7f32; }

        .player-ign { font-size: 22px; font-weight: 900; color: white; margin-bottom: 5px; text-transform: uppercase; word-break: break-all; }
        .player-name { font-size: 12px; color: var(--gri-yazi); margin-bottom: 15px; }
        
        .stat-highlight { font-size: 28px; font-weight: 900; color: var(--neon-mor); line-height: 1; margin-bottom: 5px; }
        .podium-1 .stat-highlight { color: gold; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        
        .stat-label-small { font-size: 11px; color: var(--gri-yazi); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* --- LİSTE TASARIMI (4. Sıra ve Sonrası) --- */
        .table-wrapper { width: 100%; overflow-x: auto; background: #0a0a0a; border: 1px solid #222; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; min-width: 700px; }
        
        .leaderboard-table th { padding: 20px 15px; background: #111; color: var(--gri-yazi); font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; border-bottom: 2px solid #333; }
        .leaderboard-table td { padding: 15px; border-bottom: 1px solid #1a1a1a; color: white; font-weight: 500; vertical-align: middle; }
        
        .leaderboard-table tr:hover td { background: rgba(96, 29, 194, 0.05); }
        .leaderboard-table tr:last-child td { border-bottom: none; }

        .rank-cell { font-size: 18px; font-weight: 900; color: #555; width: 60px; }
        
        .player-cell { display: flex; align-items: center; gap: 15px; text-align: left; }
        .list-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid #333; background: #111; }
        .list-ign { font-size: 15px; font-weight: bold; color: white; }
        .list-name { font-size: 11px; color: var(--gri-yazi); }

        .primary-stat { font-size: 18px; font-weight: 900; color: var(--neon-mor); }
        .good-stat { color: #00d2ff; font-weight: bold; }
        
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }

        @media (max-width: 900px) {
            .podium-wrapper { align-items: center; flex-direction: column; gap: 40px; margin-top: 60px; }
            .podium-card { width: 100%; max-width: 320px; height: auto !important; transform: none !important; }
            /* Mobilde sıralama 1, 2, 3 şeklinde olsun */
            .podium-1 { order: 1; }
            .podium-2 { order: 2; }
            .podium-3 { order: 3; }
            .page-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-trophy fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>İstatistikler Hesaplanıyor...</h2>
    </div>

    <div id="header-alani"></div>

    <div class="page-header">
        <h1 class="page-title">OBB E-SPORTS <span>LİDERLİK TABLOSU</span></h1>
        <p class="page-subtitle">Turnuvanın en tehlikeli, en iyi oyuncuları.</p>
        
        <div class="filter-container">
            <span class="filter-label">Sıralama Ölçütü:</span>
            <select id="sortSelect" class="sort-select" onchange="fetchLeaderboard()">
                <option value="avg_acs">🔥 Ortalama ACS (Çatışma Skoru)</option>
                <option value="kd_ratio">🎯 K/D Oranı (Kill/Death)</option>
                <option value="kpr">⚡ KPR (Raunt Başına Kill)</option>
                <option value="total_kills">💀 Toplam Kill</option>
            </select>
        </div>
    </div>

    <main class="leaderboard-container">
        
        <div class="podium-wrapper" id="podiumArea">
            </div>

        <div class="table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th class="rank-cell">#</th>
                        <th style="text-align: left;">E-SPORCU</th>
                        <th>MAÇ</th>
                        <th style="color:var(--neon-mor);">ACS</th>
                        <th>K/D</th>
                        <th>KPR</th>
                        <th>K / D / A</th>
                    </tr>
                </thead>
                <tbody id="tableBodyArea">
                    </tbody>
            </table>
        </div>

    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script> 

    <script>
        async function loadComponents() {
            try {
                const headerRes = await fetch("components/header.html");
                if(headerRes.ok) document.getElementById('header-alani').innerHTML = await headerRes.text();
                
                const footerRes = await fetch("components/footer.html");
                if(footerRes.ok) document.getElementById('footer-alani').innerHTML = await footerRes.text();
            } catch(e) { console.error("Komponent yüklenemedi", e); }
        }

        // Seçilen sıralama ölçütüne göre başlık metnini döndürür (Podyumda göstermek için)
        function getMetricLabel(sortBy) {
            if(sortBy === 'avg_acs') return 'ORT. ACS';
            if(sortBy === 'kd_ratio') return 'K/D ORANI';
            if(sortBy === 'kpr') return 'KPR';
            if(sortBy === 'total_kills') return 'TOPLAM KILL';
            return 'SKOR';
        }

        async function fetchLeaderboard() {
            const sortBy = document.getElementById('sortSelect').value;
            const metricLabel = getMetricLabel(sortBy);
            
            document.getElementById('podiumArea').innerHTML = '';
            document.getElementById('tableBodyArea').innerHTML = '<tr><td colspan="7" style="padding:40px;"><i class="fas fa-spinner fa-spin"></i> Veriler yükleniyor...</td></tr>';

            try {
                // View tablosundan verileri çekip sıralıyoruz
                const { data: players, error } = await window.supabaseClient
                    .from('vw_leaderboard_stats')
                    .select('*')
                    .order(sortBy, { ascending: false })
                    .limit(50); // Şimdilik Top 50'yi listeliyoruz

                if (error) throw error;

                if (!players || players.length === 0) {
                    document.getElementById('podiumArea').innerHTML = '<p style="color:#555;">Henüz istatistik bulunmuyor.</p>';
                    document.getElementById('tableBodyArea').innerHTML = '';
                    return;
                }

                renderPodium(players.slice(0, 3), sortBy, metricLabel);
                renderTable(players.slice(3), sortBy);

            } catch (err) {
                console.error("Liderlik tablosu çekilemedi:", err);
                document.getElementById('tableBodyArea').innerHTML = '<tr><td colspan="7" style="color:red;">Veriler yüklenirken hata oluştu.</td></tr>';
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        function renderPodium(topPlayers, sortBy, metricLabel) {
            const podiumArea = document.getElementById('podiumArea');
            let html = '';

            // Tasarımda 2. - 1. - 3. şeklinde dizilmeleri için index düzenlemesi
            const positions = [
                { rank: 2, data: topPlayers[1], class: 'podium-2' },
                { rank: 1, data: topPlayers[0], class: 'podium-1' },
                { rank: 3, data: topPlayers[2], class: 'podium-3' }
            ];

            positions.forEach(pos => {
                if (!pos.data) return; // 3 kişi bile yoksa hata vermesin
                
                const p = pos.data;
                const avatar = p.avatar_url || 'img/default-avatar.png'; // Profil resmi yoksa default
                const ign = p.ign || p.username; // Oyun içi nick yoksa normal ismini yaz
                const scoreValue = p[sortBy]; // Seçilen filtreye göre değeri al

                html += `
                    <div class="podium-card ${pos.class}">
                        <div class="rank-badge">${pos.rank}</div>
                        <img src="${avatar}" class="player-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${ign}&background=random'">
                        <div class="player-ign">${ign}</div>
                        <div class="player-name">@${p.username}</div>
                        <div class="stat-highlight">${scoreValue}</div>
                        <div class="stat-label-small">${metricLabel}</div>
                    </div>
                `;
            });

            podiumArea.innerHTML = html;
        }

        function renderTable(listPlayers, sortBy) {
            const tableArea = document.getElementById('tableBodyArea');
            let html = '';

            if(listPlayers.length === 0) {
                tableArea.innerHTML = '<tr><td colspan="7" style="color:#555; padding: 30px;">Başka oyuncu bulunmuyor.</td></tr>';
                return;
            }

            listPlayers.forEach((p, index) => {
                const rank = index + 4; // 3 kişi podyumda olduğu için 4'ten başlar
                const avatar = p.avatar_url || 'img/default-avatar.png';
                const ign = p.ign || p.username;

                html += `
                    <tr>
                        <td class="rank-cell">${rank}</td>
                        <td>
                            <div class="player-cell">
                                <img src="${avatar}" class="list-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${ign}&background=random'">
                                <div>
                                    <div class="list-ign">${ign}</div>
                                    <div class="list-name">@${p.username}</div>
                                </div>
                            </div>
                        </td>
                        <td>${p.maps_played}</td>
                        <td class="${sortBy === 'avg_acs' ? 'primary-stat' : 'good-stat'}">${p.avg_acs}</td>
                        <td class="${sortBy === 'kd_ratio' ? 'primary-stat' : 'good-stat'}">${p.kd_ratio}</td>
                        <td class="${sortBy === 'kpr' ? 'primary-stat' : 'good-stat'}">${p.kpr}</td>
                        <td style="color:#aaa;">${p.total_kills} / ${p.total_deaths} / ${p.total_assists}</td>
                    </tr>
                `;
            });

            tableArea.innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponents();
            if (typeof checkUserStatus === 'function') { checkUserStatus(); }
            fetchLeaderboard();
        });
    </script>
</body>
</html>
