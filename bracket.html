<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fikstür ve Puan Durumu | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        :root {
            --grup-a-renk: #00d2ff;
            --grup-b-renk: #ff4b4b;
            --playoff-renk: #9d4edd;
        }

        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, rgba(96, 29, 194, 0.08) 0%, transparent 60%);
        }

        .fixture-container { max-width: 1300px; margin: 50px auto; padding: 0 20px; flex: 1; animation: fadeIn 0.5s ease; }
        
        .page-title { text-align: center; color: white; font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        .page-title span { color: var(--neon-mor); }

        /* GRUP KONTEYNERLARI (YAN YANA) */
        .groups-wrapper { display: flex; gap: 30px; margin-bottom: 60px; }
        .group-col { flex: 1; display: flex; flex-direction: column; gap: 30px; }

        /* PUAN DURUMU TABLOSU */
        .standings-card { background: rgba(15,15,15,0.8); border: 1px solid #222; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .group-a .standings-card { border-top: 3px solid var(--grup-a-renk); }
        .group-b .standings-card { border-top: 3px solid var(--grup-b-renk); }
        
        .card-header { padding: 15px; background: rgba(0,0,0,0.6); text-align: center; font-size: 18px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; }
        .group-a .card-header { color: var(--grup-a-renk); }
        .group-b .card-header { color: var(--grup-b-renk); }

        table { width: 100%; border-collapse: collapse; text-align: center; color: white; font-size: 13px; }
        th { padding: 12px 10px; color: var(--gri-yazi); font-weight: bold; background: rgba(255,255,255,0.03); text-transform: uppercase; font-size: 11px; border-bottom: 1px solid #333;}
        td { padding: 12px 10px; border-bottom: 1px solid #222; font-weight: 500; }
        tr:last-child td { border-bottom: none; }
        
        /* İLK 2 TAKIM VURGUSU */
        tr.qualified { background: rgba(255, 255, 255, 0.03); }
        tr.qualified td:first-child { border-left: 3px solid #fff; }
        
        .team-cell { display: flex; align-items: center; gap: 10px; text-align: left; padding-left: 15px !important; font-weight: bold; font-size: 13px;}
        .team-cell img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid #444; }
        .pts-col { font-weight: 900; color: white; font-size: 15px; }

        /* MAÇ KARTLARI (FİKSTÜR) */
        .matches-list { display: flex; flex-direction: column; gap: 15px; }
        .match-card { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; transition: 0.2s; position: relative; z-index: 2;}
        .match-card:hover { border-color: #666; background: #0d0d0d;}
        
        .match-date { text-align: center; font-size: 10px; color: var(--gri-yazi); font-weight: bold; margin-bottom: 10px; border-bottom: 1px dashed #333; padding-bottom: 8px; text-transform: uppercase;}
        
        .match-teams { display: flex; justify-content: space-between; align-items: center; }
        .m-team { display: flex; align-items: center; gap: 10px; flex: 1; font-size: 13px; font-weight: bold; color: #ddd; }
        .m-team.right { flex-direction: row-reverse; text-align: right; }
        .m-team img { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #333; }
        
        .m-score-box { background: #111; border: 1px solid #444; padding: 4px 12px; border-radius: 6px; font-size: 16px; font-weight: 900; color: white; display: flex; align-items: center; gap: 10px; margin: 0 10px;}
        .m-score-box span { min-width: 15px; text-align: center; }
        .m-score-box .winner { color: #fff; }
        .m-score-box .loser { color: #666; }
        .m-vs { font-size: 12px; color: #444; font-weight: normal;}
        
        .match-pending .m-score-box { background: transparent; border: none; font-size: 12px; color: #666; }
        .match-pending .m-team { color: #888; }

        /* BOŞ SLOT TASARIMI */
        .empty-bracket-card { background: #050505; border: 1px dashed #333; border-radius: 8px; padding: 25px; text-align: center; color: #444; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 2;}

        /* --- STANDART VE CİDDİ TURNUVA AĞACI (BRACKET) TASARIMI --- */
        .playoff-wrapper { margin-top: 60px; padding-top: 40px; border-top: 1px solid #222; }
        .playoff-title { text-align: center; color: white; font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 50px; }
        
        .tournament-bracket {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        .bracket-round {
            display: flex;
            flex-direction: column;
            gap: 40px;
            position: relative;
        }

        .round-semis .bracket-match { width: 320px; position: relative; }
        .round-final .bracket-match { width: 380px; position: relative; }

        /* AĞAÇ ÇİZGİLERİ (Masaüstü için) */
        @media (min-width: 993px) {
            .round-semis .bracket-match::after {
                content: "";
                position: absolute;
                right: -30px;
                top: 50%;
                width: 30px;
                border-top: 2px solid #333;
                z-index: 1;
            }
            .round-semis::after {
                content: "";
                position: absolute;
                right: -30px;
                top: calc(25% + 15px);
                bottom: calc(25% + 15px);
                border-right: 2px solid #333;
                z-index: 1;
            }
            .round-final .bracket-match::before {
                content: "";
                position: absolute;
                left: -30px;
                top: 50%;
                width: 30px;
                border-top: 2px solid #333;
                z-index: 1;
            }
        }

        .bracket-round-title { text-align: center; color: #666; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        /* FİNAL KARTI (Ciddi Vurgu) */
        .round-final .match-card { border-color: var(--playoff-renk); background: #0a0a0a; box-shadow: 0 0 15px rgba(157, 78, 221, 0.1); padding: 20px;}
        .round-final .m-score-box { background: rgba(157, 78, 221, 0.1); border-color: rgba(157, 78, 221, 0.3); }

        /* MOBİL UYUM */
        @media (max-width: 992px) {
            .groups-wrapper { flex-direction: column; }
            .m-team span { display: none; }
            .m-team.m-mobile-name span { display: block; font-size: 12px;}
            
            .tournament-bracket { flex-direction: column; gap: 30px; }
            .bracket-round { width: 100%; max-width: 500px; gap: 15px; }
            .round-semis .bracket-match, .round-final .bracket-match { width: 100%; }
            .bracket-match::before, .bracket-match::after, .round-semis::after { display: none !important; }
        }

        #loadingScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: #050505; display:flex; justify-content:center; align-items:center; z-index: 9999; color: var(--neon-mor); flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 15px;"></i>
        <h2>Fikstür Yükleniyor...</h2>
    </div>

    <div id="header-alani"></div>

    <main class="fixture-container">
        <h1 class="page-title">TURNUVA <span>FİKSTÜRÜ</span></h1>

        <div class="groups-wrapper">
            <div class="group-col group-a">
                <div class="standings-card">
                    <div class="card-header">A GRUBU</div>
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left; padding-left:20px;">Takım</th>
                                <th>O</th><th>G</th><th>M</th><th>AV</th><th>P</th>
                            </tr>
                        </thead>
                        <tbody id="groupA-table">
                            </tbody>
                    </table>
                </div>
                
                <div class="matches-list" id="groupA-matches">
                    <h3 style="color:white; font-size:14px; margin: 10px 0 5px; border-left: 3px solid var(--grup-a-renk); padding-left: 10px; text-transform: uppercase;">A Grubu Eşleşmeleri</h3>
                    </div>
            </div>

            <div class="group-col group-b">
                <div class="standings-card">
                    <div class="card-header">B GRUBU</div>
                    <table>
                        <thead>
                            <tr>
                                <th style="text-align:left; padding-left:20px;">Takım</th>
                                <th>O</th><th>G</th><th>M</th><th>AV</th><th>P</th>
                            </tr>
                        </thead>
                        <tbody id="groupB-table">
                             </tbody>
                    </table>
                </div>
                
                <div class="matches-list" id="groupB-matches">
                    <h3 style="color:white; font-size:14px; margin: 10px 0 5px; border-left: 3px solid var(--grup-b-renk); padding-left: 10px; text-transform: uppercase;">B Grubu Eşleşmeleri</h3>
                    </div>
            </div>
        </div>

        <div class="playoff-wrapper">
            <h2 class="playoff-title">PLAYOFF AŞAMASI</h2>
            
            <div class="tournament-bracket">
                
                <div class="bracket-round round-semis">
                    <div class="bracket-round-title">Yarı Final</div>
                    <div id="semi-finals-list" style="display: flex; flex-direction: column; gap: 40px;">
                        </div>
                </div>

                <div class="bracket-round round-final">
                    <div class="bracket-round-title">Büyük Final</div>
                    <div id="final-match">
                        </div>
                </div>

            </div>
        </div>

    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        let activeTournamentId = null;
        let globalTeamMap = {}; // Takım logolarını ve isimlerini güvenle saklayacağımız depo

        async function initFixture() {
            try {
                // 1. Aktif Turnuvayı Bul
                const { data: tourney } = await window.supabaseClient.from('tournaments')
                    .select('id').in('status', ['upcoming', 'ongoing']).order('created_at', { ascending: false }).limit(1).maybeSingle();
                
                if (!tourney) {
                    document.querySelector('.fixture-container').innerHTML = '<h3 style="color:#555; text-align:center; margin-top:50px;">Şu an aktif bir turnuva bulunmuyor.</h3>';
                    return;
                }
                activeTournamentId = tourney.id;

                // 2. Tüm takımları hata vermeden güvenli bir şekilde belleğe al (Anahtar hamle)
                const { data: allTeams } = await window.supabaseClient.from('teams').select('id, name, logo_url');
                if (allTeams) {
                    allTeams.forEach(t => globalTeamMap[t.id] = t);
                }

                await fetchDataAndCalculate();

            } catch (err) {
                console.error("Fikstür yükleme hatası:", err);
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        async function fetchDataAndCalculate() {
            // Başvuruları Çek
            const { data: applications } = await window.supabaseClient.from('tournament_applications')
                .select('group_name, team_id')
                .eq('tournament_id', activeTournamentId)
                .eq('status', 'approved');

            // Maçları DÜMDÜZ Çekiyoruz (Karmaşık bağlamalar olmadan, hatasız)
            const { data: matches, error: matchesError } = await window.supabaseClient.from('bracket_matches')
                .select('id, round_name, match_date, status, team_a_id, team_b_id, series_score_a, series_score_b')
                .eq('tournament_id', activeTournamentId)
                .order('created_at', { ascending: true });

            if (matchesError) {
                console.error("Maç çekme hatası:", matchesError);
                return;
            }

            // Puan Durumu Objeleri
            let standings = { 'A': {}, 'B': {} };
            
            // 1. Önce Başvurulardaki Takımları Tabloya Ekle
            if (applications) {
                applications.forEach(app => {
                    let grp = app.group_name; 
                    if (grp) grp = grp.toUpperCase();
                    
                    const tId = app.team_id;
                    const teamInfo = globalTeamMap[tId] || {};
                    
                    if (grp === 'A' || grp === 'B') {
                        standings[grp][tId] = {
                            id: tId, 
                            name: teamInfo.name || 'Bilinmiyor', 
                            logo: teamInfo.logo_url || 'img/unknown.webp',
                            played: 0, wins: 0, losses: 0, average: 0, points: 0
                        };
                    }
                });
            }

            // 2. Eksik Takımları Koru (Eğer maç oynanmış ama başvurusu görünmüyorsa zorla ekle)
            if (matches) {
                matches.forEach(m => {
                    let grp = getMatchGroup(m.round_name);
                    if (grp && (grp === 'A' || grp === 'B')) {
                        if (m.team_a_id && !standings[grp][m.team_a_id]) {
                            const teamAInfo = globalTeamMap[m.team_a_id] || {};
                            standings[grp][m.team_a_id] = { id: m.team_a_id, name: teamAInfo.name || 'Bilinmiyor', logo: teamAInfo.logo_url || 'img/unknown.webp', played: 0, wins: 0, losses: 0, average: 0, points: 0 };
                        }
                        if (m.team_b_id && !standings[grp][m.team_b_id]) {
                            const teamBInfo = globalTeamMap[m.team_b_id] || {};
                            standings[grp][m.team_b_id] = { id: m.team_b_id, name: teamBInfo.name || 'Bilinmiyor', logo: teamBInfo.logo_url || 'img/unknown.webp', played: 0, wins: 0, losses: 0, average: 0, points: 0 };
                        }
                    }
                });
            }

            // 3. Maç Skorlarına Göre Puanları Hesapla
            if (matches) {
                matches.forEach(m => {
                    const grp = getMatchGroup(m.round_name);
                    
                    // Sadece Gruplardaki Puanları Hesapla (Yarı final / final tablolara etki etmez)
                    if ((grp === 'A' || grp === 'B') && m.status === 'completed') {
                        const tA = standings[grp][m.team_a_id];
                        const tB = standings[grp][m.team_b_id];
                        
                        if (tA && tB) {
                            tA.played++; tB.played++;
                            
                            tA.average += (m.series_score_a - m.series_score_b);
                            tB.average += (m.series_score_b - m.series_score_a);

                            if (m.series_score_a > m.series_score_b) {
                                tA.wins++; tA.points += 3; tB.losses++;
                            } else if (m.series_score_b > m.series_score_a) {
                                tB.wins++; tB.points += 3; tA.losses++;
                            }
                        }
                    }
                });
            }

            // Tabloları Ekrana Çizdir
            renderTable('A', standings['A']);
            renderTable('B', standings['B']);

            // Maçları Kategorize Et ve Tam Yuvalara Çizdir
            const groupAMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'A') : [];
            const groupBMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'B') : [];
            const semiMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'SEMI') : [];
            const finalMatches = matches ? matches.filter(m => getMatchGroup(m.round_name) === 'FINAL') : [];

            renderMatchesWithPadding('groupA-matches', groupAMatches, 3, false);
            renderMatchesWithPadding('groupB-matches', groupBMatches, 3, false);
            renderMatchesWithPadding('semi-finals-list', semiMatches, 2, true);
            renderMatchesWithPadding('final-match', finalMatches, 1, true);
        }

        // İsim Uyuşmazlıklarına Karşı Güçlü Filtre
        function getMatchGroup(rawName) {
            if (!rawName) return null;
            const name = rawName.toUpperCase();
            if (name.includes('A GRUBU') || name.includes('GRUP A')) return 'A';
            if (name.includes('B GRUBU') || name.includes('GRUP B')) return 'B';
            if (name.includes('YARI') || name.includes('SEMI')) return 'SEMI';
            if (name.includes('FİNAL') || name.includes('FINAL')) return 'FINAL';
            return null;
        }

        function renderTable(groupName, teamsObj) {
            const tbody = document.getElementById(`group${groupName}-table`);
            if(!tbody) return;

            const teamsArray = Object.values(teamsObj);
            teamsArray.sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                return b.average - a.average; 
            });

            let html = '';
            if (teamsArray.length === 0) {
                html = '<tr><td colspan="6" style="color:#555;">Bu grupta takım yok.</td></tr>';
            } else {
                teamsArray.forEach((team, index) => {
                    const rowClass = index < 2 ? 'qualified' : '';
                    const avgDisplay = team.average > 0 ? `+${team.average}` : team.average;
                    
                    html += `
                        <tr class="${rowClass}">
                            <td class="team-cell">
                                <img src="${team.logo}" onerror="this.src='img/unknown.webp'"> 
                                ${team.name}
                            </td>
                            <td>${team.played}</td>
                            <td>${team.wins}</td>
                            <td>${team.losses}</td>
                            <td>${avgDisplay}</td>
                            <td class="pts-col">${team.points}</td>
                        </tr>
                    `;
                });
            }
            tbody.innerHTML = html;
        }

        function renderMatchesWithPadding(containerId, matchArray, maxSlots, isBracket) {
            const container = document.getElementById(containerId);
            if(!container) return;

            const titleEl = container.querySelector('h3');
            let html = titleEl ? titleEl.outerHTML : '';

            for (let i = 0; i < maxSlots; i++) {
                if (matchArray[i]) {
                    html += `<div class="${isBracket ? 'bracket-match' : ''}">${createMatchCardHtml(matchArray[i])}</div>`;
                } else {
                    html += `<div class="${isBracket ? 'bracket-match' : ''}"><div class="empty-bracket-card">Eşleşme Bekleniyor</div></div>`;
                }
            }

            container.innerHTML = html;
        }

        function createMatchCardHtml(m) {
            const dateStr = m.match_date ? new Date(m.match_date).toLocaleString('tr-TR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
            
            // globalTeamMap kullanarak isimleri ve logoları güvenli bir şekilde çeker
            const teamAInfo = globalTeamMap[m.team_a_id] || {};
            const teamBInfo = globalTeamMap[m.team_b_id] || {};

            const logoA = teamAInfo.logo_url || 'img/unknown.webp';
            const nameA = teamAInfo.name || 'Belirlenmedi';
            const logoB = teamBInfo.logo_url || 'img/unknown.webp';
            const nameB = teamBInfo.name || 'Belirlenmedi';

            let scoreArea = '';
            let statusClass = ''; 

            if (m.status === 'completed') {
                const classA = m.series_score_a > m.series_score_b ? 'winner' : 'loser';
                const classB = m.series_score_b > m.series_score_a ? 'winner' : 'loser';
                scoreArea = `
                    <div class="m-score-box">
                        <span class="${classA}">${m.series_score_a}</span>
                        <span class="m-vs">-</span>
                        <span class="${classB}">${m.series_score_b}</span>
                    </div>
                `;
            } else {
                statusClass = 'match-pending';
                scoreArea = `<div class="m-score-box">VS</div>`;
            }

            const dateHtml = dateStr ? `<div class="match-date">${dateStr}</div>` : '';

            return `
                <div class="match-card ${statusClass}">
                    ${dateHtml}
                    <div class="match-teams">
                        <div class="m-team">
                            <img src="${logoA}" onerror="this.src='img/unknown.webp'">
                            <span>${nameA}</span>
                        </div>
                        
                        ${scoreArea}
                        
                        <div class="m-team right">
                            <img src="${logoB}" onerror="this.src='img/unknown.webp'">
                            <span>${nameB}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', initFixture);
    </script>
</body>
</html>
