<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kış Turnuvası Fikstürü | OBB E-SPOR</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        body { background-color: #050505; color: white; }
        
        /* --- SAYFA BAŞLIĞI VE SEKMELER --- */
        .page-header { text-align: center; padding: 40px 20px 20px; background: radial-gradient(circle at top, #110522 0%, #050505 100%); border-bottom: 1px solid #222; }
        .page-title { font-size: 36px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .page-title span { color: var(--neon-mor); text-shadow: 0 0 20px rgba(96, 29, 194, 0.5); }
        .page-subtitle { color: var(--gri-yazi); font-size: 14px; font-weight: 500; margin-bottom: 30px; }

        .stage-tabs { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .stage-btn { background: #111; border: 1px solid #333; color: var(--gri-yazi); padding: 12px 30px; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; font-family: 'Poppins', sans-serif; letter-spacing: 1px; }
        .stage-btn.active, .stage-btn:hover { background: var(--neon-mor); color: white; border-color: var(--neon-mor); box-shadow: 0 0 20px rgba(96, 29, 194, 0.4); transform: translateY(-2px); }

        /* --- AŞAMA İÇERİK ALANLARI --- */
        .stage-content { display: none; padding: 40px 5%; animation: fadeIn 0.4s ease; min-height: 60vh; }
        .stage-content.active { display: block; }

        /* --- 1. AŞAMA: LİSTE (GRUP) GÖRÜNÜMÜ STİLLERİ --- */
        .round-list-wrapper { margin-bottom: 50px; }
        .round-list-title { display: flex; align-items: center; gap: 15px; font-size: 20px; font-weight: 900; color: white; margin-bottom: 25px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .round-list-title span { background: var(--neon-mor); padding: 2px 10px; border-radius: 5px; font-size: 14px; }
        
        .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        /* --- 2. AŞAMA: AĞAÇ (BRACKET) STİLLERİ --- */
        .bracket-scroll-area { width: 100%; overflow-x: auto; padding-bottom: 40px; scrollbar-width: thin; scrollbar-color: var(--neon-mor) #111; }
        .bracket-container { display: flex; align-items: stretch; justify-content: center; gap: 60px; min-width: max-content; }
        .bracket-column { display: flex; flex-direction: column; justify-content: space-around; width: 250px; position: relative; }
        .round-header { text-align: center; color: var(--neon-mor); font-weight: 900; text-transform: uppercase; font-size: 16px; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 10px; }

        /* Ağaç Çizgileri */
        .bracket-column .match-wrapper { position: relative; margin: 15px 0; }
        .bracket-column .match-wrapper::after { content: ''; position: absolute; right: -30px; top: 50%; width: 30px; border-bottom: 2px solid #333; z-index: 1; }
        .bracket-column:last-child .match-wrapper::after { display: none; }
        .bracket-column:not(:first-child) .match-wrapper::before { content: ''; position: absolute; left: -30px; width: 30px; z-index: 1; }
        .bracket-column:not(:first-child) .match-wrapper:nth-child(odd)::before { border-left: 2px solid #333; height: calc(50% + 15px); top: 50%; border-top: 2px solid #333; border-bottom: none; }
        .bracket-column:not(:first-child) .match-wrapper:nth-child(even)::before { border-left: 2px solid #333; height: calc(50% + 15px); bottom: 50%; border-bottom: 2px solid #333; border-top: none; }

        /* --- ORTAK MAÇ KARTI TASARIMI --- */
        .match-card { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; overflow: hidden; position: relative; z-index: 5; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .match-card:hover { border-color: var(--neon-mor); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(96, 29, 194, 0.3); z-index: 10; }
        .match-info-bar { background: #111; padding: 6px 12px; font-size: 11px; color: var(--gri-yazi); font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        
        .team { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #1a1a1a; }
        .team:last-child { border-bottom: none; }
        .team-info { display: flex; align-items: center; gap: 10px; }
        .team-logo { width: 20px; height: 20px; object-fit: contain; background: #000; border-radius: 4px; }
        .team-name { font-size: 13px; font-weight: 700; color: white; }
        .score { font-size: 16px; font-weight: 900; color: white; }
        
        /* Kazanan / Kaybeden / Boş Slot */
        .team.winner { background: rgba(96, 29, 194, 0.1); border-left: 3px solid var(--neon-mor); }
        .team.winner .team-name, .team.winner .score { color: var(--neon-mor); text-shadow: 0 0 10px rgba(96, 29, 194, 0.4); }
        .team.loser { opacity: 0.5; }

        .match-card.empty-slot { border: 1px dashed #333; cursor: default; }
        .match-card.empty-slot:hover { border-color: #555; transform: none; box-shadow: none; }
        .match-card.empty-slot .team-name { color: #555; font-style: italic; }
        .match-card.empty-slot .score { color: #333; }

        .final-match { border-color: gold; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .final-match .team.winner { background: rgba(255, 215, 0, 0.1); border-left-color: gold; }
        .final-match .team.winner .team-name, .final-match .team.winner .score { color: gold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }

        /* --- DETAY MODALI VE SKORBORD STİLLERİ --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(8px); padding: 20px; }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s; }
        .modal-content { background: #0a0a0a; border: 1px solid #333; border-top: 4px solid var(--neon-mor); border-radius: 15px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        
        /* Scrollbar for Modal */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-track { background: #111; border-radius: 0 15px 15px 0; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--neon-mor); border-radius: 8px; }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: var(--gri-yazi); cursor: pointer; transition: 0.3s; z-index: 10; }
        .close-btn:hover { color: var(--kirmizi-iptal); }

        .modal-header { padding: 40px 20px; background: radial-gradient(circle at center, #1a0a2e 0%, #0a0a0a 100%); text-align: center; border-bottom: 1px solid #222; }
        .scoreboard { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 15px;}
        .modal-team { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
        .modal-team img { width: 60px; height: 60px; object-fit: contain; }
        .modal-team-name { font-size: 20px; font-weight: 900; color: white; text-transform: uppercase; }
        .modal-score { font-size: 48px; font-weight: 900; color: white; }
        .modal-score.winner { color: var(--neon-mor); text-shadow: 0 0 20px rgba(96, 29, 194, 0.5); }
        .modal-vs { font-size: 16px; color: #555; font-weight: bold; }

        /* Yeni Eklenen: Modal İçi İstatistik Tabloları */
        .map-stats-block { margin: 20px; background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; animation: fadeIn 0.4s ease; }
        .map-name-header { background: var(--neon-mor); color: white; padding: 12px; margin: 0; font-size: 14px; font-weight: 900; text-align: center; letter-spacing: 1px; }
        .stats-tables-container { display: flex; flex-direction: column; gap: 0; }
        .table-half { width: 100%; border-bottom: 1px solid #222; }
        .table-half:last-child { border-bottom: none; }
        
        .team-header-bar { padding: 8px 15px; font-size: 13px; font-weight: 900; color: white; text-align: center; }
        .team-a-bar { background: rgba(0, 210, 255, 0.1); border-bottom: 2px solid #00d2ff; color: #00d2ff; }
        .team-b-bar { background: rgba(255, 75, 75, 0.1); border-bottom: 2px solid #ff4b4b; color: #ff4b4b; }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        .stats-table th { color: var(--gri-yazi); padding: 10px; border-bottom: 1px solid #333; font-size: 11px; text-transform: uppercase; }
        .stats-table td { padding: 10px; border-bottom: 1px solid #222; color: white; vertical-align: middle; }
        .stats-table tr:hover td { background: #1a1a1a; }
        .stats-table tr:last-child td { border-bottom: none; }
        
        .stat-ign-cell { text-align: left; font-weight: bold; }
        .stat-agent-img { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; border: 1px solid #444; }

        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        @media (min-width: 768px) {
            .stats-tables-container { flex-direction: row; }
            .table-half { width: 50%; border-bottom: none; border-right: 1px solid #222; }
            .table-half:last-child { border-right: none; }
        }

        @media (max-width: 768px) {
            .page-title { font-size: 24px; }
            .stage-tabs { flex-direction: column; padding: 0 20px; }
            .match-grid { grid-template-columns: 1fr; }
            .scoreboard { gap: 10px; }
            .modal-team img { width: 40px; height: 40px; }
            .modal-team-name { font-size: 14px; }
            .modal-score { font-size: 32px; }
            .stat-agent-img { width: 25px; height: 25px; }
            .stats-table td { padding: 6px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>Fikstür Verileri Çekiliyor...</h2>
    </div>

    <div id="header-alani"></div>

    <div class="page-header">
        <h1 class="page-title">OBB KIŞ TURNUVASI <span>FİKSTÜRÜ</span></h1>
        <p class="page-subtitle">Toplam Ödül Havuzu: 10.000 TL | 64 Takım</p>
        
        <div class="stage-tabs">
            <button class="stage-btn active" onclick="switchStage('groupStage', this)"><i class="fas fa-list-ul"></i> GRUP AŞAMASI (R1 & R2)</button>
            <button class="stage-btn" onclick="switchStage('playoffStage', this)"><i class="fas fa-sitemap"></i> PLAYOFF AĞACI (Son 16)</button>
        </div>
    </div>

    <div id="groupStage" class="stage-content active"></div>

    <div id="playoffStage" class="stage-content">
        <div class="bracket-scroll-area">
            <div class="bracket-container" id="bracketContainer"></div>
        </div>
    </div>

    <div class="modal-overlay" id="matchModal" onclick="this.classList.remove('active')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('matchModal').classList.remove('active')">&times;</span>
            <div class="modal-header">
                <span style="font-size: 12px; font-weight: 900; color: var(--gri-yazi); letter-spacing: 2px;">MAÇ DETAYLARI</span>
                <div class="scoreboard">
                    <div class="modal-team">
                        <img src="img/obblogo.png" alt="Takım A">
                        <span class="modal-team-name" id="mTeamA">TAKIM A</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="modal-score" id="mScoreA">0</span>
                        <span class="modal-vs">-</span>
                        <span class="modal-score" id="mScoreB">0</span>
                    </div>
                    <div class="modal-team">
                        <img src="img/obblogo.png" alt="Takım B">
                        <span class="modal-team-name" id="mTeamB">TAKIM B</span>
                    </div>
                </div>
            </div>
            
            <div id="modalDetailsContent">
                </div>
        </div>
    </div>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script> 

    <script>
        async function loadComponents() {
            try {
                const headerRes = await fetch("components/header.html");
                if(headerRes.ok) document.getElementById('header-alani').innerHTML = await headerRes.text();
                
                const footerRes = await fetch("components/footer.html");
                if(footerRes.ok) document.getElementById('footer-alani').innerHTML = await footerRes.text();
            } catch(e) { console.error("Komponent yüklenemedi", e); }
        }

        function switchStage(tabId, btnElement) {
            document.querySelectorAll('.stage-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.stage-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        const TOURNAMENT_STRUCTURE = {
            group: [
                { id: 'R1', title: 'SON 64 EŞLEŞMELERİ (BO1)', count: 32, format: 'BO1' },
                { id: 'R2', title: 'SON 32 EŞLEŞMELERİ (BO1)', count: 16, format: 'BO1' }
            ],
            playoff: [
                { id: 'SON 16', count: 8, format: 'BO3' },
                { id: 'ÇEYREK FİNAL', count: 4, format: 'BO3' },
                { id: 'YARI FİNAL', count: 2, format: 'BO3' },
                { id: 'FİNAL', count: 1, format: 'BO5' }
            ]
        };

        // Kart HTML Üretici (ID'LERİ MODALA İLETİR)
        function createMatchCardHTML(matchData, format, isFinal = false) {
            if (!matchData || matchData.isDummy) {
                return `
                    <div class="match-card empty-slot ${isFinal ? 'final-match' : ''}">
                        <div class="match-info-bar"><span>${format}</span><span style="color:#555;">EŞLEŞME BEKLENİYOR</span></div>
                        <div class="team"><div class="team-info"><img src="img/agents/unknown.png" class="team-logo"><span class="team-name">Belirlenmedi</span></div><span class="score">-</span></div>
                        <div class="team"><div class="team-info"><img src="img/agents/unknown.png" class="team-logo"><span class="team-name">Belirlenmedi</span></div><span class="score">-</span></div>
                    </div>
                `;
            }

            const tA = matchData.teamA || 'Bilinmeyen Takım';
            const tB = matchData.teamB || 'Bilinmeyen Takım';
            const sA = matchData.scoreA !== null ? matchData.scoreA : '-';
            const sB = matchData.scoreB !== null ? matchData.scoreB : '-';
            
            let classA = '', classB = '';
            let statusText = 'BEKLİYOR';

            if (matchData.status === 'finished') {
                classA = matchData.winnerId === matchData.teamAId ? 'winner' : 'loser';
                classB = matchData.winnerId === matchData.teamBId ? 'winner' : 'loser';
                if(!matchData.winnerId) { 
                    if (sA > sB) { classA = 'winner'; classB = 'loser'; }
                    else if (sB > sA) { classB = 'winner'; classA = 'loser'; }
                }
                statusText = '<span style="color:var(--neon-mor);">TAMAMLANDI</span>';
            } else if (matchData.status === 'live') {
                statusText = '<span style="color:var(--kirmizi-iptal); animation: pulse 1.5s infinite;">CANLI</span>';
            }

            const finalClass = isFinal ? 'final-match' : '';
            const safeTA = tA.replace(/'/g, ""); const safeTB = tB.replace(/'/g, "");

            // DİKKAT: Artık openModal'a matchData.id ve takım id'leri de gidiyor!
            return `
                <div class="match-card ${finalClass}" onclick="openModal('${matchData.id}', '${matchData.teamAId}', '${matchData.teamBId}', '${safeTA}', '${safeTB}', '${sA}', '${sB}', '${matchData.status}')">
                    <div class="match-info-bar"><span>${matchData.format || format}</span>${statusText}</div>
                    <div class="team ${classA}">
                        <div class="team-info"><img src="img/obblogo.png" class="team-logo"><span class="team-name">${tA}</span></div>
                        <span class="score">${sA}</span>
                    </div>
                    <div class="team ${classB}">
                        <div class="team-info"><img src="img/obblogo.png" class="team-logo"><span class="team-name">${tB}</span></div>
                        <span class="score">${sB}</span>
                    </div>
                </div>
            `;
        }

        async function fetchAndRenderBracket() {
            try {
                const { data: teamsData, error: teamsErr } = await window.supabaseClient.from('tournament_applications').select('id, team_name');
                if (teamsErr) throw teamsErr;
                
                const teamMap = {};
                if (teamsData) teamsData.forEach(t => teamMap[t.id] = t.team_name);

                const { data: matchesData, error: matchesErr } = await window.supabaseClient.from('bracket_matches').select('*').order('round_order', { ascending: true });
                if (matchesErr) throw matchesErr;

                const roundsData = {};
                if (matchesData) {
                    matchesData.forEach(m => {
                        if (!roundsData[m.round_name]) roundsData[m.round_name] = [];
                        roundsData[m.round_name].push({
                            id: m.id,
                            teamAId: m.team_a_id,
                            teamBId: m.team_b_id,
                            teamA: teamMap[m.team_a_id] || 'Belirlenmedi',
                            teamB: teamMap[m.team_b_id] || 'Belirlenmedi',
                            scoreA: m.series_score_a,
                            scoreB: m.series_score_b,
                            status: m.status,
                            winnerId: m.winner_id,
                            format: m.match_format
                        });
                    });
                }

                const groupStageDiv = document.getElementById('groupStage');
                let groupHtml = '';
                TOURNAMENT_STRUCTURE.group.forEach(round => {
                    groupHtml += `<div class="round-list-wrapper"><h3 class="round-list-title"><span>${round.id}</span> ${round.title}</h3><div class="match-grid">`;
                    const dbMatches = roundsData[round.id] || [];
                    for (let i = 0; i < round.count; i++) {
                        if (dbMatches[i]) groupHtml += createMatchCardHTML(dbMatches[i], round.format);
                        else groupHtml += createMatchCardHTML({ isDummy: true }, round.format);
                    }
                    groupHtml += `</div></div>`;
                });
                groupStageDiv.innerHTML = groupHtml;

                const playoffDiv = document.getElementById('bracketContainer');
                let playoffHtml = '';
                TOURNAMENT_STRUCTURE.playoff.forEach((round, index) => {
                    const isFinal = index === TOURNAMENT_STRUCTURE.playoff.length - 1;
                    playoffHtml += `<div class="bracket-column"><div class="round-header" ${isFinal?'style="color:gold;"':''}>${round.id}</div>`;
                    const dbMatches = roundsData[round.id] || [];
                    for (let i = 0; i < round.count; i++) {
                        playoffHtml += `<div class="match-wrapper">`;
                        if (dbMatches[i]) playoffHtml += createMatchCardHTML(dbMatches[i], round.format, isFinal);
                        else playoffHtml += createMatchCardHTML({ isDummy: true }, round.format, isFinal);
                        playoffHtml += `</div>`;
                    }
                    playoffHtml += `</div>`;
                });
                playoffDiv.innerHTML = playoffHtml;

            } catch (err) {
                console.error("Fikstür yüklenirken hata oluştu:", err);
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        // --- GÜNCELLENMİŞ HARİKA MODAL (İSTATİSTİKLERİ GETİRİR) ---
        async function openModal(matchId, teamAId, teamBId, tA, tB, sA, sB, status) {
            if(status === 'undefined' || status === 'pending' || sA === '-') return; 
            
            // Üst kısımdaki genel skoru doldur
            document.getElementById('mTeamA').innerText = tA;
            document.getElementById('mTeamB').innerText = tB;
            
            const scoreAEl = document.getElementById('mScoreA');
            const scoreBEl = document.getElementById('mScoreB');
            scoreAEl.innerText = sA;
            scoreBEl.innerText = sB;
            
            scoreAEl.className = parseInt(sA) > parseInt(sB) ? 'modal-score winner' : 'modal-score';
            scoreBEl.className = parseInt(sB) > parseInt(sA) ? 'modal-score winner' : 'modal-score';

            document.getElementById('matchModal').classList.add('active');
            document.body.style.overflow = 'hidden'; 

            // Modal içi yükleniyor efekti
            const detailsBox = document.getElementById('modalDetailsContent');
            detailsBox.innerHTML = `
                <div style="padding: 60px; text-align: center;">
                    <i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--neon-mor); margin-bottom: 20px;"></i>
                    <p style="color: var(--gri-yazi); font-weight: bold; letter-spacing: 1px;">İstatistikler Supabase'den Çekiliyor...</p>
                </div>
            `;

            try {
                // 1. Bu Maça Ait Haritaları Çek
                const { data: maps, error: mapsErr } = await window.supabaseClient
                    .from('match_maps')
                    .select('*')
                    .eq('match_id', matchId)
                    .order('map_order', { ascending: true });

                if (mapsErr) throw mapsErr;

                if (!maps || maps.length === 0) {
                    detailsBox.innerHTML = `
                        <div style="padding: 40px; text-align: center; color: var(--gri-yazi);">
                            <i class="fas fa-info-circle fa-3x" style="margin-bottom: 15px; color: #555;"></i>
                            <p>Bu maç için detaylı harita ve K/D/A istatistiği sisteme girilmemiş.</p>
                        </div>`;
                    return;
                }

                let html = '';

                // 2. Her Harita İçin Oyuncu Verilerini Çek ve Tablola
                for (const map of maps) {
                    const { data: stats, error: statsErr } = await window.supabaseClient
                        .from('match_player_stats')
                        .select('*')
                        .eq('map_id', map.id);

                    if (statsErr) throw statsErr;

                    // Oyuncuları takımlara göre ayır ve Kill (Öldürme) sayısına göre büyükten küçüğe sırala
                    const teamAStats = stats.filter(s => s.team_id === teamAId).sort((a,b) => b.kills - a.kills);
                    const teamBStats = stats.filter(s => s.team_id === teamBId).sort((a,b) => b.kills - a.kills);

                    // Satır çizici fonksiyon (UI Avatars ile ajan resmi oluşturur)
                    const renderRow = (stat) => `
                        <tr>
                            <td><img src="https://ui-avatars.com/api/?name=${stat.agent_name}&background=222&color=fff" class="stat-agent-img" title="${stat.agent_name.toUpperCase()}"></td>
                            <td class="stat-ign-cell">${stat.in_game_name}</td>
                            <td style="font-weight:900; color:#00d2ff;">${stat.kills}</td>
                            <td style="font-weight:900; color:#ff4b4b;">${stat.deaths}</td>
                            <td style="font-weight:900; color:#888;">${stat.assists}</td>
                        </tr>
                    `;

                    html += `
                        <div class="map-stats-block">
                            <h4 class="map-name-header">HARİTA: ${map.map_name.toUpperCase()} <span style="opacity:0.7; margin-left:5px;">[ ${map.score_a} - ${map.score_b} ]</span></h4>
                            <div class="stats-tables-container">
                                <div class="table-half">
                                    <div class="team-header-bar team-a-bar">${tA}</div>
                                    <table class="stats-table">
                                        <thead><tr><th>AJAN</th><th class="stat-ign-cell">OYUNCU</th><th>K</th><th>D</th><th>A</th></tr></thead>
                                        <tbody>${teamAStats.length > 0 ? teamAStats.map(renderRow).join('') : '<tr><td colspan="5" style="color:#555;">Veri Yok</td></tr>'}</tbody>
                                    </table>
                                </div>
                                <div class="table-half">
                                    <div class="team-header-bar team-b-bar">${tB}</div>
                                    <table class="stats-table">
                                        <thead><tr><th>AJAN</th><th class="stat-ign-cell">OYUNCU</th><th>K</th><th>D</th><th>A</th></tr></thead>
                                        <tbody>${teamBStats.length > 0 ? teamBStats.map(renderRow).join('') : '<tr><td colspan="5" style="color:#555;">Veri Yok</td></tr>'}</tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                }

                detailsBox.innerHTML = html;

            } catch (err) {
                console.error("İstatistik Çekme Hatası:", err);
                detailsBox.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: var(--kirmizi-iptal);">
                        <i class="fas fa-exclamation-triangle fa-3x" style="margin-bottom: 15px;"></i>
                        <p>İstatistikler yüklenirken bir hata oluştu.</p>
                    </div>`;
            }
        }

        document.querySelector('.close-btn').addEventListener('click', () => { document.body.style.overflow = 'auto'; });
        document.getElementById('matchModal').addEventListener('click', (e) => { 
            if(e.target === document.getElementById('matchModal')) document.body.style.overflow = 'auto'; 
        });

        // --- SAYFA BAŞLATICI ---
        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponents();
            if (typeof checkUserStatus === 'function') { checkUserStatus(); }
            fetchAndRenderBracket();
        });
    </script>
</body>
</html>
