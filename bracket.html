<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tam Dolu Kış Turnuvası Fikstürü | OBB E-SPOR</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        /* --- BRACKET GENEL DÜZENİ --- */
        body { background-color: #050505; color: white; overflow: hidden; /* Sayfa kaymasını kapat, wrapper kayacak */ }
        .page-header { text-align: center; padding: 20px; z-index: 100; position: relative; background: #050505; border-bottom: 1px solid #222; }
        .page-title { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .page-title span { color: var(--neon-mor); text-shadow: 0 0 20px rgba(96, 29, 194, 0.5); }
        .page-subtitle { color: var(--gri-yazi); font-size: 14px; font-weight: 500; }

        /* --- 2D SÜRÜKLE BIRAK KAYDIRMA ALANI --- */
        .bracket-scroll-area {
            width: 100vw;
            height: calc(100vh - 120px);
            overflow: auto; /* Hem dikey hem yatay scroll */
            cursor: grab;
            padding: 40px;
            user-select: none;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }
        .bracket-scroll-area:active { cursor: grabbing; }
        .bracket-scroll-area::-webkit-scrollbar { width: 10px; height: 10px; }
        .bracket-scroll-area::-webkit-scrollbar-track { background: #111; border-radius: 5px; }
        .bracket-scroll-area::-webkit-scrollbar-thumb { background: var(--neon-mor); border-radius: 5px; }

        /* --- AĞAÇ (BRACKET) MİMARİSİ --- */
        .bracket-container { 
            display: flex; 
            align-items: stretch; 
            gap: 80px; 
            min-width: max-content; 
            min-height: max-content;
            padding-bottom: 50px;
        }
        
        .bracket-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around; 
            width: 240px;
            flex-shrink: 0;
            position: relative;
        }

        .round-header {
            text-align: center; color: var(--neon-mor); font-weight: 900; text-transform: uppercase;
            font-size: 16px; letter-spacing: 2px; margin-bottom: 40px; border-bottom: 2px solid #222; padding-bottom: 10px;
        }

        /* --- MAÇ KARTI VE ÇİZGİLER (CSS SİHRİ) --- */
        .match-wrapper { position: relative; margin: 10px 0; }
        
        /* Sağ Bağlantı Çizgisi */
        .match-wrapper::after {
            content: ''; position: absolute; right: -40px; top: 50%; width: 40px; border-bottom: 2px solid #333; z-index: 1;
        }
        .bracket-column:last-child .match-wrapper::after { display: none; }
        
        /* Sol Dikey ve Yatay Bağlantı Çizgileri */
        .bracket-column:not(:first-child) .match-wrapper::before {
            content: ''; position: absolute; left: -40px; width: 40px; z-index: 1;
        }
        /* Üstteki maç için dikey inen çizgi */
        .bracket-column:not(:first-child) .match-wrapper:nth-child(odd)::before {
            border-left: 2px solid #333; height: calc(50% + 20px); top: 50%; border-top: 2px solid #333; border-bottom: none;
        }
        /* Alttaki maç için dikey çıkan çizgi */
        .bracket-column:not(:first-child) .match-wrapper:nth-child(even)::before {
            border-left: 2px solid #333; height: calc(50% + 20px); bottom: 50%; border-bottom: 2px solid #333; border-top: none;
        }

        .match-card {
            background: #0a0a0a; border: 1px solid #222; border-radius: 8px; overflow: hidden;
            position: relative; z-index: 5; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .match-card:hover { border-color: var(--neon-mor); transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(96, 29, 194, 0.5); z-index: 10; }

        .match-info-bar { background: #111; padding: 4px 8px; font-size: 10px; color: var(--gri-yazi); font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        
        .team { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
        .team:last-child { border-bottom: none; }
        
        .team-info { display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .team-logo { width: 16px; height: 16px; object-fit: contain; background: #000; border-radius: 3px; flex-shrink: 0; }
        .team-name { font-size: 12px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        
        .score { font-size: 14px; font-weight: 900; color: white; }
        
        /* Kazanan / Kaybeden Stilleri */
        .team.winner { background: rgba(96, 29, 194, 0.15); border-left: 3px solid var(--neon-mor); }
        .team.winner .team-name { color: var(--neon-mor); text-shadow: 0 0 5px rgba(96, 29, 194, 0.5); }
        .team.winner .score { color: var(--neon-mor); }
        .team.loser { opacity: 0.4; }

        .final-match { border-color: gold !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3) !important; }
        .final-match .team.winner { background: rgba(255, 215, 0, 0.15); border-left-color: gold; }
        .final-match .team.winner .team-name, .final-match .team.winner .score { color: gold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }

        /* Modal Stilleri (Kısaltılmış) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #111; color: white; padding: 40px; border-radius: 15px; border: 2px solid var(--neon-mor); font-size: 24px; font-weight: 900; text-align: center; }
    </style>
</head>
<body>

    <div class="page-header">
        <h1 class="page-title">OBB KIŞ TURNUVASI <span>FİKSTÜRÜ</span></h1>
        <p class="page-subtitle">64 Takım | Tüm Maçlar Tamamlandı</p>
    </div>

    <div class="bracket-scroll-area" id="bracketWrapper">
        <div class="bracket-container" id="bracketContainer">
            </div>
    </div>

    <div class="modal-overlay" id="matchModal" onclick="this.classList.remove('active')">
        <div class="modal-content">
            Maç Detayları ve K/D/A İstatistikleri Burada Görünecek.
            <div style="font-size: 14px; color: var(--gri-yazi); margin-top: 15px; font-weight: normal;">(Kapatmak için tıklayın)</div>
        </div>
    </div>

    <script>
        // --- 1. SAHTE TAKIM ÜRETİCİ (64 TAKIM) ---
        const proTeams = ["BOSSESPOR", "BBL ESPORTS", "FUT ESPORTS", "S2G ESPORTS", "FIRE FLUX", "GALATASARAY", "FENERBAHÇE", "BEŞİKTAŞ", "HOWL", "SURVIVOR", "TEAM LIQUID", "NAVI"];
        let allTeams = [];
        for(let i = 0; i < 64; i++) {
            if(proTeams[i]) allTeams.push(proTeams[i]);
            else allTeams.push(`TAKIM ${i + 1}`);
        }

        // --- 2. RASTGELE SKOR VE KAZANAN HESAPLAYICI ---
        function simulateMatch(teamA, teamB, format) {
            const isBo3 = format === 'BO3' || format === 'BO5';
            const winScore = isBo3 ? 2 : 13;
            const loseScore = isBo3 ? Math.floor(Math.random() * 2) : Math.floor(Math.random() * 12);
            
            const aWins = Math.random() > 0.5;
            return {
                winner: aWins ? teamA : teamB,
                loser: aWins ? teamB : teamA,
                scoreA: aWins ? winScore : loseScore,
                scoreB: aWins ? loseScore : winScore
            };
        }

        // --- 3. AĞAÇ OLUŞTURUCU MOTOR ---
        function generateFullBracket() {
            const container = document.getElementById('bracketContainer');
            
            const roundsConfig = [
                { name: 'SON 64 (R1)', format: 'BO1' },
                { name: 'SON 32 (R2)', format: 'BO1' },
                { name: 'SON 16 (R3)', format: 'BO3' },
                { name: 'ÇEYREK FİNAL', format: 'BO3' },
                { name: 'YARI FİNAL', format: 'BO3' },
                { name: 'BÜYÜK FİNAL 🏆', format: 'BO5' }
            ];

            let currentTeams = [...allTeams];
            let html = '';

            roundsConfig.forEach((round, roundIndex) => {
                const isFinal = roundIndex === roundsConfig.length - 1;
                html += `<div class="bracket-column"><div class="round-header" ${isFinal ? 'style="color:gold;"' : ''}>${round.name}</div>`;
                
                let nextRoundTeams = [];
                
                for(let i = 0; i < currentTeams.length; i += 2) {
                    const tA = currentTeams[i];
                    const tB = currentTeams[i+1];
                    const result = simulateMatch(tA, tB, round.format);
                    
                    nextRoundTeams.push(result.winner);

                    const classA = result.winner === tA ? 'winner' : 'loser';
                    const classB = result.winner === tB ? 'winner' : 'loser';
                    const finalClass = isFinal ? 'final-match' : '';

                    html += `
                        <div class="match-wrapper">
                            <div class="match-card ${finalClass}" onclick="document.getElementById('matchModal').classList.add('active')">
                                <div class="match-info-bar"><span>${round.format}</span><span>BİTTİ</span></div>
                                <div class="team ${classA}">
                                    <div class="team-info"><img src="https://via.placeholder.com/20" class="team-logo"><span class="team-name">${tA}</span></div>
                                    <span class="score">${result.scoreA}</span>
                                </div>
                                <div class="team ${classB}">
                                    <div class="team-info"><img src="https://via.placeholder.com/20" class="team-logo"><span class="team-name">${tB}</span></div>
                                    <span class="score">${result.scoreB}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
                html += `</div>`;
                currentTeams = nextRoundTeams; // Kazananlar bir sonraki tura geçer
            });

            container.innerHTML = html;
        }

        // AĞACI EKRANA BAS
        generateFullBracket();

        // --- 4. 2 BOYUTLU (X ve Y) SÜRÜKLE BIRAK KAYDIRMA ---
        const slider = document.getElementById('bracketWrapper');
        let isDown = false;
        let startX, startY;
        let scrollLeft, scrollTop;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.style.cursor = 'grabbing';
            startX = e.pageX - slider.offsetLeft;
            startY = e.pageY - slider.offsetTop;
            scrollLeft = slider.scrollLeft;
            scrollTop = slider.scrollTop;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; slider.style.cursor = 'grab'; });
        slider.addEventListener('mouseup', () => { isDown = false; slider.style.cursor = 'grab'; });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const y = e.pageY - slider.offsetTop;
            const walkX = (x - startX) * 2; // Hız çarpanı
            const walkY = (y - startY) * 2;
            slider.scrollLeft = scrollLeft - walkX;
            slider.scrollTop = scrollTop - walkY;
        });
        
        // İlk açılışta ortalamak istersen (Opsiyonel)
        window.onload = () => {
            slider.scrollTop = (slider.scrollHeight - slider.clientHeight) / 2;
        };
    </script>
</body>
</html>
