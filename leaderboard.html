<head>

    <style>
        html, body { background-color: #050505; color: white; overflow-x: hidden; width: 100%; max-width: 100vw; margin: 0; padding: 0; }

        /* --- SAYFA BAŞLIĞI VE TASARIMI --- */
        .page-header { text-align: center; padding: 150px 20px 40px; background: radial-gradient(circle at top, #110522 0%, #050505 100%); border-bottom: 1px solid #222; position: relative; }
        .page-title { font-size: clamp(2.2rem, 4vw, 3.8rem); font-weight: 900; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; }
        .page-title span { color: var(--neon-mor); text-shadow: 0 0 25px rgba(96, 29, 194, 0.6); }
        .page-subtitle { color: var(--gri-yazi); font-size: 15px; font-weight: 500; max-width: 650px; margin: 0 auto; line-height: 1.6; }

        /* --- FİLTRE DROPDOWN --- */
        .filter-container { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px; margin-top: 30px; }
        .filter-label { font-size: 13px; font-weight: bold; color: var(--gri-yazi); text-transform: uppercase; }
        .sort-select { background: #0a0a0a; border: 1px solid var(--neon-mor); color: white; padding: 12px 25px; border-radius: 8px; font-weight: 900; font-size: 14px; cursor: pointer; outline: none; font-family: 'Poppins', sans-serif; box-shadow: 0 0 15px rgba(96, 29, 194, 0.2); transition: 0.3s; }
        .sort-select:hover, .sort-select:focus { background: #111; border-color: white; box-shadow: 0 0 20px rgba(96, 29, 194, 0.5); }

        .leaderboard-container { max-width: 1200px; margin: 0 auto; padding: 40px 5% 80px; min-height: 60vh; display: flex; flex-direction: column; width: 100%; box-sizing: border-box; }

        /* --- İLK 3 PODYUM TASARIMI --- */
        .podium-wrapper { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 80px; margin-top: 40px; }
        .podium-card { background: #0a0a0a; border: 1px solid #333; border-radius: 16px; padding: 30px 20px; text-align: center; width: 240px; position: relative; transition: 0.3s; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .podium-card:hover { transform: translateY(-5px) scale(1.02) !important; z-index: 10; }
        
        .podium-1 { border-color: gold; box-shadow: 0 0 30px rgba(255, 215, 0, 0.15); transform: scale(1.15); z-index: 3; background: linear-gradient(180deg, rgba(255,215,0,0.08) 0%, rgba(10,10,10,1) 100%); }
        .podium-2 { border-color: silver; box-shadow: 0 0 20px rgba(192, 192, 192, 0.1); z-index: 2; height: 95%; background: linear-gradient(180deg, rgba(192,192,192,0.05) 0%, rgba(10,10,10,1) 100%); }
        .podium-3 { border-color: #cd7f32; box-shadow: 0 0 20px rgba(205, 127, 50, 0.1); z-index: 1; height: 90%; background: linear-gradient(180deg, rgba(205,127,50,0.05) 0%, rgba(10,10,10,1) 100%); }

        .rank-badge { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: 900; color: black; box-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .podium-1 .rank-badge { background: linear-gradient(135deg, #FFDF00, #D4AF37); }
        .podium-2 .rank-badge { background: linear-gradient(135deg, #E0E0E0, #9E9E9E); }
        .podium-3 .rank-badge { background: linear-gradient(135deg, #CD7F32, #8B4513); color: white;}

        .player-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #333; background: #111; padding: 3px; }
        .podium-1 .player-avatar { border-color: gold; width: 110px; height: 110px; }
        .podium-2 .player-avatar { border-color: silver; }
        .podium-3 .player-avatar { border-color: #cd7f32; }

        .player-ign { font-size: 22px; font-weight: 900; color: white; margin-bottom: 2px; text-transform: uppercase; word-break: break-word; line-height: 1.2; }
        .player-name { font-size: 12px; color: var(--gri-yazi); margin-bottom: 15px; font-weight: 500; }
        
        .stat-highlight { font-size: 32px; font-weight: 900; color: var(--neon-mor); line-height: 1; margin-bottom: 5px; }
        .podium-1 .stat-highlight { color: gold; text-shadow: 0 0 15px rgba(255,215,0,0.5); font-size: 38px;}
        
        .stat-label-small { font-size: 11px; color: var(--gri-yazi); font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; }

        /* --- LİSTE TASARIMI (4. Sıra ve Sonrası) --- */
        .table-wrapper { width: 100%; background: #0a0a0a; border: 1px solid #222; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); animation: fadeIn 0.5s ease; overflow: hidden; }
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        
        .leaderboard-table th { padding: 20px 15px; background: #111; color: var(--gri-yazi); font-weight: 900; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; border-bottom: 2px solid #333; white-space: nowrap; }
        .leaderboard-table td { padding: 15px; border-bottom: 1px solid #1a1a1a; color: white; font-weight: 500; vertical-align: middle; transition: 0.2s; }
        
        .leaderboard-table tr:hover td { background: rgba(96, 29, 194, 0.08); }
        .leaderboard-table tr:last-child td { border-bottom: none; }

        .list-rank-cell { font-size: 18px; font-weight: 900; color: #666; width: 60px; }
        
        .player-cell { display: flex; align-items: center; gap: 15px; text-align: left; }
        .list-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #333; background: #111; padding: 2px; transition: 0.3s; }
        .leaderboard-table tr:hover .list-avatar { border-color: var(--neon-mor); transform: scale(1.1); }
        
        .list-ign { font-size: 15px; font-weight: 900; color: white; text-transform: uppercase; }
        .list-name { font-size: 11px; color: var(--gri-yazi); }

        .primary-stat { font-size: 18px; font-weight: 900; color: var(--neon-mor); }
        .good-stat { color: #ccc; font-weight: bold; }
        
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ==================================================
             MOBİL UYUMLULUK (Ekrana Tam Sığdırma)
        ================================================== */
        @media (max-width: 900px) {
            .page-header { padding: 130px 15px 30px; }
            .page-title { font-size: 26px; }
            .filter-container { flex-direction: column; gap: 10px; }
            .sort-select { width: 100%; max-width: 300px; text-align: center; }

            /* Podyum Mobilde Alt Alta Dizilir */
            .podium-wrapper { align-items: center; flex-direction: column; gap: 40px; margin-top: 50px; margin-bottom: 50px; }
            .podium-card { width: 100%; max-width: 320px; height: auto !important; transform: none !important; }
            .podium-card:hover { transform: translateY(-5px) !important; }
            
            .podium-1 { order: 1; }
            .podium-2 { order: 2; }
            .podium-3 { order: 3; }
            
            .podium-1 .player-avatar { width: 90px; height: 90px; }
            .podium-1 .stat-highlight { font-size: 32px; }

            /* Tablo Mobil İyileştirmeleri (Kaydırmayı Kapatıp Ekrana Sığdırma) */
            .table-wrapper { border-radius: 12px; }
            .leaderboard-table { width: 100%; table-layout: auto; } 
            
            /* Mobilde iç boşlukları (padding) daraltıyoruz */
            .leaderboard-table th, .leaderboard-table td { padding: 12px 5px; font-size: 12px; letter-spacing: 0; }
            .leaderboard-table th:first-child, .leaderboard-table td:first-child { padding-left: 10px; }
            .leaderboard-table th:last-child, .leaderboard-table td:last-child { padding-right: 10px; }
            
            .list-rank-cell { font-size: 14px; width: 30px; }
            .player-cell { gap: 8px; }
            .list-avatar { width: 32px; height: 32px; border-width: 1px; }
            
            /* İsimler çok uzunsa alt satıra geçmesin, ... ile kesilsin */
            .list-ign { font-size: 12px; max-width: 75px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
            .list-name { font-size: 10px; max-width: 75px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            
            .primary-stat { font-size: 14px; }
            .good-stat { font-size: 12px; }
            
            /* K/D/A ve MAÇ sütununu mobilde tamamen gizle ki ana sayılar rahat sığsın */
            .hide-mobile { display: none !important; }
        }

        /* Daha da dar ekranlar (iPhone SE vb.) için ekstra sıkıştırma */
        @media (max-width: 380px) {
            .leaderboard-table th, .leaderboard-table td { padding: 10px 3px; font-size: 11px; }
            .list-ign, .list-name { max-width: 60px; }
            .list-avatar { width: 28px; height: 28px; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-trophy fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>İstatistikler Hesaplanıyor...</h2>
    </div>

    <div id="header-alani"></div>

    <div class="page-header">
        <h1 class="page-title">OBB E-SPORTS <span>LİDERLİK TABLOSU</span></h1>
        <p class="page-subtitle">Turnuvanın en tehlikeli, en keskin nişancıları ve takımını zafere taşıyan oyuncuları.</p>
        
        <div class="filter-container">
            <span class="filter-label">Sıralama Ölçütü:</span>
            <select id="sortSelect" class="sort-select" onchange="fetchLeaderboard()">
                <option value="avg_acs">🔥 Ortalama ACS (Çatışma Skoru)</option>
                <option value="kd_ratio">🎯 K/D Oranı (Kill/Death)</option>
                <option value="kpr">⚡ KPR (Raunt Başına Kill)</option>
                <option value="total_kills">💀 Toplam Kill</option>
            </select>
        </div>
    </div>

    <main class="leaderboard-container">
        
        <div class="podium-wrapper" id="podiumArea">
            </div>

        <div class="table-wrapper">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th class="list-rank-cell">#</th>
                        <th style="text-align: left;">E-SPORCU</th>
                        <th class="hide-mobile">MAÇ</th>
                        <th id="th-acs" style="color:var(--neon-mor);">ACS</th>
                        <th id="th-kd">K/D</th>
                        <th id="th-kpr">KPR</th>
                        <th class="hide-mobile">K / D / A</th>
                    </tr>
                </thead>
                <tbody id="tableBodyArea">
                    </tbody>
            </table>
        </div>

    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script> 

    <script>
        async function loadComponents() {
            try {
                const headerRes = await fetch("components/header.html");
                if(headerRes.ok) document.getElementById('header-alani').innerHTML = await headerRes.text();
                
                const footerRes = await fetch("components/footer.html");
                if(footerRes.ok) document.getElementById('footer-alani').innerHTML = await footerRes.text();
            } catch(e) { console.error("Komponent yüklenemedi", e); }
        }

        function getMetricLabel(sortBy) {
            if(sortBy === 'avg_acs') return 'ORT. ACS';
            if(sortBy === 'kd_ratio') return 'K/D ORANI';
            if(sortBy === 'kpr') return 'KPR';
            if(sortBy === 'total_kills') return 'TOPLAM KILL';
            return 'SKOR';
        }

        function updateTableHeaders(sortBy) {
            const headers = ['th-acs', 'th-kd', 'th-kpr'];
            headers.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.style.color = 'var(--gri-yazi)';
            });
            
            if(sortBy === 'avg_acs') document.getElementById('th-acs').style.color = 'var(--neon-mor)';
            if(sortBy === 'kd_ratio') document.getElementById('th-kd').style.color = 'var(--neon-mor)';
            if(sortBy === 'kpr') document.getElementById('th-kpr').style.color = 'var(--neon-mor)';
        }

        async function fetchLeaderboard() {
            const sortBy = document.getElementById('sortSelect').value;
            const metricLabel = getMetricLabel(sortBy);
            updateTableHeaders(sortBy);
            
            document.getElementById('podiumArea').innerHTML = '';
            document.getElementById('tableBodyArea').innerHTML = '<tr><td colspan="7" style="padding:40px;"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--neon-mor);"></i><br><br>Veriler yükleniyor...</td></tr>';

            try {
                const { data: players, error } = await window.supabaseClient
                    .from('vw_leaderboard_stats')
                    .select('*')
                    .order(sortBy, { ascending: false })
                    .limit(50); 

                if (error) throw error;

                if (!players || players.length === 0) {
                    document.getElementById('podiumArea').innerHTML = '<p style="color:#555; font-size: 18px;">Henüz istatistik bulunmuyor.</p>';
                    document.getElementById('tableBodyArea').innerHTML = '';
                    return;
                }

                renderPodium(players.slice(0, 3), sortBy, metricLabel);
                renderTable(players.slice(3), sortBy);

            } catch (err) {
                console.error("Liderlik tablosu çekilemedi:", err);
                document.getElementById('tableBodyArea').innerHTML = '<tr><td colspan="7" style="color:red; padding: 30px;">Veriler yüklenirken hata oluştu. Lütfen sayfayı yenileyin.</td></tr>';
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        function renderPodium(topPlayers, sortBy, metricLabel) {
            const podiumArea = document.getElementById('podiumArea');
            let html = '';

            const positions = [
                { rank: 2, data: topPlayers[1], class: 'podium-2' },
                { rank: 1, data: topPlayers[0], class: 'podium-1' },
                { rank: 3, data: topPlayers[2], class: 'podium-3' }
            ];

            positions.forEach(pos => {
                if (!pos.data) return; 
                
                const p = pos.data;
                const avatar = p.avatar_url || 'img/default-avatar.png';
                const ign = p.ign || p.username;
                const scoreValue = p[sortBy]; 

                html += `
                    <div class="podium-card ${pos.class}">
                        <div class="rank-badge">${pos.rank}</div>
                        <img src="${avatar}" class="player-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${ign}&background=111&color=fff&size=150&bold=true'">
                        <div class="player-ign">${ign}</div>
                        <div class="player-name">@${p.username}</div>
                        <div class="stat-highlight">${scoreValue}</div>
                        <div class="stat-label-small">${metricLabel}</div>
                    </div>
                `;
            });

            podiumArea.innerHTML = html;
        }

        function renderTable(listPlayers, sortBy) {
            const tableArea = document.getElementById('tableBodyArea');
            let html = '';

            if(listPlayers.length === 0) {
                tableArea.innerHTML = '<tr><td colspan="7" style="color:#555; padding: 30px;">Diğer sıralamalar için yeterli oyuncu bulunmuyor.</td></tr>';
                return;
            }

            listPlayers.forEach((p, index) => {
                const rank = index + 4; 
                const avatar = p.avatar_url || 'img/default-avatar.png';
                const ign = p.ign || p.username;

                html += `
                    <tr>
                        <td class="list-rank-cell">${rank}</td>
                        <td>
                            <div class="player-cell">
                                <img src="${avatar}" class="list-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${ign}&background=111&color=fff&size=100&bold=true'">
                                <div>
                                    <div class="list-ign" title="${ign}">${ign}</div>
                                    <div class="list-name">@${p.username}</div>
                                </div>
                            </div>
                        </td>
                        <td class="hide-mobile">${p.maps_played}</td>
                        <td class="${sortBy === 'avg_acs' ? 'primary-stat' : 'good-stat'}">${p.avg_acs}</td>
                        <td class="${sortBy === 'kd_ratio' ? 'primary-stat' : 'good-stat'}">${p.kd_ratio}</td>
                        <td class="${sortBy === 'kpr' ? 'primary-stat' : 'good-stat'}">${p.kpr}</td>
                        <td class="hide-mobile" style="color:#888;">${p.total_kills} / ${p.total_deaths} / ${p.total_assists}</td>
                    </tr>
                `;
            });

            tableArea.innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponents();
            if (typeof checkUserStatus === 'function') { checkUserStatus(); }
            fetchLeaderboard();
        });
    </script>
</body>
</html>
