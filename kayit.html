        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .auth-card { flex: 1; background: rgba(10, 10, 10, 0.95); padding: 40px; border-radius: 20px; border: 1px solid #222; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 5; }

        .input-group input { width: 100%; padding: 12px 15px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--neon-mor); }
        
        /* Tarih seçici ikonunu karanlık temaya uygun hale getirmek için */
        input[type="date"] { color-scheme: dark; }
        
        /* ŞİFREMİ UNUTTUM BUTONU STİLİ */
        .forgot-pass-link { display: none; text-align: right; margin-top: -10px; margin-bottom: 20px; font-size: 12px; font-weight: bold; color: var(--neon-mor); text-decoration: none; transition: 0.3s; cursor: pointer; }
        .forgot-pass-link:hover { text-shadow: 0 0 10px var(--neon-mor); }

        /* SÖZLEŞME CHECKBOX STİLLERİ */
        .kvkk-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 15px; }
        .kvkk-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--neon-mor); margin-top: 2px; flex-shrink: 0; }
        .kvkk-label { font-size: 12px; color: var(--gri-yazi); line-height: 1.4; margin: 0; }
        .kvkk-link { color: var(--neon-mor); font-weight: bold; text-decoration: underline; cursor: pointer; transition: 0.3s; }
        .kvkk-link:hover { text-shadow: 0 0 10px var(--neon-mor); color: #fff; }

        .register-btn { width: 100%; padding: 15px; background: var(--neon-mor); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-bottom: 20px; margin-top: 10px; }
        .register-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-mor); }
        .register-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .auth-toggle-area { text-align: center; border-top: 1px solid #222; padding-top: 20px; }
        .switch-btn { background: transparent; border: 1px solid #23083e; color: var(--neon-mor); padding: 8px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px); padding: 20px; }

        .modal-body::-webkit-scrollbar-thumb { background: var(--neon-mor); border-radius: 4px; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

                title: "KİŞİSEL VERİLERİN İŞLENMESİNE İLİŞKİN AYDINLATMA METNİ",
                body: `
                    <h4>1. Veri Sorumlusunun Kimliği ve Temsilcisi</h4>
                    <p>6698 sayılı Kişisel Verilerin Korunması Kanunu m. 10 ve ilgili Aydınlatma Rehberi uyarınca, OBB E-SPOR olarak, veri sorumlusu sıfatıyla, tarafınıza ait kişisel verilerin hukuka, dürüstlük kurallarına uygun, belirli, açık ve meşru amaçlarla bağlantılı, sınırlı ve ölçülü olarak işleneceğini beyan ederiz.</p>
                    <p><strong>Merkez Adresi:</strong> Ordu Büyükşehir Belediyesi Şarkiye Mahallesi Yükçülük Sokak No:2 52100 Altınordu / ORDU<br>
                    <strong>İletişim E-posta:</strong> obbesports@gmail.com</p>

                    <h4>2. İşlenen Kişisel Veri Kategorileri</h4>
                    <p>Platformumuz üzerinden üyelik oluşturmanız, e-spor turnuvalarına katılmanız ve topluluk içi iletişim araçlarını kullanmanız süreçlerinde aşağıdaki kişisel veri kategorileriniz tamamen veya kısmen otomatik yollarla işlenmektedir:</p>
                    <ul>
                        <li><strong>Kimlik ve İletişim Verileri:</strong> Ad, soyad, e-posta adresi, cep telefonu numarası ve Türkiye Cumhuriyeti kanunları kapsamındaki yasal yaş doğrulama yükümlülükleri gereği talep edilen yaş/doğum tarihi ve kimlik doğrulama statüsü bilgileri.</li>
                        <li><strong>İşlem Güvenliği ve Cihaz Verileri:</strong> IP adresi, MAC adresi, donanım kimliği (Hardware ID / HWID), işletim sistemi mimarisi, log kayıtları, cihaz türü ve sunucu bağlantı zaman damgaları.</li>
                        <li><strong>Müşteri İşlem ve Performans Verileri:</strong> Turnuva katılım bedellerine ilişkin finansal işlemler ve fatura bilgileri (Kredi kartı verileri Platformumuz sunucularında saklanmamakta, yalnızca PCI-DSS sertifikalı bağımsız ödeme kuruluşları üzerinden tokenize edilerek işlenmektedir).</li>
                        <li><strong>Oyun İçi Davranış ve Telemetri Verileri:</strong> Üçüncü parti oyun geliştiricilerinin (Valorant, CS:GO, LoL vb.) sağladığı turnuva API'leri ve maç sonu istatistikleri üzerinden elde edilen oyun içi performans istatistikleri (galibiyet/mağlubiyet kayıtları, KDA vb.) ve platform içi yazılı/sesli İletişim kayıtları.</li>
                        <li><strong>Görsel ve İşitsel Veriler:</strong> Fiziki veya çevrimiçi e-spor turnuvalarına katılımınız halinde; oyuncu avatar fotoğrafları, sesli komuta sohbet kayıtları, turnuva canlı yayınları sırasında elde edilen web kamerası görüntüleri ve müsabaka içi karakter hareketleri.</li>
                    </ul>

                    <h4>3. Kişisel Verilerin İşlenme Amaçları</h4>
                    <p>Toplanan kişisel verileriniz, KVKK m. 4'te belirtilen genel ilkelere uygun olarak yalnızca aşağıda sayılan belirli ve meşru amaçlar dahilinde işlenmektedir:</p>
                    <ul>
                        <li>Kullanıcı hesaplarının oluşturulması, bireysel profillerin yönetilmesi ve platform içi iletişimin sağlanması,</li>
                        <li>5651 sayılı İnternet Ortamında Yapılan Yayınların Düzenlenmesi Hakkında Kanun ve ilgili mevzuat kapsamında, 15 yaşından küçük bireylerin platforma kaydolmasının engellenmesi amacıyla zorunlu yaş doğrulama işlemlerinin gerçekleştirilmesi,</li>
                        <li>Turnuva ve etkinlik katılım ücretleri gibi finansal operasyonların yürütülmesi ve faturalandırma süreçlerinin tamamlanması,</li>
                        <li>Oyun ekosisteminin bütünlüğünü korumak adına, üçüncü parti oyunların kendi hile koruma sistemleri (Anti-Cheat) tarafından tespit edilen ihlallerin platforma yansıtılması ve platform içi siber zorbalığın önlenerek adil oyun (fair play) kurallarının tatbiki,</li>
                        <li>E-spor liglerinin ve resmi turnuvalarının organizasyonu, adil eşleştirme (matchmaking) sistemlerinin çalıştırılması ve oyuncu sıralamalarının belirlenmesi,</li>

                    </ul>

                    <h4>4. Kişisel Veri Toplamanın Yöntemi ve Hukuki Sebebi</h4>
                    <p>Kişisel verileriniz; web sitemizdeki üyelik formları, platform içi iletişim panelleri ve üçüncü parti oyun geliştiricilerinin (Riot Games, Valve vb.) sağladığı resmi turnuva API'leri aracılığıyla elektronik ortamda, kısmen veya tamamen otomatik yollarla elde edilmektedir.</p>
                    <p>Verilerinizin işlenmesi, KVKK'nın 5. maddesinde yer alan aşağıdaki açık hukuki sebeplere dayanmaktadır:</p>

                        <li><strong>KVKK m. 5/2-ç uyarınca;</strong> "Veri sorumlusunun hukuki yükümlülüğünü yerine getirebilmesi için zorunlu olması" (5651 sayılı Kanun kapsamındaki yaş doğrulama, log tutma ve yasal bilgi sağlama yükümlülükleri),</li>
                        <li><strong>KVKK m. 5/2-e uyarınca;</strong> "Bir hakkın tesisi, kullanılması veya korunması için veri işlemenin zorunlu olması" (Olası hukuki uyuşmazlıklarda delillerin muhafazası),</li>
                        <li><strong>KVKK m. 5/2-f uyarınca;</strong> "İlgili kişinin temel hak ve özgürlüklerine zarar vermemek kaydıyla, veri sorumlusunun meşru menfaatleri için veri işlenmesinin zorunlu olması" (Platformun siber güvenliğinin sağlanması, haksız rekabetin önlenmesi ve adil oyun kurallarının tatbiki).</li>
                    </ul>
                    <p>Profesyonel e-spor etkinlikleri kapsamında reklam, pazarlama, canlı yayın ve sponsorluk amaçlarıyla görsel ve işitsel kayıtlarınızın ticari olarak kullanılması ise yalnızca tarafınızdan ayrıca alınacak Açık Rıza (KVKK m. 5/1) doğrultusunda gerçekleştirilecektir.</p>

                    <h4>5. İşlenen Kişisel Verilerin Kimlere ve Hangi Amaçla Aktarılabileceği</h4>
                    <p>Kişisel verileriniz, yukarıda belirtilen meşru amaçların gerçekleştirilmesi doğrultusunda ve KVKK'nın 8. ve 9. maddelerindeki katı koşullara riayet edilerek aktarılmaktadır:</p>
                    <ul>
                        <li><strong>Yurt İçi Aktarım (KVKK m. 8):</strong> Yasal yükümlülüklerimizin yerine getirilmesi amacıyla kanunen yetkili kamu kurumlarına (BTK, Adli Makamlar), ödeme işlemleri ve dolandırıcılık tespiti için BDDK lisanslı ödeme hizmeti sağlayıcılarına, finansal denetim ve beyanname süreçleri amacıyla bağımsız mali müşavirlere aktarılmaktadır.</li>
                        <li><strong>Yurt Dışı Aktarım (KVKK m. 9):</strong> Platformumuzun kesintisiz ve küresel çapta hizmet verebilmesi amacıyla; sunucu barındırma (server hosting), bulut veri tabanı yönetimi ve iletişim/topluluk (örn: Discord) altyapısı hizmeti alınan yurt dışında mukim çok uluslu teknoloji tedarikçilerine aktarılmaktadır.</li>
                    </ul>

                    <h4>6. KVKK Madde 11 Kapsamındaki Kanuni Haklarınız</h4>
                    <p>Kişisel veri sahibi olarak, bize dilediğiniz zaman başvurarak KVKK m. 11 kapsamındaki haklarınızı kullanabilirsiniz. Bu haklar şunlardır:</p>
                    <ul>
                        <li>Kişisel verilerinizin işlenip işlenmediğini öğrenme, işlenmişse buna ilişkin detaylı bilgi talep etme,</li>

                        <li>İşlenen verilerinizin münhasıran otomatik sistemler vasıtasıyla analiz edilmesi suretiyle aleyhinize bir sonucun ortaya çıkmasına itiraz etme,</li>
                        <li>Kişisel verilerinizin kanuna aykırı olarak işlenmesi sebebiyle fiili bir zarara uğramanız hâlinde maddi ve manevi zararın giderilmesini talep etme.</li>
                    </ul>
                    <p>Bu haklarınızı kullanmak için taleplerinizi, "Veri Sorumlusuna Başvuru Usul ve Esasları Hakkında Tebliğ" uyarınca yukarıda belirtilen fiziki adresimize kimlik ispatlayıcı belgelerle birlikte yazılı olarak iletebilir, noter kanalıyla gönderebilir veya sistemimizde kayıtlı bulunan e-posta adresiniz üzerinden obbesports@gmail.com adresine elektronik posta yoluyla iletebilirsiniz.</p>
                `

                    <p>Kişisel Verilerin İşlenmesine İlişkin Aydınlatma Metni'ni okudum ve anladım. Aydınlatma metninde belirtilen yasal işleme şartları dışında kalan ve aşağıda belirtilen özel faaliyetler kapsamında kişisel verilerimin işlenmesine özgür irademle açık rıza gösteriyorum:</p>

        // MODAL AÇMA/KAPAMA FONKSİYONLARI
        function openDocModal(docType) {
            document.getElementById('docModalTitle').innerText = documentContents[docType].title;
            document.getElementById('docModalBody').innerHTML = documentContents[docType].body;
            
            document.getElementById('docModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDocModal(e) {
            if (!e || e.target.id === 'docModal' || e.target.classList.contains('close-btn')) {
                document.getElementById('docModal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // SAYFA YÜKLENDİĞİNDE ÖNBELLEK (LOCALSTORAGE) KONTROLÜ
        document.addEventListener('DOMContentLoaded', () => {
            const hasRegistered = localStorage.getItem('obb_has_registered');
            if (hasRegistered === 'true') {
                toggleAuth(true); // Giriş yap modunda aç
            }
        });

        // EKRAN DEĞİŞTİRME FONKSİYONU (Kayıt Ol <-> Giriş Yap)
        function toggleAuth(forceLogin = false) {
            let isReg;
            if (forceLogin) {
                isReg = true; 
            } else {
                isReg = document.getElementById('submitBtn').innerText === "HESABI OLUŞTUR";
            }

            document.querySelector('#authHeader h1').innerHTML = isReg ? 'HOŞ <span class="purple-neon">GELDİN</span>' : 'ARENAYA <span class="purple-neon">KATIL</span>';
            document.getElementById('authSubtext').innerText = isReg ? 'Bilgilerini gir ve arenaya dön.' : 'Profilini oluştur ve rekabete dahil ol.';
            document.getElementById('submitBtn').innerText = isReg ? "GİRİŞ YAP" : "HESABI OLUŞTUR";
            document.getElementById('switchBtn').innerText = isReg ? "KAYIT OL" : "GİRİŞ YAP";
            document.getElementById('toggleText').innerText = isReg ? "Henüz bir hesabın yok mu?" : "Zaten bir hesabın var mı?";
            
            // Kayıt alanlarını gizle/göster
            ['userGroup', 'phoneGroup', 'dobGroup', 'confirmPassGroup', 'kvkkBox1', 'kvkkBox2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = isReg ? "none" : (id.includes('kvkk') ? "flex" : "block");
            });

            document.getElementById('forgotPassBtn').style.display = isReg ? "block" : "none";
            
            // Zorunlulukları (Required) ayarla
            document.getElementById('confirmPass').required = !isReg;
            document.getElementById('dob').required = !isReg;
            document.getElementById('kvkkCheck1').required = !isReg;
            document.getElementById('kvkkCheck2').required = !isReg;
        }

        // --- ŞİFRE SIFIRLAMA İSTEĞİ GÖNDERME ---
        async function sifremiUnuttum() {
            const emailInput = document.getElementById('email').value.trim();
            if (!emailInput) {
                showNotification("Lütfen önce yukarıdaki e-posta alanını doldurun ve tekrar tıklayın.", "error");
                document.getElementById('email').focus();
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "LÜTFEN BEKLEYİN...";
            btn.disabled = true;

            const { error } = await window.supabaseClient.auth.resetPasswordForEmail(
                emailInput, 
                { redirectTo: 'https://www.obbesports.com/sifre-yenile.html' }
            );

            if (error) {
                showNotification("Hata: " + error.message, "error");
            } else {
                showNotification("Şifre sıfırlama bağlantısı e-postanıza gönderildi!", "success");
            }

            btn.innerText = originalText;
            btn.disabled = false;
        }

        // --- FORM GÖNDERME (KAYIT & GİRİŞ) ---
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('mainPass').value;
            const submitBtn = document.getElementById('submitBtn');
            const isRegister = submitBtn.innerText === "HESABI OLUŞTUR";

            submitBtn.disabled = true; 
            submitBtn.innerText = "İŞLEM YAPILIYOR...";

            if (isRegister) {
                // 1. SÖZLEŞME KONTROLLERİ
                const kvkk1Checked = document.getElementById('kvkkCheck1').checked;
                const kvkk2Checked = document.getElementById('kvkkCheck2').checked;
                if (!kvkk1Checked || !kvkk2Checked) { 
                    showNotification("Kayıt olabilmek için tüm yasal metinleri ve sözleşmeleri onaylamalısınız!", "error"); 
                    submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; 
                }

                // 2. ŞİFRE VE KULLANICI ADI KONTROLÜ
                const confirmPass = document.getElementById('confirmPass').value;
                const usernameInput = document.getElementById('username').value.trim();
                
                if (password !== confirmPass) { showNotification("Şifreler uyuşmuyor!", "error"); submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; }
                if (!usernameInput) { showNotification("Kullanıcı adı boş bırakılamaz!", "error"); submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; }

                // 3. YAŞ (DOĞUM TARİHİ) KONTROLÜ (Sadece tarayıcıda hesaplanır, ASLA veritabanına gitmez)
                const dobVal = document.getElementById('dob').value;
                if (!dobVal) {
                    showNotification("Lütfen doğum tarihinizi giriniz.", "error"); 
                    submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; 
                }
                
                const dobDate = new Date(dobVal);
                const today = new Date();
                let age = today.getFullYear() - dobDate.getFullYear();
                const m = today.getMonth() - dobDate.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < dobDate.getDate())) { age--; }

                if (age < 15) {
                    showNotification("OBB E-SPORTS platformuna kayıt olabilmek için en az 15 yaşında olmalısınız.", "error");
                    submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; 
                }

                // 4. KULLANICI ADI MÜKERRERLİK KONTROLÜ
                const { data: existingUsers } = await window.supabaseClient.from('profiles').select('username').ilike('username', usernameInput).limit(1);
                if (existingUsers && existingUsers.length > 0) {
                    showNotification("Bu kullanıcı adı zaten alınmış!", "error"); submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return;
                }

                // 5. SUPABASE KAYIT İŞLEMİ (Burada options payload'ına DİKKAT! Sadece username ve phone var)
                // Yaş veya doğum tarihi (dobVal, age) değişkenleri Supabase'e GÖNDERİLMEZ.
                const { data, error } = await window.supabaseClient.auth.signUp({
                    email: email, 
                    password: password, 
                    options: { 
                        data: { 
                            username: usernameInput, 
                            phone: document.getElementById('phone').value 
                        } 
                    }
                });

                if (error) {
                    showNotification("Hata: " + error.message, "error");
                } else { 
                    // BAŞARILI KAYIT SONRASI ÖNBELLEĞE KAYDET
                    localStorage.setItem('obb_has_registered', 'true');
                    
                    showNotification("Kayıt başarılı! Lütfen e-postanıza (Gereksiz/Spam kutusu dahil) gelen linke tıklayarak hesabınızı doğrulayın.", "success"); 
                    setTimeout(() => toggleAuth(false), 2500); 
                }

            } else {
                // GİRİŞ YAPMA İŞLEMİ
                const { error } = await window.supabaseClient.auth.signInWithPassword({ email: email, password: password });
                
                if (error) {
                    if (error.message === "Email not confirmed") {
                        showNotification("Giriş başarısız! Lütfen önce e-postanıza gelen doğrulama linkine tıklayın.", "error");
                    } else {
                        showNotification("Giriş başarısız. Lütfen bilgilerinizi kontrol edin.", "error");
                    }
                } else { 
                    localStorage.setItem('obb_has_registered', 'true');
                    showNotification("Giriş yapıldı!", "success"); 
                    setTimeout(() => window.location.href = "index.html", 1000); 
                }
            }
            
            submitBtn.disabled = false;
            submitBtn.innerText = isRegister ? "HESABI OLUŞTUR" : "GİRİŞ YAP";
        });
    </script>
