        .auth-toggle-area { text-align: center; border-top: 1px solid #222; padding-top: 20px; }

        // SÖZLEŞME İÇERİKLERİ (Yarın burayı kendi metinlerinle değiştirebilirsin)
        const documentContents = {
            kvkk: {
                title: "KVKK AYDINLATMA METNİ",
                body: `
                    <h4>1. Veri Sorumlusu</h4>
                    <p>OBB E-SPORTS platformu olarak kişisel verilerinizin güvenliğine önem veriyoruz...</p><br>

                    <p>Kayıt esnasında alınan bilgileriniz (e-posta, kullanıcı adı, tel no) sadece sistem işleyişi için kullanılmaktadır. <b>Doğum tarihiniz veri tabanına kaydedilmemektedir.</b> Sadece yaş doğrulama amacıyla anlık olarak işlenir.</p>
                `
            },
            riza: {
                title: "AÇIK RIZA METNİ",
                body: `
                    <h4>Onay Beyanı</h4>
                    <p>OBB E-SPORTS platformuna kayıt olarak, sağladığım e-posta ve iletişim kanalları üzerinden turnuva güncellemeleri, duyurular ve bilgilendirmeler amacıyla benimle iletişime geçilmesine özgür irademle açık rıza gösteriyorum.</p>
                `
            },
            sozlesme: {
                title: "KULLANICI SÖZLEŞMESİ",
                body: `
                    KULLANICI VE HİZMET SÖZLEŞMESİ (TERMS OF SERVICE) 
Madde 1. Taraflar, Sözleşmenin Kurulması ve Kapsam 
İşbu Kullanıcı ve Hizmet Sözleşmesi ("Sözleşme"), Ordu Büyükşehir Belediyesi E-Spor (kısaca 
"OBB E-Spor" veya "Platform") ile www.obbesports.com internet sitesine, e-spor sunucularına veya 
bağlantılı dijital servislere (müştereken "Hizmetler") üye olarak kaydolan veya Hizmetleri kullanan 
gerçek kişi ("Oyuncu") arasında, dijital ortamda onaylanması anında akdedilmiştir. 
Platformun yasal iletişim adresi "Şarkiye Mahallesi Yükçülük Sokak No:2 52100 Altınordu / 
ORDU" ve resmi e-posta adresi "obbesports@gmail.com” olarak belirlenmiştir. Oyuncu, kayıt formunda 
yer alan "Kullanıcı Sözleşmesini okudum ve kabul ediyorum" butonuna tıkladığı anda, bu Sözleşmedeki 
tüm hukuki, mali ve cezai şartları gayrikabili rücu (geri alınamaz) olarak kabul ettiğini beyan eder. 
Madde 2. Yasal Yaş Sınırı, Kayıt Şartları ve Kimlik Doğrulama Yükümlülüğü  
2.1. Yasal Yaş Sınırı: Türkiye Cumhuriyeti kanunlarında yer alan emredici çocuk koruma düzenlemeleri 
ve ilgili mevzuat uyarınca, Platforma kaydolabilmek ve Hizmetleri kullanabilmek için Kullanıcının 15 (on 
beş) yaşını doldurmuş olması zorunludur. 18 (on sekiz) yaşını doldurmamış Oyuncuların platform içi 
işlemleri, turnuva kayıtları ve olası ödül alımları için yasal veli/vasisinin yazılı veya dijital (e-posta/SMS 
doğrulama) onayını sunması şarttır. Bu onayın eksikliğinden kaynaklanan hukuki ve mali sorumluluk 
tamamen Oyuncu'ya ve yasal temsilcisine aittir. 
2.2. Resmi Yaş Doğrulama Süreci: Platform, yasal yaş sınırlarına uyulduğunu teyit etmek amacıyla, 
Kullanıcının sisteme kaydolduğu esnada veya turnuva süreçlerinde kimlik ibrazı veya dijital doğrulama 
yöntemleri talep etme hakkına sahiptir. Kimlik doğrulama işlemini tamamlamayan, 15 yaşından küçük 
olduğu tespit edilen veya gerekli veli/vasi onayını sunamayan kişilerin hesapları derhal ve ön bildirimsiz 
olarak kalıcı şekilde kapatılacak, elde edilen tüm turnuva hakları ve hesap içi kazanımlar iptal edilecektir. 
2.3. Hesap Güvenliği ve Devir Yasağı: Kullanıcı, platform hesabı için belirlediği şifrenin gizliliğinden 
ve hesabında gerçekleştirilen tüm eylemlerden müteselsilen ve tek başına sorumludur. Hesabın, hesap 
içi verilerin veya sıralama/lig (rank) derecelerinin üçüncü bir kişiye devredilmesi, satılması, kiralanması 
veya ortak kullanılması (account sharing/boosting) kesinlikle yasaktır ve derhal fesih nedenidir. 
Madde 3. Sınırlı Kullanım Lisansı ve Fikri Mülkiyet Haklarının Korunması  
3.1. Sınırlı Lisans: Platform, Kullanıcıya yalnızca işbu Sözleşme şartlarına katı bir şekilde uyması 
kaydıyla; Hizmetlere erişmesi, oyunları oynaması ve kişisel, ticari olmayan amaçlarla kullanması için 
münhasır olmayan, devredilemez, alt lisanslanamaz, iptal edilebilir ve sınırlı bir dijital lisans verir.  
3.2. Fikri Mülkiyetin İhlali: Platform'un kendi web sitesi tasarımı, logoları, OBB E-Spor markası, 
yayınları, görsel arayüzleri ve ürettiği özgün içeriklerin tüm fikri ve sınai mülkiyet hakları münhasıran 
Platform'a aittir. Kullanıcı, Hizmetlerin hiçbir parçasını kopyalayamaz, kiralayamaz, değiştiremez veya 
izinsiz ticari amaçla kullanamaz. Turnuvaları düzenlenen üçüncü parti oyunların (Valorant, CS:GO, LoL 
vb.) oyun motorları, karakterleri, müzikleri ve hikaye (lore) unsurları ilgili oyun geliştiricilerine ait olup, 
Platform yalnızca turnuva düzenleyici sıfatıyla hareket etmektedir. 
Madde 4. Adil Oyun (Fair Play), Hile Koruması ve Üçüncü Parti Yazılım Yasağı  
Platform üzerinden düzenlenen turnuvalarda ve etkinliklerde adil rekabet esastır. Platform, 
rekabetçi e-spor ekosistemini korumak ve tüm oyuncular için manipülasyondan uzak bir ortam 
sağlamakla yükümlüdür. 
4.1. Hile ve Manipülasyon Yasağı: Oyuncu, rekabet edilen oyunun (Örn: Valorant, CS:GO, LoL vb.) 
kendi yayıncısı tarafından belirlenen Hizmet Şartlarına ve Hile Koruma (Anti-Cheat) kurallarına uymak 
zorundadır. Üçüncü parti hile yazılımları (aimbot, wallhack, makro, otomasyon yazılımları vb.) 
kullanmak, şike yapmak (match-fixing) veya turnuva işleyişini sabote eden herhangi bir yöntemi 
kullanmak kesinlikle yasaktır. 
4.2. Yaptırım Mekanizması: Madde 4 hükümlerinin ihlal edildiğinin turnuva hakemleri, platform 
yetkilileri veya oyun içi hile koruma sistemleri aracılığıyla tespit edilmesi durumunda OBB E-Spor; haksız 
elde edilen lig puanlarını geri alma, oyuncuyu turnuvalardan men etme, hesabı süreli/süresiz askıya 
alma ve kazanılan ödülleri iptal etme hakkını saklı tutar. 
Madde 5. Toksik Davranışlar, Topluluk Standartları ve İletişim Kuralları  
Platformun oyun içi sohbet (yazılı chat, sesli iletişim - voice comms) sistemlerinde, forumlarında 
veya e-spor lobi alanlarında, Kullanıcıların aşağıdaki yıkıcı (toxic) davranışlarda bulunması katı surette 
yasaklanmıştır:  
5.1. Nefret Söylemi ve Ayrımcılık: Irk, din, dil, cinsiyet, cinsel yönelim veya etnik köken temelli 
saldırgan ifadeler kullanmak, aşağılamak ve sistematik ötekileştirme (hate speech) yapmak.  
5.2. Siber Zorbalık ve Taciz: Diğer oyunculara, e-spor hakemlerine, Platform personeline veya üçüncü 
kişilere yönelik doğrudan tehdit, şantaj, siber zorbalık (cyberbullying) ve sistematik tacizde (griefing) 
bulunmak.  
5.3. Uygunsuz İçerik: Müstehcen, pornografik içerikli materyal paylaşmak, aşırı küfür ve argo 
kullanmak.  
5.4. Doxxing ve Mahremiyet İhlali: Başka oyuncuların gerçek kimlik bilgilerini, iletişim numaralarını 
veya adreslerini (doxxing) rızaları dışında ifşa etmek.  
5.5. Yaptırım Mekanizması: Platform moderatörleri veya yapay zeka tabanlı dil analiz sistemleri 
tarafından tespit edilen bu eylemler; geçici iletişim kısıtlamalarından (chat mute/silence), hesabın 
rekabetçi eşleştirmeden süreli men edilmesine (ranked ban) ve nihai olarak hesabın kalıcı olarak 
kapatılmasına (perma-ban) kadar giden kümülatif yaptırımlara tabidir. Asılsız yere diğer oyuncuları 
raporlamak (false reporting) da aynı yaptırımlara yol açabilir. 
Madde 6. E-Spor Turnuvaları ve Ticari Yayın Hakları  
6.1. Turnuva Kurallarına Uyum: Platform tarafından organize edilen veya desteklenen resmi e-spor 
liglerine/turnuvalarına katılan Kullanıcılar, Platform tarafından belirlenen turnuva kurallarına ve genel 
kabul görmüş e-spor davranış kurallarına uymak zorundadır.  
6.2. İmaj ve Yayın Hakları: Kullanıcı, turnuva süresince oynadığı maçların, platform içi eylemlerinin 
ve oyun içi iletişimlerinin Platform tarafından kaydedilebileceğini, canlı yayınlanabileceğini (streaming), 
t
icari amaçlarla naklen veya banttan dağıtılabileceğini ve Platform'un medya iş ortakları, sponsorları 
veya reklam verenleri ile paylaşılabileceğini kabul eder. Bu yayınlarda Kullanıcının oyuncu adının 
(nickname), avatarının ve oyun içi performansının bedelsiz, telifsiz ve süresiz olarak Platform'un ticari 
kullanımına tahsis edildiği kabul edilir. (Kişisel görüntünün ve sesin kullanımı KVKK Açık Rıza metnindeki 
onaylara tabidir). 
Madde 7. Sorumluluğun Sınırlandırılması ve Hizmet Kesintileri  
7.1. Garanti Feragati: Platform, Hizmetlerin ("olduğu gibi" ve "mevcut olduğu şekliyle" sunulur) 
kesintisiz, tamamen hatasız (bug-free) veya siber saldırılara karşı %100 korunaklı olacağını hukuken 
garanti etmez. Planlı sunucu bakım çalışmaları, yazılım güncellemeleri veya mücbir sebepler (doğal afet, 
altyapı çökmesi) nedeniyle yaşanacak erişim kesintilerinden dolayı Platform sorumlu tutulamaz.  
7.2. Yasal Erişim Engelleri ve Bant Daraltma: Türkiye Cumhuriyeti kanunlarının (özellikle 5651 sayılı 
Kanun) uygulanması, yetkili idari mercilerin (BTK, Mahkemeler) kararları veya yeni regülasyonlar 
doğrultusunda Hizmetlere erişimin tamamen engellenmesi, yasaklanması veya sunucu bant genişliğinin 
idari yaptırımla daraltılması (throttling) durumlarında, Platform, Kullanıcıya karşı hiçbir maddi tazminat 
veya sanal ürün iadesi ile yükümlü değildir. 
Madde 8. Sözleşmenin Feshi ve Hesabın Kapatılması  
8.1. Kullanıcı Tarafından Fesih: Kullanıcı, dilediği zaman müşteri hizmetleri paneli üzerinden 
hesabının kalıcı olarak silinmesini talep ederek işbu Sözleşmeyi tek taraflı feshedebilir. 
8.2. Platform Tarafından Haklı Nedenle Fesih: Platform, Kullanıcının işbu Sözleşmedeki temel 
yükümlülüklerden herhangi birini (özellikle Madde 2'deki Yaş Şartı, Madde 4'teki Hile Yasağı ve Madde 
5'teki Toksik Davranış kurallarını) ihlal ettiğini tespit etmesi halinde, Kullanıcıya herhangi bir ön 
bildirimde bulunmaksızın Sözleşmeyi tek taraflı olarak derhal feshetme, hesabı kalıcı olarak kapatma 
(banlama) ve IP/Donanım erişimini bloklama hakkına münhasıran sahiptir. 
Madde 9. Uygulanacak Hukuk ve Uyuşmazlıkların Çözüm Yeri  
İşbu Sözleşmenin kurulması, yorumlanması, ifası ve taraflar arasında doğabilecek sözleşme içi 
veya haksız fiil kaynaklı tüm uyuşmazlıklarda münhasıran Türkiye Cumhuriyeti kanunları uygulanacaktır. 
Uyuşmazlıkların çözümünde Ordu Mahkemeleri ve İcra Daireleri kesin yetkilidir. Tüketici hukuku

Madde 10. Yürürlük ve Değişiklikler  
Platform, operasyonel gereklilikler veya yasal mevzuat değişiklikleri sebebiyle işbu Sözleşme

            }

        // MODAL AÇMA/KAPAMA FONKSİYONLARI
        function openDocModal(docType) {
            document.getElementById('docModalTitle').innerText = documentContents[docType].title;
            document.getElementById('docModalBody').innerHTML = documentContents[docType].body;
            
            document.getElementById('docModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDocModal(e) {
            if (!e || e.target.id === 'docModal' || e.target.classList.contains('close-btn')) {
                document.getElementById('docModal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }

        // SAYFA YÜKLENDİĞİNDE ÖNBELLEK (LOCALSTORAGE) KONTROLÜ
        document.addEventListener('DOMContentLoaded', () => {
            const hasRegistered = localStorage.getItem('obb_has_registered');
            if (hasRegistered === 'true') {
                toggleAuth(true); // Giriş yap modunda aç
            }
        });

        // EKRAN DEĞİŞTİRME FONKSİYONU (Kayıt Ol <-> Giriş Yap)
        function toggleAuth(forceLogin = false) {
            let isReg;
            if (forceLogin) {
                isReg = true; 
            } else {
                isReg = document.getElementById('submitBtn').innerText === "HESABI OLUŞTUR";
            }

            document.querySelector('#authHeader h1').innerHTML = isReg ? 'HOŞ <span class="purple-neon">GELDİN</span>' : 'ARENAYA <span class="purple-neon">KATIL</span>';
            document.getElementById('authSubtext').innerText = isReg ? 'Bilgilerini gir ve arenaya dön.' : 'Profilini oluştur ve rekabete dahil ol.';
            document.getElementById('submitBtn').innerText = isReg ? "GİRİŞ YAP" : "HESABI OLUŞTUR";
            document.getElementById('switchBtn').innerText = isReg ? "KAYIT OL" : "GİRİŞ YAP";
            document.getElementById('toggleText').innerText = isReg ? "Henüz bir hesabın yok mu?" : "Zaten bir hesabın var mı?";
            
            // Kayıt alanlarını gizle/göster
            ['userGroup', 'phoneGroup', 'dobGroup', 'confirmPassGroup', 'kvkkBox1', 'kvkkBox2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.display = isReg ? "none" : (id.includes('kvkk') ? "flex" : "block");
            });

            document.getElementById('forgotPassBtn').style.display = isReg ? "block" : "none";
            
            // Zorunlulukları (Required) ayarla
            document.getElementById('confirmPass').required = !isReg;
            document.getElementById('dob').required = !isReg;
            document.getElementById('kvkkCheck1').required = !isReg;
            document.getElementById('kvkkCheck2').required = !isReg;
        }

        // --- ŞİFRE SIFIRLAMA İSTEĞİ GÖNDERME ---
        async function sifremiUnuttum() {
            const emailInput = document.getElementById('email').value.trim();
            if (!emailInput) {
                showNotification("Lütfen önce yukarıdaki e-posta alanını doldurun ve tekrar tıklayın.", "error");
                document.getElementById('email').focus();
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "LÜTFEN BEKLEYİN...";
            btn.disabled = true;

            const { error } = await window.supabaseClient.auth.resetPasswordForEmail(
                emailInput, 
                { redirectTo: 'https://www.obbesports.com/sifre-yenile.html' }
            );

            if (error) {
                showNotification("Hata: " + error.message, "error");
            } else {
                showNotification("Şifre sıfırlama bağlantısı e-postanıza gönderildi!", "success");
            }

            btn.innerText = originalText;
            btn.disabled = false;
        }

        // --- FORM GÖNDERME (KAYIT & GİRİŞ) ---
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('mainPass').value;
            const submitBtn = document.getElementById('submitBtn');
            const isRegister = submitBtn.innerText === "HESABI OLUŞTUR";

            submitBtn.disabled = true; 
            submitBtn.innerText = "İŞLEM YAPILIYOR...";

            if (isRegister) {
                // 1. SÖZLEŞME KONTROLLERİ
                const kvkk1Checked = document.getElementById('kvkkCheck1').checked;
                const kvkk2Checked = document.getElementById('kvkkCheck2').checked;
                if (!kvkk1Checked || !kvkk2Checked) { 
                    showNotification("Kayıt olabilmek için tüm yasal metinleri ve sözleşmeleri onaylamalısınız!", "error"); 
                    submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; 
                }

                // 2. ŞİFRE VE KULLANICI ADI KONTROLÜ
                const confirmPass = document.getElementById('confirmPass').value;
                const usernameInput = document.getElementById('username').value.trim();
                
                if (password !== confirmPass) { showNotification("Şifreler uyuşmuyor!", "error"); submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; }
                if (!usernameInput) { showNotification("Kullanıcı adı boş bırakılamaz!", "error"); submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; }

                // 3. YAŞ (DOĞUM TARİHİ) KONTROLÜ (Veritabanına kaydedilmez)
                const dobVal = document.getElementById('dob').value;
                if (!dobVal) {
                    showNotification("Lütfen doğum tarihinizi giriniz.", "error"); 
                    submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; 
                }
                
                const dobDate = new Date(dobVal);
                const today = new Date();
                let age = today.getFullYear() - dobDate.getFullYear();
                const m = today.getMonth() - dobDate.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < dobDate.getDate())) { age--; }

                if (age < 15) {
                    showNotification("OBB E-SPORTS platformuna kayıt olabilmek için en az 15 yaşında olmalısınız.", "error");
                    submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return; 
                }

                // 4. KULLANICI ADI MÜKERRERLİK KONTROLÜ
                const { data: existingUsers } = await window.supabaseClient.from('profiles').select('username').ilike('username', usernameInput).limit(1);
                if (existingUsers && existingUsers.length > 0) {
                    showNotification("Bu kullanıcı adı zaten alınmış!", "error"); submitBtn.disabled = false; submitBtn.innerText = "HESABI OLUŞTUR"; return;
                }

                // 5. SUPABASE KAYIT İŞLEMİ (Sadece username ve phone gönderilir, yaş GÖNDERİLMEZ)
                const { data, error } = await window.supabaseClient.auth.signUp({
                    email: email, 
                    password: password, 
                    options: { 
                        data: { 
                            username: usernameInput, 
                            phone: document.getElementById('phone').value 
                        } 
                    }
                });

                if (error) {
                    showNotification("Hata: " + error.message, "error");
                } else { 
                    // BAŞARILI KAYIT SONRASI ÖNBELLEĞE KAYDET
                    localStorage.setItem('obb_has_registered', 'true');
                    
                    showNotification("Kayıt başarılı! Lütfen e-postanıza (Gereksiz/Spam kutusu dahil) gelen linke tıklayarak hesabınızı doğrulayın.", "success"); 
                    setTimeout(() => toggleAuth(false), 2500); 
                }

            } else {
                // GİRİŞ YAPMA İŞLEMİ
                const { error } = await window.supabaseClient.auth.signInWithPassword({ email: email, password: password });
                
                if (error) {
                    if (error.message === "Email not confirmed") {
                        showNotification("Giriş başarısız! Lütfen önce e-postanıza gelen doğrulama linkine tıklayın.", "error");
                    } else {
                        showNotification("Giriş başarısız. Lütfen bilgilerinizi kontrol edin.", "error");
                    }
                } else { 
                    localStorage.setItem('obb_has_registered', 'true');
                    showNotification("Giriş yapıldı!", "success"); 
                    setTimeout(() => window.location.href = "index.html", 1000); 
                }
            }
            
            submitBtn.disabled = false;
            submitBtn.innerText = isRegister ? "HESABI OLUŞTUR" : "GİRİŞ YAP";
        });
    </script>
