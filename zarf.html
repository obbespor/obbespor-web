<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maç Sonucu Gönder | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    
    <style>
        body { background: #050505; color: white; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px 20px; }
        
        .zarf-container { background: #0a0a0a; border: 1px solid #222; border-radius: 20px; width: 100%; max-width: 800px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow: hidden; animation: fadeIn 0.4s ease; }
        
        .zarf-header { background: #111; padding: 20px 30px; border-bottom: 2px solid var(--neon-mor); display: flex; justify-content: space-between; align-items: center; }
        .zarf-header h2 { font-size: 22px; font-weight: 900; margin: 0; }
        .zarf-header span { color: var(--neon-mor); }
        
        .tabs { display: flex; border-bottom: 1px solid #222; background: #0d0d0d; }
        .tab-btn { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; color: var(--gri-yazi); transition: 0.3s; font-size: 14px; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--neon-mor); background: rgba(96, 29, 194, 0.1); }
        .tab-btn:hover:not(.active) { color: white; background: #111; }

        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        /* FORM STİLLERİ */
        .input-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; color: var(--gri-yazi); font-weight: bold; text-transform: uppercase; }
        .form-control { background: #000; border: 1px solid #333; color: white; padding: 12px 15px; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: bold; outline: none; transition: 0.3s; width: 100%; }
        .form-control:focus { border-color: var(--neon-mor); box-shadow: 0 0 10px rgba(96, 29, 194, 0.2); }
        
        .score-input { font-size: 24px; text-align: center; font-weight: 900; height: 60px; }
        .vs-divider { display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--gri-yazi); font-size: 20px; padding-top: 25px; }

        .file-upload-area { border: 2px dashed #444; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: #050505; margin-bottom: 30px; position: relative; }
        .file-upload-area:hover, .file-upload-area.dragover { border-color: var(--neon-mor); background: rgba(96, 29, 194, 0.05); }
        .file-upload-area i { font-size: 40px; color: var(--neon-mor); margin-bottom: 15px; }
        .file-upload-area p { color: var(--gri-yazi); font-size: 14px; margin: 0; }
        .file-input-hidden { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .preview-img { max-width: 100%; max-height: 200px; border-radius: 8px; margin-top: 15px; display: none; border: 1px solid #333; }

        .submit-btn { width: 100%; padding: 18px; background: var(--neon-mor); color: white; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(96, 29, 194, 0.4); }
        .submit-btn:disabled { background: #333; color: #777; cursor: not-allowed; box-shadow: none; transform: none; }

        /* DEPO YÖNETİMİ STİLLERİ */
        .storage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .storage-item { background: #000; border: 1px solid #333; border-radius: 10px; overflow: hidden; position: relative; transition: 0.3s; }
        .storage-item:hover { border-color: var(--kirmizi-iptal); }
        .storage-img { width: 100%; height: 120px; object-fit: cover; border-bottom: 1px solid #222; }
        .storage-info { padding: 10px; font-size: 11px; color: var(--gri-yazi); display: flex; flex-direction: column; gap: 5px; }
        .storage-info span { color: white; font-weight: bold; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-img-btn { width: 100%; background: rgba(255, 75, 75, 0.1); color: var(--kirmizi-iptal); border: none; padding: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; border-top: 1px solid #333; }
        .delete-img-btn:hover { background: var(--kirmizi-iptal); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ana-siyah); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>Güvenlik Kontrolü...</h2>
    </div>

    <div class="zarf-container">
        <div class="zarf-header">
            <h2>OBB <span>ZARF SİSTEMİ</span></h2>
            <a href="admin.html" style="color: var(--gri-yazi); text-decoration: none; font-size: 14px;"><i class="fas fa-arrow-left"></i> Panele Dön</a>
        </div>
        
        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('gonder')"><i class="fas fa-paper-plane"></i> Zarf Gönder</div>
            <div class="tab-btn" onclick="switchTab('depo')"><i class="fas fa-database"></i> Depo Yönetimi</div>
        </div>

        <div id="gonderTab" class="tab-content active">
            <form id="zarfForm">
                <div class="input-row">
                    <div class="input-group">
                        <label>Gönderen PC / Masa Adı</label>
                        <input type="text" id="pcName" class="form-control" placeholder="Örn: SAHNE-1 veya MASA-12" required>
                    </div>
                    <div class="input-group">
                        <label>Oynanan Harita</label>
                        <input type="text" id="mapName" class="form-control" placeholder="Örn: Ascent" required>
                    </div>
                </div>

                <div class="input-row" style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid #222;">
                    <div class="input-group">
                        <label style="color:#00d2ff;">SOL TAKIM (MAVİ)</label>
                        <input type="text" id="teamA" class="form-control" placeholder="Takım Adı" required>
                        <input type="number" id="scoreA" class="form-control score-input" placeholder="0" required min="0">
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="input-group">
                        <label style="color:#ff4b4b;">SAĞ TAKIM (KIRMIZI)</label>
                        <input type="text" id="teamB" class="form-control" placeholder="Takım Adı" required>
                        <input type="number" id="scoreB" class="form-control score-input" placeholder="0" required min="0">
                    </div>
                </div>

                <div class="file-upload-area" id="dropZone">
                    <input type="file" id="proofImage" class="file-input-hidden" accept="image/png, image/jpeg, image/jpg, image/webp" required>
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p><b>Maç Sonu Görselini Yükle</b></p>
                    <p style="font-size: 11px; margin-top:5px;">Sürükle bırak, CTRL+V ile yapıştır veya tıklayarak seç (Max 2MB)</p>
                    <img id="imagePreview" class="preview-img">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-rocket"></i> Verileri Fırlat</button>
            </form>
        </div>

        <div id="depoTab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <p style="color: var(--gri-yazi); font-size: 13px; margin: 0;">10 günden eski görselleri manuel olarak silerek sunucuda yer açabilirsiniz.</p>
                <button onclick="loadStorageImages()" style="background:transparent; border:1px solid var(--neon-mor); color:var(--neon-mor); padding:8px 15px; border-radius:8px; cursor:pointer;"><i class="fas fa-sync"></i> Yenile</button>
            </div>
            
            <div id="storageList" class="storage-grid">
                </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>

    <script>
        let selectedFile = null;

        async function initZarfPage() {
            try {
                if (!window.supabaseClient) throw new Error("Supabase bağlantısı yok.");
                
                const { data: { user }, error: authError } = await window.supabaseClient.auth.getUser();
                if (authError || !user) throw new Error("Giriş yapılmadı.");

                const { data: profile, error: profileError } = await window.supabaseClient.from('profiles').select('role').eq('id', user.id).single();
                
                if (profileError || profile.role !== 'admin') {
                    window.location.replace("index.html"); // Admin değilse anında kov!
                    return;
                }

                document.getElementById('loadingScreen').style.display = 'none';
            } catch (err) {
                window.location.replace("index.html");
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tabId + 'Tab').classList.add('active');

            if(tabId === 'depo') loadStorageImages();
        }

        // Dosya Yükleme ve Önizleme (Sürükle-Bırak & CTRL+V desteği)
        const fileInput = document.getElementById('proofImage');
        const imgPreview = document.getElementById('imagePreview');
        const dropZone = document.getElementById('dropZone');

        fileInput.addEventListener('change', handleFileSelect);
        
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if(e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFileSelect(); }
        });

        document.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(blob);
                    fileInput.files = dataTransfer.files;
                    handleFileSelect();
                }
            }
        });

        function handleFileSelect() {
            if (fileInput.files && fileInput.files[0]) {
                selectedFile = fileInput.files[0];
                if (selectedFile.size > 2 * 1024 * 1024) {
                    showNotification("Dosya boyutu çok büyük (Max 2MB)", "error");
                    fileInput.value = ""; selectedFile = null; imgPreview.style.display = 'none';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgPreview.src = e.target.result;
                    imgPreview.style.display = 'inline-block';
                }
                reader.readAsDataURL(selectedFile);
            }
        }

        // FORMU GÖNDERME
        document.getElementById('zarfForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!selectedFile) return showNotification("Lütfen bir görsel yükleyin.", "error");

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gönderiliyor...';
            btn.disabled = true;

            try {
                // 1. Resmi Storage'a Yükle
                const fileExt = selectedFile.name.split('.').pop().toLowerCase();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                
                const { error: uploadError } = await window.supabaseClient.storage
                    .from('match-proofs')
                    .upload(fileName, selectedFile, { cacheControl: '3600', upsert: false });

                if (uploadError) throw uploadError;

                const { data: publicUrlData } = window.supabaseClient.storage.from('match-proofs').getPublicUrl(fileName);
                const imageUrl = publicUrlData.publicUrl;

                // 2. JSON Verisini Hazırla
                const matchData = {
                    teamA: document.getElementById('teamA').value,
                    teamB: document.getElementById('teamB').value,
                    scoreA: parseInt(document.getElementById('scoreA').value),
                    scoreB: parseInt(document.getElementById('scoreB').value),
                    mapName: document.getElementById('mapName').value,
                    proofImage: imageUrl,
                    storageFileName: fileName // Silmek için bu isim lazım
                };

                // 3. Veritabanına Yaz
                const { error: dbError } = await window.supabaseClient.from('bekleyen_zarflar').insert([{
                    pc_name: document.getElementById('pcName').value,
                    match_data: matchData,
                    durum: 'pending'
                }]);

                if (dbError) throw dbError;

                showNotification("Zarf başarıyla Admin Masasına fırlatıldı! 🚀", "success");
                
                // Formu temizle
                document.getElementById('zarfForm').reset();
                imgPreview.style.display = 'none';
                selectedFile = null;

            } catch (err) {
                showNotification("Gönderim Hatası: " + err.message, "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-rocket"></i> Verileri Fırlat';
                btn.disabled = false;
            }
        });

        // DEPO YÖNETİMİ (Görselleri Listeleme ve Silme)
        async function loadStorageImages() {
            const list = document.getElementById('storageList');
            list.innerHTML = '<div style="text-align:center; grid-column: 1 / -1;"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>';

            try {
                const { data, error } = await window.supabaseClient.storage.from('match-proofs').list('', { limit: 100, sortBy: { column: 'created_at', order: 'desc' } });
                
                if (error) throw error;

                list.innerHTML = '';
                const files = data.filter(f => f.name !== '.emptyFolderPlaceholder');

                if (files.length === 0) {
                    list.innerHTML = '<p style="color:#777; text-align:center; grid-column: 1 / -1;">Depoda görsel bulunmuyor.</p>';
                    return;
                }

                files.forEach(file => {
                    const { data: urlData } = window.supabaseClient.storage.from('match-proofs').getPublicUrl(file.name);
                    const uploadDate = new Date(file.created_at).toLocaleDateString('tr-TR', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
                    
                    // 10 günü geçtiyse kırmızı uyarı verelim
                    const ageInDays = (new Date() - new Date(file.created_at)) / (1000 * 60 * 60 * 24);
                    const dateColor = ageInDays > 10 ? 'var(--kirmizi-iptal)' : 'var(--gri-yazi)';

                    list.innerHTML += `
                        <div class="storage-item" id="file-${file.name}">
                            <a href="${urlData.publicUrl}" target="_blank"><img src="${urlData.publicUrl}" class="storage-img" loading="lazy"></a>
                            <div class="storage-info">
                                <span>${file.name}</span>
                                <div style="color:${dateColor};">📅 ${uploadDate}</div>
                                <div>💾 ${(file.metadata.size / 1024 / 1024).toFixed(2)} MB</div>
                            </div>
                            <button class="delete-img-btn" onclick="deleteStorageFile('${file.name}')"><i class="fas fa-trash"></i> Kalıcı Olarak Sil</button>
                        </div>
                    `;
                });

            } catch (err) {
                list.innerHTML = `<div style="color:red; text-align:center; grid-column: 1 / -1;">Hata: ${err.message}</div>`;
            }
        }

        async function deleteStorageFile(fileName) {
            if(!confirm("DİKKAT: Bu görseli kalıcı olarak silmek istediğinize emin misiniz?")) return;

            try {
                const { error } = await window.supabaseClient.storage.from('match-proofs').remove([fileName]);
                if (error) throw error;

                showNotification("Görsel depodan silindi.", "success");
                document.getElementById(`file-${fileName}`).remove(); // Ekranda listeden anında uçur
            } catch (err) {
                showNotification("Silme başarısız: " + err.message, "error");
            }
        }

        document.addEventListener('DOMContentLoaded', initZarfPage);
    </script>
</body>
</html>
