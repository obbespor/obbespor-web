<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profilim | OBB E-SPOR</title>
    
    <link rel="icon" type="image/png" href="img/obblogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        .profile-container { max-width: 1000px; margin: 40px auto; padding: 20px; flex: 1; }
        .profile-banner { height: 250px; background: url('img/banner+.jpg') center/cover no-repeat; border-radius: 20px 20px 0 0; position: relative; border: 1px solid #222; }
        .edit-banner-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 5px; border: 1px solid var(--neon-mor); cursor: pointer; font-size: 12px; transition: 0.3s; }
        .edit-banner-btn:hover { background: var(--neon-mor); }

        .profile-card { background: var(--card-bg); border: 1px solid #222; border-top: none; border-radius: 0 0 20px 20px; padding: 0 40px 40px; position: relative; text-align: center; margin-bottom: 30px; }
        .avatar-wrapper { position: relative; width: 150px; height: 150px; margin: -75px auto 20px; }
        .profile-avatar { width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--card-bg); background: #111; object-fit: cover; box-shadow: 0 0 20px rgba(96, 29, 194, 0.5); }
        .edit-avatar-btn { position: absolute; bottom: 5px; right: 5px; background: var(--neon-mor); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--card-bg); color: white; transition: 0.3s; }
        
        .rank-badge { display: inline-block; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 800; background: rgba(96, 29, 194, 0.2); border: 1px solid var(--neon-mor); color: var(--neon-mor); margin-bottom: 15px; }
        .bio-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .edit-bio-icon { color: var(--neon-mor); cursor: pointer; transition: 0.3s; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-item { background: #111; padding: 20px; border-radius: 15px; border-bottom: 2px solid #222; }
        .stat-value { display: block; font-size: 24px; font-weight: 900; color: var(--neon-mor); }
        .stat-label { font-size: 12px; color: var(--gri-yazi); font-weight: bold; }

        .notifications-section { background: rgba(10, 10, 10, 0.95); border: 1px solid #222; border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .notifications-header { display: flex; justify-content: space-between; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        .badge { background: var(--neon-mor); color: white; padding: 2px 10px; border-radius: 50px; font-size: 12px; font-weight: bold; }
        
        .notif-item { background: #111; border-left: 4px solid var(--neon-mor); padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .notif-text .team-tag { color: var(--neon-mor); background: rgba(96, 29, 194, 0.2); padding: 2px 6px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .btn-accept { background: rgba(0, 210, 255, 0.1); color: var(--mavi-onay); border: 1px solid var(--mavi-onay); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-reject { background: rgba(255, 75, 75, 0.1); color: var(--kirmizi-iptal); border: 1px solid var(--kirmizi-iptal); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #0a0a0a; margin: 10% auto; padding: 30px; border: 2px solid var(--neon-mor); width: 90%; max-width: 800px; border-radius: 20px; position: relative; }
        .banner-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .banner-option { width: 100%; height: 120px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; object-fit: cover; }
        .banner-option:hover { border-color: var(--neon-mor); }

        @media (max-width: 768px) {
            .profile-container { padding: 10px; margin: 20px auto; } 
            .profile-card { padding: 0 15px 25px; } 
            .avatar-wrapper { width: 120px; height: 120px; margin: -60px auto 15px; } 
            .profile-avatar { width: 120px; height: 120px; }
            .edit-avatar-btn { width: 32px; height: 32px; font-size: 14px; }
            
            .stats-grid { grid-template-columns: 1fr; gap: 10px; } 
            .notifications-section { padding: 20px 15px; }
            .notif-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .notif-actions { width: 100%; display: flex; gap: 10px; }
            .notif-actions button { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="header-alani"></div>

    <main class="profile-container">
        <div class="profile-banner" id="currentBanner">
            <button class="edit-banner-btn" onclick="openBannerModal()"><i class="fas fa-image"></i> Kapak Değiştir</button>
        </div>

        <div class="profile-card">
            <div class="avatar-wrapper">
                <img src="img/obblogo.png" alt="Avatar" class="profile-avatar" id="userAvatar">
                <label for="avatarUpload" class="edit-avatar-btn"><i class="fas fa-camera"></i></label>
                <input type="file" id="avatarUpload" accept="image/png, image/jpeg" style="display: none;">
            </div>

            <div class="rank-badge" id="userRank">OYUNCU</div>
            <h1 id="profileNameDisplay" style="font-size: 28px; font-weight: 900; margin-bottom: 5px;">YÜKLENİYOR...</h1>
            
            <div class="bio-container">
                <p class="profile-bio" id="userBio">Açıklama yükleniyor...</p>
                <i class="fas fa-pencil-alt edit-bio-icon" onclick="editBio()"></i>
            </div>

            <div class="stats-grid">
                <div class="stat-item"><span class="stat-value">0</span><span class="stat-label">Toplam Maç</span></div>
                <div class="stat-item"><span class="stat-value">%0</span><span class="stat-label">Kazanma Oranı</span></div>
                <div class="stat-item"><span class="stat-value">0</span><span class="stat-label">Turnuvalar</span></div>
            </div>
        </div>

        <div class="notifications-section">
            <div class="notifications-header">
                <h3><i class="fas fa-users"></i> Takım Davetleri</h3>
                <span class="badge" id="notifBadge">0</span>
            </div>
            <div id="notificationsList"></div>
        </div>
    </main>

    <div id="bannerModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px; color:white;" onclick="closeBannerModal()">&times;</span>
            <h2 style="border-left: 4px solid var(--neon-mor); padding-left: 10px; color:white;">Kapak Resmi Seç</h2>
            <div class="banner-grid" id="bannerOptions"></div>
        </div>
    </div>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        let currentUser = null;

        async function initProfile() {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (!user) return;
            currentUser = user;

            const { data } = await window.supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            if (data) {
                document.getElementById('profileNameDisplay').innerText = data.username || "İsimsiz";
                document.getElementById('userBio').innerText = data.bio || "Açıklama eklenmemiş.";
                if(data.banner_url) document.getElementById('currentBanner').style.backgroundImage = `url('${data.banner_url}')`;
                if(data.avatar_url) document.getElementById('userAvatar').src = data.avatar_url + "?t=" + Date.now();
            }

            await loadInvitations();
            subscribeToInvites();
        }

        // Avatar Yükleme
        document.getElementById('avatarUpload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) return showNotification("Dosya 2MB'den küçük olmalı.", "error");

            document.getElementById('userAvatar').src = URL.createObjectURL(file);
            const path = `${currentUser.id}/avatar-${Date.now()}.${file.name.split('.').pop()}`;

            const { error } = await window.supabaseClient.storage.from('avatars').upload(path, file);
            if (!error) {
                const { data } = window.supabaseClient.storage.from('avatars').getPublicUrl(path);
                await window.supabaseClient.from('profiles').update({ avatar_url: data.publicUrl }).eq('id', currentUser.id);
                showNotification("Profil resmi güncellendi!", "success");
            }
        });

        // Bio Düzenleme
        async function editBio() {
            const el = document.getElementById('userBio');
            const newBio = prompt("Açıklamanızı yazın:", el.innerText);
            if (newBio !== null) {
                el.innerText = newBio;
                await window.supabaseClient.from('profiles').update({ bio: newBio }).eq('id', currentUser.id);
            }
        }

        // Zırhlı Davetler Yükleme Fonksiyonu
        async function loadInvitations() {
            try {
                const { data, error } = await window.supabaseClient
                    .from('application_members')
                    .select(`id, role, tournament_applications(team_name, team_tag)`)
                    .eq('user_id', currentUser.id)
                    .eq('status', 'pending');
                
                if (error) throw error;

                const list = document.getElementById('notificationsList');
                list.innerHTML = '';
                
                // HATA ÇÖZÜMÜ 1: Takımı silinmiş veya boş gelen (null) "hayalet" davetleri ele.
                const validInvites = data ? data.filter(inv => inv.tournament_applications !== null) : [];

                if (validInvites.length > 0) {
                    document.getElementById('notifBadge').innerText = validInvites.length;
                    
                    validInvites.forEach(inv => {
                        // HATA ÇÖZÜMÜ 2: Kaptan henüz takım adını yazmadıysa formülün patlamasını engelle.
                        const teamName = inv.tournament_applications.team_name || "İsimsiz Takım";
                        const teamTag = inv.tournament_applications.team_tag || "LOBİ";
                        const roleText = inv.role === 'main' ? 'Asil' : 'Yedek';

                        list.innerHTML += `
                            <div class="notif-item">
                                <div class="notif-text"><span class="team-tag">[${teamTag}]</span> <b>${teamName}</b> takımına ${roleText} olarak davetlisin.</div>
                                <div class="notif-actions">
                                    <button class="btn-accept" onclick="respondInvite('${inv.id}', 'accepted')">Kabul Et</button>
                                    <button class="btn-reject" onclick="respondInvite('${inv.id}', 'rejected')">Reddet</button>
                                </div>
                            </div>`;
                    });
                } else {
                    document.getElementById('notifBadge').innerText = "0";
                    list.innerHTML = `<div style="text-align:center; color:#777; padding:20px;">Bekleyen davet yok.</div>`;
                }
            } catch (err) {
                console.error("Davetler yüklenirken hata:", err);
                document.getElementById('notificationsList').innerHTML = `<div style="text-align:center; color:#ff4b4b; padding:20px;">Davetler şu an yüklenemiyor. Lütfen sayfayı yenileyin.</div>`;
            }
        }

        async function respondInvite(id, action) {
            if (action === 'accepted') {
                await window.supabaseClient.from('application_members').update({ status: 'accepted' }).eq('id', id);
                showNotification("Daveti kabul ettiniz.", "success");
            } else {
                await window.supabaseClient.from('application_members').delete().eq('id', id);
                showNotification("Daveti reddettiniz.", "error");
            }
            loadInvitations();
        }

        function subscribeToInvites() {
            window.supabaseClient.channel('custom-invites')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'application_members', filter: `user_id=eq.${currentUser.id}` }, () => loadInvitations())
                .subscribe();
        }

        // Kapak Resmi
        function openBannerModal() {
            const grid = document.getElementById('bannerOptions'); grid.innerHTML = ""; 
            for(let i=1; i<=4; i++) {
                const img = document.createElement('img'); img.src = 'img/banner+.jpg'; img.className = 'banner-option';
                img.onclick = async function() { 
                    document.getElementById('currentBanner').style.backgroundImage = `url('${this.src}')`;
                    closeBannerModal();
                    await window.supabaseClient.from('profiles').update({ banner_url: this.src }).eq('id', currentUser.id);
                };
                grid.appendChild(img);
            }
            document.getElementById('bannerModal').style.display = "block";
        }
        function closeBannerModal() { document.getElementById('bannerModal').style.display = "none"; }

        document.addEventListener('DOMContentLoaded', initProfile);
    </script>
</body>
</html>
