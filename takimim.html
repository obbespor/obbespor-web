<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Takımım | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        :root {
            --anadolu-kirmizi: #b81525;
            --anadolu-rgb: 184, 21, 37;
        }

        /* GENEL TASARIM VE ARKA PLAN */
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(96, 29, 194, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiMyMjIiIGZpbGwtb3BhY2l0eT0iMC4xNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            background-attachment: fixed;
        }

        .team-page-container { max-width: 1200px; margin: 40px auto; padding: 20px; flex: 1; animation: fadeInPage 0.4s ease-out; display: none; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* TAKIM KURMA KARTI */
        .auth-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-width: 600px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--gri-yazi); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .input-group input { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 8px; color: white; outline: none; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        .input-group input:focus { border-color: var(--neon-mor); box-shadow: 0 0 10px rgba(96, 29, 194, 0.3); }
        .save-btn { padding: 15px; width: 100%; background: linear-gradient(45deg, var(--neon-mor), #8138ff); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .save-btn:hover { box-shadow: 0 0 25px var(--neon-mor); transform: translateY(-2px); }

        .invites-section { margin-top: 30px; border-top: 2px dashed rgba(255,255,255,0.1); padding-top: 20px; }
        .invite-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; transition: 0.3s; }
        .invite-card:hover { border-color: var(--neon-mor); background: rgba(96, 29, 194, 0.05); }
        .invite-team-info { display: flex; align-items: center; gap: 15px; }
        .invite-team-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #222; }
        .invite-buttons { display: flex; gap: 10px; }
        .btn-acc, .btn-rej { color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-acc { background: var(--yesil-guven); }
        .btn-acc:hover { box-shadow: 0 0 10px var(--yesil-guven); }
        .btn-rej { background: var(--kirmizi-iptal); }
        .btn-rej:hover { box-shadow: 0 0 10px var(--kirmizi-iptal); }
        
        /* TAKIM PROFİL BAŞLIĞI */
        .team-profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px; position: relative; margin-bottom: 40px; background: rgba(10, 10, 10, 0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); overflow: hidden;}
        .team-profile-header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(96, 29, 194, 0.1) 0%, rgba(5, 5, 5, 0) 60%); z-index: -1; }
        
        .team-profile-logo { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; background: #0a0a0a; border: 4px solid var(--neon-mor); padding: 5px; box-shadow: 0 0 40px rgba(96, 29, 194, 0.5); margin-bottom: 25px; transition: 0.3s; }
        .team-profile-name { font-size: 42px; font-weight: 900; color: white; margin: 0; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 12px; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .team-profile-tag { font-size: 18px; background: rgba(96, 29, 194, 0.2); color: #c69eff; padding: 5px 15px; border-radius: 8px; font-weight: bold; letter-spacing: 2px; border: 1px solid rgba(96, 29, 194, 0.4); }
        .team-profile-meta { color: var(--gri-yazi); font-size: 13px; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 20px; }

        .tourney-badge { display: inline-block; padding: 6px 15px; border-radius: 8px; font-size: 12px; font-weight: 900; letter-spacing: 1px; margin-top: 15px; text-transform: uppercase; }
        .tourney-badge.approved { background: rgba(0, 255, 136, 0.1); color: #00ff88; border: 1px solid #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .tourney-badge.pending { background: rgba(0, 212, 255, 0.1); color: #00d4ff; border: 1px solid #00d4ff; box-shadow: 0 0 10px rgba(0,212,255,0.2); }
        .tourney-badge.rejected { background: rgba(255, 75, 75, 0.1); color: #ff6b6b; border: 1px solid #ff6b6b; box-shadow: 0 0 10px rgba(255,75,75,0.2); }

        .lock-alert { background: rgba(255, 75, 75, 0.1); border: 1px solid rgba(255, 75, 75, 0.3); color: #ff6b6b; padding: 15px 20px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; box-shadow: 0 0 15px rgba(255, 75, 75, 0.1); max-width: 600px; margin-left: auto; margin-right: auto; }
        
        .roster-title-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 35px; }
        .roster-title { font-size: 26px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        /* MEVCUT SAYACI */
        .roster-count { 
            background: rgba(var(--anadolu-rgb), 0.15); 
            color: var(--anadolu-kirmizi); 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: 900; 
            font-size: 16px; 
            border: 1px solid var(--anadolu-kirmizi);
            box-shadow: 0 0 10px rgba(var(--anadolu-rgb), 0.3);
        }

        /* OYUNCU KARTLARI - TEK SÜTUN MERKEZLENMİŞ DİZİLİM (DÜZELTİLDİ) */
                .player-card.current-user-card { border-color: rgba(0, 255, 136, 0.5) !important; box-shadow: 0 0 25px rgba(0, 255, 136, 0.2) !important; z-index: 2; }
        .player-card.current-user-card:hover { border-color: #00ff88 !important; box-shadow: 0 0 35px rgba(0, 255, 136, 0.3) !important; }
        
        .player-card.pending { opacity: 0.5; border: 1px dashed #444; }
        
        .player-card-header { padding: 25px; display: flex; align-items: center; gap: 20px; position: relative; background: rgba(255,255,255,0.01); }
        .avatar-container { position: relative; margin-right: 5px; }
        .player-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #333; background: #111; display:flex; justify-content:center; align-items:center; color:#444; font-size: 24px;}
        .player-card.current-user-card .player-avatar { border-color: #00ff88; }
        
        .player-names { flex: 1; overflow: hidden; min-width: 0; }
        .player-ign { font-size: 20px; font-weight: 900; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        .player-username { font-size: 12px; color: var(--gri-yazi); display: block; margin-top: 2px; opacity: 0.8; }
        
        .role-badges-area { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .player-role { font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; cursor: default; }
        .role-standard { background: rgba(255, 255, 255, 0.05); color: #aaa; border: 1px solid rgba(255, 255, 255, 0.1); }
        .role-pending { background: rgba(255, 152, 0, 0.1); color: #ff9800; border: 1px solid rgba(255, 152, 0, 0.3); }
        .captain-crown { background: rgba(255, 215, 0, 0.1); color: gold; border: 1px solid rgba(255, 215, 0, 0.3); padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }

        .btn-kick { position: absolute; top: 15px; right: 15px; background: transparent; color: #444; border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 14px; display: flex; justify-content: center; align-items: center;}
        .btn-kick:hover { color: var(--kirmizi-iptal); background: rgba(255, 75, 75, 0.1); }

        /* İSTATİSTİKLER */
        .player-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(0,0,0,0.3); padding: 18px 10px; text-align: center; border-top: 1px solid rgba(255,255,255,0.03); }
        .stat-box { display: flex; flex-direction: column; gap: 4px; border-right: 1px solid rgba(255,255,255,0.03); }
        .stat-box:last-child { border-right: none; }
        .stat-value { font-size: 18px; font-weight: 900; color: white; }
        .stat-value.kd-high { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .stat-label { font-size: 10px; color: var(--gri-yazi); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}

        /* AKSİYON BUTONLARI */
        .action-btn { padding: 14px 28px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; font-size: 14px; display: flex; align-items: center; gap: 8px; justify-content: center; text-transform: uppercase; letter-spacing: 1px;}
        .btn-edit-team { background: rgba(0, 210, 255, 0.1); color: #00d2ff; border: 1px solid rgba(0, 210, 255, 0.3); }
        .btn-edit-team:hover { background: #00d2ff; color: #000; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }
        .btn-disband { background: rgba(255, 75, 75, 0.05); color: #ff6b6b; border: 1px solid rgba(255, 75, 75, 0.3); }
        .btn-disband:hover { background: var(--kirmizi-iptal); color: white; box-shadow: 0 0 20px rgba(255, 75, 75, 0.3); }
        .roster-grid { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 50px; width: 100%; }

        .roster-grid { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 50px; width: 100%; }
        
        .player-card { width: 550px !important; max-width: 100%; background: rgba(15, 15, 15, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; overflow: hidden; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .player-card:hover { transform: translateY(-5px); border-color: rgba(96, 29, 194, 0.5); box-shadow: 0 15px 40px rgba(96, 29, 194, 0.2); }
        
        .player-card.current-user-card { border-color: rgba(0, 255, 136, 0.5) !important; box-shadow: 0 0 25px rgba(0, 255, 136, 0.2) !important; z-index: 2; }
        .player-card.current-user-card:hover { border-color: #00ff88 !important; box-shadow: 0 0 35px rgba(0, 255, 136, 0.3) !important; }
        .player-card.pending { opacity: 0.5; border: 1px dashed #444; }
                .add-slot-card { width: 550px !important; max-width: 100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px; border:2px dashed rgba(96, 29, 194, 0.3); background:rgba(96, 29, 194, 0.03); border-radius: 16px; transition: 0.3s; cursor: pointer; }
        .add-slot-card:hover { border-color: var(--neon-mor); background: rgba(96, 29, 194, 0.07); }
        .add-icon { font-size: 40px; color: rgba(96, 29, 194, 0.4); margin-bottom: 15px; transition: 0.3s; }
        .add-slot-card:hover .add-icon { color: var(--neon-mor); transform: scale(1.1); }
        
        .autocomplete-items { position: absolute; border: 1px solid var(--neon-mor); border-top: none; z-index: 99; top: 100%; left: 0; right: 0; background-color: #0a0a0a; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .autocomplete-items div:hover { background-color: var(--neon-mor); }

        #loadingScreen { position: fixed; inset: 0; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; }
        .loader-spinner { width: 50px; height: 50px; border: 4px solid rgba(157, 78, 221, 0.2); border-top-color: var(--neon-mor); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        #loadingScreen p { color: white; font-weight: bold; letter-spacing: 2px; font-size: 14px; margin: 0;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; animation: fadeInModal 0.3s ease; }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { background: #0a0a0a; border: 1px solid #333; border-top: 4px solid var(--neon-mor); border-radius: 15px; width: 90%; max-width: 450px; padding: 35px 25px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center; }
        .modal-content.danger { border-top-color: var(--kirmizi-iptal); }

        /* MOBİL DÜZENLEMELERİ */
        @media (max-width: 768px) {
            .team-profile-header { padding: 30px 15px 20px; }
            .team-profile-name { font-size: 24px; flex-direction: column; gap: 5px; text-align: center;}
            .team-profile-logo { width: 90px; height: 90px; margin-bottom: 15px; }
            
            .roster-title-container { flex-direction: column; gap: 10px; margin-bottom: 20px; }
            .roster-title { font-size: 22px; text-align: center; }
            .roster-count { font-size: 14px; padding: 4px 12px; }

            .roster-grid { gap: 15px; margin-bottom: 30px; }
            .player-card { max-width: 100%; }
            .add-slot-card { max-width: 100%; }
            
            .player-card-header { padding: 15px; padding-right: 40px; gap: 12px;}
            .player-avatar { width: 50px; height: 50px; font-size: 20px; }
            .player-ign { font-size: 16px; }
            
            .role-badges-area { margin-top: 5px; }
            .player-role, .captain-crown { font-size: 9px; padding: 2px 6px; }
            
            .btn-kick { top: 12px; right: 10px; width: 26px; height: 26px; font-size: 12px; }
            
            .player-stats-row { padding: 12px 5px; }
            .stat-value { font-size: 16px; }
            .stat-label { font-size: 9px; }
            
            .invite-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .invite-buttons { width: 100%; justify-content: stretch; }
            .invite-buttons button { flex: 1; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loader-spinner"></div>
        <p>TAKIM VERİLERİ ÇEKİLİYOR...</p>
    </div>

    <div id="header-alani"></div>
    <div id="toast-container"></div>

    <main class="team-page-container" id="createTeamSection" style="display: none;">
        <div class="auth-card">
            <h2 class="section-title" style="text-align: center; border:none; margin-bottom:10px; font-size: 28px; font-weight: 900; color: white;">TAKIMINI <span>KUR</span></h2>
            
            <form id="teamForm">
                <div class="input-group">
                    <label>Takım Adı *</label>
                    <input type="text" id="newTeamName" placeholder="Örn: OBB Tigers" minlength="3" maxlength="20" required>
                </div>
                <div class="input-group">
                    <label>Kısaltma *</label>
                    <input type="text" id="newTeamTag" placeholder="OBB" minlength="2" maxlength="4" required>
                </div>
                <div class="input-group">
                    <label>Takım Logosu</label>
                    <input type="file" id="newTeamLogo" accept="image/png, image/jpeg, image/jpg, image/webp">
                    <span style="font-size:11px; color:rgba(255,255,255,0.4); margin-top:5px; display:block;">Turnuvalarda sizi temsil eder(PNG, JPG, Max 2MB).</span>
                </div>
                <button type="submit" class="save-btn" id="btnCreateTeam">TAKIMI OLUŞTUR</button>
            </form>

            <div id="pendingInvitesSection" class="invites-section" style="display: none;">
                <h3 style="color: white; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-envelope-open-text" style="color: var(--neon-mor);"></i> Gelen Takım Davetleri
                </h3>
                <div id="pendingInvitesList"></div>
            </div>
        </div>
    </main>

    <main class="team-page-container" id="myTeamSection" style="display: none;">
        <div class="team-profile-header">
            <div class="team-hero-bg" id="teamHeroBg"></div>
            <div class="team-hero-overlay"></div>
            
            <div class="team-profile-content">
                <img src="img/unknown.webp" id="tLogo" class="team-profile-logo" alt="Takım Logosu">
                <h2 class="team-profile-name"><span id="tName">YÜKLENİYOR...</span> <span class="team-profile-tag" id="tTag">[TAG]</span></h2>
                <p class="team-profile-meta">Kuruluş Tarihi: <span id="tDate" style="color: white; font-weight: bold;">-</span></p>
                <div id="tTourneyBadgeContainer"></div>
            </div>
        </div>

        <div class="lock-alert" id="lockAlert" style="display: none;">
            </div>

        <div class="roster-title-container">
            <h3 class="roster-title">TAKIM KADROSU</h3>
            <span class="roster-count" id="memberCounter">0 / 7</span>
        </div>
        
        <div class="roster-grid" id="rosterList">
            <div style="width: 100%; text-align: center; color: var(--gri-yazi); padding: 30px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i><br>
                Oyuncular Yükleniyor...
            </div>
        </div>

        <div id="memberActionArea" style="display:none; text-align: center; margin-top:40px;">
            <button class="action-btn btn-disband" onclick="leaveTeam()"><i class="fas fa-sign-out-alt"></i> Takımdan Ayrıl</button>
        </div>
        
        <div id="captainActionArea" style="display:none; margin-top:40px; gap:15px; justify-content: center; flex-wrap: wrap;">
            <button class="action-btn btn-edit-team" id="btnOpenEdit" onclick="openEditTeamModal()"><i class="fas fa-cog"></i> Takım Ayarlarını Düzenle</button>
            <button class="action-btn btn-disband" onclick="disbandTeam()"><i class="fas fa-bomb"></i> Takımı Dağıt</button>
        </div>
    </main>

    <div class="modal-overlay" id="editTeamModal">
        <div class="modal-content">
            <h3 style="color: white; font-weight: 900; margin-bottom: 25px; text-transform: uppercase;">Takım Ayarlarını Güncelle</h3>
            <div class="input-group" style="text-align: left;">
                <label>Yeni Takım Adı (3-20 Karakter)</label>
                <input type="text" id="editTeamName" minlength="3" maxlength="20" placeholder="Yeni Ad">
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Yeni Takım Kısaltması (2-4 Karakter)</label>
                <input type="text" id="editTeamTag" minlength="2" maxlength="4" placeholder="Yeni Tag">
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Yeni Logo Seç</label>
                <input type="file" id="editTeamLogo" accept="image/png, image/jpeg, image/jpg, image/webp">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="closeEditTeamModal()" style="flex:1; background: transparent; border: 1px solid #444; color: #888; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">İptal</button>
                <button onclick="updateTeamSettings()" id="btnSaveSettings" style="flex:2; background: var(--neon-mor); border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="customConfirmModal">
        <div class="modal-content danger">
            <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: var(--kirmizi-iptal); margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,75,75,0.4));"></i>
            <h3 style="color: white; font-weight: 900; font-size: 22px; margin-bottom: 10px; text-transform: uppercase;">Emin Misiniz?</h3>
            <p id="confirmMessage" style="color: var(--gri-yazi); font-size: 14px; margin-bottom: 30px;"></p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button onclick="closeConfirmModal()" style="flex: 1; background: transparent; border: 1px solid #555; color: #aaa; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">İptal</button>
                <button id="confirmActionBtn" style="flex: 1; background: var(--kirmizi-iptal); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">Onaylıyorum</button>
            </div>
        </div>
    </div>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        let currentUser = null;
        let myTeamData = null;
        let currentApp = null; 
        let isCaptain = false;
        let isRosterLocked = false;
        let confirmCallback = null;

        function openConfirmModal(message, callback) {
            document.getElementById('confirmMessage').innerHTML = message;
            confirmCallback = callback;
            document.getElementById('customConfirmModal').classList.add('active');
        }
        function closeConfirmModal() {
            document.getElementById('customConfirmModal').classList.remove('active');
            confirmCallback = null;
        }
        document.getElementById('confirmActionBtn').addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            closeConfirmModal();
        });

        function openEditTeamModal() {
            if(isRosterLocked) {
                showNotification("Aktif başvurunuz olduğu için ayarlar kilitli.", "error");
                return;
            }
            document.getElementById('editTeamName').value = myTeamData.name;
            document.getElementById('editTeamTag').value = myTeamData.tag;
            document.getElementById('editTeamModal').classList.add('active');
        }
        function closeEditTeamModal() {
            document.getElementById('editTeamModal').classList.remove('active');
        }

        async function initTeamPage() {
            try {
                const { data: { user }, error: authErr } = await window.supabaseClient.auth.getUser();
                if (authErr || !user) { window.location.href = "kayit.html"; return; }
                currentUser = user;
                
                const { data: profile } = await window.supabaseClient.from('profiles').select('username, ign').eq('id', currentUser.id).single();
                if (!profile?.username) {
                    showNotification("Önce profilinizi tamamlayın.", "error");
                    setTimeout(() => window.location.href = 'profil.html', 2000);
                    return;
                }
                
                await fetchMyTeam();
                
            } catch (err) { 
                console.error(err); 
            } finally { 
                document.getElementById('loadingScreen').style.display = 'none'; 
            }
        }

        async function fetchMyTeam() {
            try {
                let { data: teamAsCaptain } = await window.supabaseClient.from('teams').select('*').eq('captain_id', currentUser.id).maybeSingle();
                if (teamAsCaptain) { 
                    myTeamData = teamAsCaptain; 
                    isCaptain = true; 
                } 
                else {
                    const { data: membership } = await window.supabaseClient.from('team_members').select('team_id').eq('user_id', currentUser.id).eq('status', 'accepted').maybeSingle();
                    if (membership) {
                        const { data: teamData } = await window.supabaseClient.from('teams').select('*').eq('id', membership.team_id).single();
                        myTeamData = teamData; 
                        isCaptain = false;
                    }
                }
                
                if (!myTeamData) { 
                    document.getElementById('createTeamSection').style.display = 'block'; 
                    document.getElementById('myTeamSection').style.display = 'none';
                    await fetchPendingInvites(); 
                    return; 
                }

                // AKTİF TURNUVA DURUMUNU ÇEK (ROSTER LOCK KONTROLÜ)
                const { data: appData } = await window.supabaseClient.from('tournament_applications')
                    .select('status, tournaments!inner(name, status)')
                    .eq('team_id', myTeamData.id)
                    .eq('tournaments.status', 'upcoming')
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .maybeSingle();

                if (appData) {
                    currentApp = appData;
                    // ÖNEMLİ: Eğer başvuru "pending" (bekliyor) veya "approved" (onaylı) ise ROSTER LOCK aktiftir!
                    if (appData.status === 'approved' || appData.status === 'pending') {
                        isRosterLocked = true;
                    }
                }

                renderTeamUI();
                await fetchRoster();
            } catch (err) { showNotification("Sistem hatası.", "error"); }
        }

        async function fetchPendingInvites() {
            try {
                const { data: invites } = await window.supabaseClient.from('team_members')
                    .select('id, role, teams(name, tag, logo_url)')
                    .eq('user_id', currentUser.id)
                    .eq('status', 'pending');
                
                if (invites && invites.length > 0) {
                    document.getElementById('pendingInvitesSection').style.display = 'block';
                    let html = '';
                    invites.forEach(inv => {
                        const t = Array.isArray(inv.teams) ? inv.teams[0] : inv.teams;
                        const tLogo = t.logo_url || 'img/unknown.webp';
                        html += `
                        <div class="invite-card">
                            <div class="invite-team-info">
                                <img src="${tLogo}" class="invite-team-logo" onerror="this.src='img/unknown.webp'">
                                <div>
                                    <div style="color:white; font-weight:bold;">[${t.tag}] ${t.name}</div>
                                    <div style="color:var(--neon-mor); font-size:11px; font-weight:bold;">OYUNCU DAVETİ</div>
                                </div>
                            </div>
                            <div class="invite-buttons">
                                <button class="btn-acc" onclick="respondInvite('${inv.id}', 'accepted')"><i class="fas fa-check"></i> Kabul Et</button>
                                <button class="btn-rej" onclick="respondInvite('${inv.id}', 'rejected')"><i class="fas fa-times"></i> Reddet</button>
                            </div>
                        </div>`;
                    });
                    document.getElementById('pendingInvitesList').innerHTML = html;
                } else {
                    document.getElementById('pendingInvitesSection').style.display = 'none';
                }
            } catch (err) {}
        }

        window.respondInvite = async function(memberId, action) {
            try {
                if (action === 'accepted') {
                    await window.supabaseClient.from('team_members').update({ status: 'accepted' }).eq('id', memberId);
                    await window.supabaseClient.from('team_members').delete().eq('user_id', currentUser.id).eq('status', 'pending');
                    showNotification("Daveti kabul ettiniz!", "success");
                    setTimeout(() => location.reload(), 1500);
                } else {
                    await window.supabaseClient.from('team_members').delete().eq('id', memberId);
                    showNotification("Davet reddedildi.", "info");
                    location.reload();
                }
            } catch(e) { showNotification("İşlem başarısız.", "error"); }
        }

        function renderTeamUI() {
            document.getElementById('myTeamSection').style.display = 'block';
            document.getElementById('createTeamSection').style.display = 'none';

            document.getElementById('tName').innerText = myTeamData.name;
            document.getElementById('tTag').innerText = `[${myTeamData.tag}]`;
            const logoEl = document.getElementById('tLogo');
            if (myTeamData.logo_url) logoEl.src = `${myTeamData.logo_url}?t=${new Date().getTime()}`;
            else logoEl.src = 'img/unknown.webp';
            document.getElementById('tDate').innerText = new Date(myTeamData.created_at).toLocaleDateString('tr-TR');

            let badgeHTML = '';
            if (currentApp) {
                if (currentApp.status === 'approved') {
                    badgeHTML = `<div class="tourney-badge approved"><i class="fas fa-check-circle"></i> ${currentApp.tournaments.name}: ONAYLANDI</div>`;
                } else if (currentApp.status === 'pending') {
                    badgeHTML = `<div class="tourney-badge pending"><i class="fas fa-hourglass-half fa-spin"></i> ${currentApp.tournaments.name}: ONAY BEKLENİYOR</div>`;
                } else if (currentApp.status === 'rejected') {
                    badgeHTML = `<div class="tourney-badge rejected"><i class="fas fa-times-circle"></i> ${currentApp.tournaments.name}: REDDEDİLDİ</div>`;
                }
            }
            document.getElementById('tTourneyBadgeContainer').innerHTML = badgeHTML;

            if (isRosterLocked) {
                const lockAlert = document.getElementById('lockAlert');
                if(currentApp && currentApp.status === 'pending') {
                    lockAlert.innerHTML = `
                        <i class="fas fa-lock"></i>
                        <div>
                            <strong>KADRO KİLİTLİ!</strong><br>
                            Başvurunuz değerlendiriliyor. Kadro veya takım ayarlarında değişiklik yapmak için "Turnuva Başvurusu" sayfasından başvurunuzu geri çekmelisiniz.
                        </div>
                    `;
                } else {
                    lockAlert.innerHTML = `
                        <i class="fas fa-lock"></i>
                        <div>
                            <strong>KADRO KİLİTLİ!</strong><br>
                            Aktif bir turnuvada olduğunuz için takım ayarları ve kadro değişikliği yapılamaz.
                        </div>
                    `;
                }
                lockAlert.style.display = 'flex';
            }

            document.getElementById('captainActionArea').style.display = 'none';
            document.getElementById('memberActionArea').style.display = 'none';
            
            if (isCaptain && !isRosterLocked) document.getElementById('captainActionArea').style.display = 'flex';
            else if (!isCaptain && !isRosterLocked) document.getElementById('memberActionArea').style.display = 'block';
        }

        async function fetchRoster() {
            const grid = document.getElementById('rosterList');
            grid.innerHTML = ''; 
            try {
                const { data: members, error: memErr } = await window.supabaseClient.from('team_members')
                    .select('id, user_id, role, status, profiles(username, ign, avatar_url, matches_played)')
                    .eq('team_id', myTeamData.id)
                    .order('created_at', { ascending: true });
                    
                if (memErr) throw memErr;

                let allMembers = members ? [...members] : [];

                const capIndex = allMembers.findIndex(m => m.user_id === myTeamData.captain_id);
                if (capIndex === -1) {
                    await window.supabaseClient.from('team_members').insert([{
                        team_id: myTeamData.id, user_id: myTeamData.captain_id, role: 'member', status: 'accepted'
                    }]);
                    
                    const { data: capProfile } = await window.supabaseClient.from('profiles').select('username, ign, avatar_url, matches_played').eq('id', myTeamData.captain_id).maybeSingle();
                    allMembers.push({
                        user_id: myTeamData.captain_id, role: 'member', status: 'accepted', profiles: capProfile || {}
                    });
                } else {
                    if (allMembers[capIndex].status !== 'accepted') {
                        await window.supabaseClient.from('team_members').update({ status: 'accepted' }).eq('id', allMembers[capIndex].id);
                        allMembers[capIndex].status = 'accepted';
                    }
                }

                const uniqueMap = new Map();
                allMembers.forEach(m => {
                    if (uniqueMap.has(m.user_id)) {
                        if (m.status === 'accepted') uniqueMap.set(m.user_id, m);
                    } else {
                        uniqueMap.set(m.user_id, m);
                    }
                });
                allMembers = Array.from(uniqueMap.values());

                const acceptedCount = allMembers.filter(m => m.status === 'accepted').length;
                document.getElementById('memberCounter').innerText = `${acceptedCount} / 7`;

                allMembers.sort((a, b) => {
                    if (a.user_id === currentUser.id && b.user_id !== currentUser.id) return -1;
                    if (b.user_id === currentUser.id && a.user_id !== currentUser.id) return 1;
                    
                    if (a.user_id === myTeamData.captain_id && b.user_id !== myTeamData.captain_id) return -1;
                    if (b.user_id === myTeamData.captain_id && a.user_id !== myTeamData.captain_id) return 1;
                    
                    if (a.status === 'accepted' && b.status === 'pending') return -1;
                    if (b.status === 'accepted' && a.status === 'pending') return 1;
                    
                    return 0; 
                });

                const userIds = allMembers.map(m => m.user_id);
                let playerStats = {};
                try {
                    const { data: statsData } = await window.supabaseClient.from('match_player_stats').select('user_id, kills, deaths, assists, acs, map_id').in('user_id', userIds);
                    if (statsData) {
                        statsData.forEach(stat => {
                            if (!playerStats[stat.user_id]) playerStats[stat.user_id] = { kills: 0, deaths: 0, assists: 0, acsTotal: 0, mapCount: new Set() };
                            playerStats[stat.user_id].kills += (stat.kills || 0);
                            playerStats[stat.user_id].deaths += (stat.deaths || 0);
                            playerStats[stat.user_id].assists += (stat.assists || 0);
                            playerStats[stat.user_id].acsTotal += (stat.acs || 0);
                            if(stat.map_id) playerStats[stat.user_id].mapCount.add(stat.map_id);
                        });
                    }
                } catch(e) {}

                allMembers.forEach(m => {
                    if (m.status === 'pending' && !isCaptain) return; 

                    const prof = Array.isArray(m.profiles) ? m.profiles[0] : m.profiles;
                    const isCap = m.user_id === myTeamData.captain_id;
                    const isMe = m.user_id === currentUser.id;
                    
                    const pStat = playerStats[m.user_id] || { kills: 0, deaths: 0, assists: 0, acsTotal: 0, mapCount: new Set() };
                    const dbMatches = pStat.mapCount instanceof Set ? pStat.mapCount.size : 0;
                    const matches = dbMatches > 0 ? dbMatches : (prof?.matches_played || 0);
                    
                    let kd = "0.00";
                    if (matches > 0 || pStat.kills > 0) kd = pStat.deaths > 0 ? (pStat.kills / pStat.deaths).toFixed(2) : pStat.kills.toFixed(2);
                    const acs = matches > 0 ? Math.round(pStat.acsTotal / matches) : 0;
                    const assists = pStat.assists || 0;

                    grid.innerHTML += createPlayerCard(
                        m.user_id, m.id, prof?.username, prof?.ign, m.status, prof?.avatar_url, 
                        matches, kd, acs, assists, isCap, isMe
                    );
                });

                if (isCaptain && !isRosterLocked && acceptedCount < 7) {
                    grid.innerHTML += `
                        <div class="add-slot-card" onclick="focusSearch()">
                            <i class="fas fa-user-plus add-icon"></i>
                            <div style="width:100%; position:relative;">
                                <input type="text" id="dynamicSearch" class="player-search" autocomplete="off" placeholder="Oyuncu Ara..." style="width:100%; padding:10px; background:rgba(0,0,0,0.5); border:1px solid #333; border-radius:8px; color:white; text-align:center; outline:none;">
                                <div id="dynamicSearch-list" class="autocomplete-items"></div>
                            </div>
                            <span style="font-size:12px; color:var(--gri-yazi); margin-top:10px;"><i class="fas fa-plus"></i> Oyuncu Ekle</span>
                        </div>`;
                    attachDynamicSearchEvent();
                }
            } catch (err) { console.error(err); }
        }

        function createPlayerCard(userId, memberId, username, ign, status, avatarUrl, matches, kd, acs, assists, isCap, isMe) {
            const displayName = (ign && ign !== 'Belirlenmedi') ? ign : (username || 'İsimsiz');
            const subName = (ign && ign !== 'Belirlenmedi') ? `@${username}` : '';
            const avatar = avatarUrl ? `<img src="${avatarUrl}" class="player-avatar" onerror="this.src='img/unknown.webp'">` : `<div class="player-avatar"><i class="fas fa-user"></i></div>`;
            
            // ROSTER LOCK VARSA KİCK BUTONU EKRANA ÇİZİLMEZ!
            let kickBtn = (isCaptain && !isRosterLocked && userId !== currentUser.id) ? `<button class="btn-kick" onclick="kickPlayer('${memberId}', '${username.replace(/'/g, "\\'")}')"><i class="fas fa-times"></i></button>` : '';
            
            let roleLabel = 'ÜYE';
            if (status === 'pending') roleLabel = 'DAVET EDİLDİ';

            const isPending = status === 'pending';
            const displayMatches = isPending ? '?' : matches;
            const displayKd = isPending ? '?' : kd;
            const displayAcs = isPending ? '?' : acs;
            const displayAssists = isPending ? '?' : assists;
            const kdClass = (!isPending && parseFloat(kd) >= 1.2) ? 'kd-high' : '';

            const roleClassBadge = isPending ? 'role-pending' : 'role-standard';

            return `
                <div class="player-card ${isPending ? 'pending' : ''} ${isMe ? 'current-user-card' : ''}">
                    <div class="player-card-header">
                        <div class="avatar-container">${avatar}</div>
                        <div class="player-names"><div class="player-ign">${displayName}</div><span class="player-username">${subName}</span><div class="role-badges-area"><span class="player-role ${roleClassBadge}">${roleLabel}</span>${isCap ? '<span class="captain-crown"><i class="fas fa-crown"></i> KAPTAN</span>' : ''}</div></div>
                        ${kickBtn}
                    </div>
                    <div class="player-stats-row">
                        <div class="stat-box"><span class="stat-value">${displayMatches}</span><span class="stat-label">MAÇ</span></div>
                        <div class="stat-box"><span class="stat-value ${kdClass}">${displayKd}</span><span class="stat-label">K/D</span></div>
                        <div class="stat-box"><span class="stat-value">${displayAcs}</span><span class="stat-label">ACS</span></div>
                        <div class="stat-box"><span class="stat-value">${displayAssists}</span><span class="stat-label">A</span></div>
                    </div>
                </div>`;
        }

        function focusSearch() { document.getElementById('dynamicSearch').focus(); }

        async function updateTeamSettings() {
            if(isRosterLocked) {
                showNotification("Başvurunuz olduğu için ayarlar kilitli.", "error");
                return;
            }
            const newName = document.getElementById('editTeamName').value.trim();
            const newTag = document.getElementById('editTeamTag').value.trim().toUpperCase();
            if (newName && (newName.length < 3 || newName.length > 20)) { showNotification("Takım adı 3-20 karakter olmalı.", "error"); return; }
            if (newTag && (newTag.length < 2 || newTag.length > 4)) { showNotification("Tag 2-4 karakter olmalı.", "error"); return; }

            const btn = document.getElementById('btnSaveSettings');
            const originalText = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const logoFile = document.getElementById('editTeamLogo').files[0];
                let logoUrl = myTeamData.logo_url;
                if (logoFile) {
                    if (logoFile.size > 2 * 1024 * 1024) throw new Error("Logo 2MB'dan büyük olamaz.");
                    const fileName = `logo_${myTeamData.id}`; 
                    await window.supabaseClient.storage.from('team-logos').upload(fileName, logoFile, { upsert: true });
                    const { data } = window.supabaseClient.storage.from('team-logos').getPublicUrl(fileName);
                    logoUrl = `${data.publicUrl}?t=${Date.now()}`; 
                }
                const updates = { logo_url: logoUrl };
                if(newName) updates.name = newName;
                if(newTag) updates.tag = newTag;
                const { error } = await window.supabaseClient.from('teams').update(updates).eq('id', myTeamData.id);
                if (error) throw error;
                showNotification("Değişiklikler kaydedildi!", "success");
                setTimeout(() => location.reload(), 1200);
            } catch (err) { showNotification(err.message, "error"); btn.disabled = false; btn.innerHTML = originalText; }
        }

        document.getElementById('teamForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('newTeamName').value.trim();
            const tag = document.getElementById('newTeamTag').value.trim().toUpperCase();
            const logoFile = document.getElementById('newTeamLogo').files[0]; 
            const btn = document.getElementById('btnCreateTeam');
            
            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const { data: newTeam, error } = await window.supabaseClient.from('teams').insert([{ captain_id: currentUser.id, name, tag }]).select().single();
                if (error) throw error;
                
                if (logoFile) {
                    if (logoFile.size > 2 * 1024 * 1024) {
                        showNotification("Logo 2MB'dan büyük olamaz. Takım logosuz kuruldu.", "info");
                    } else {
                        const fileName = `logo_${newTeam.id}`; 
                        await window.supabaseClient.storage.from('team-logos').upload(fileName, logoFile, { upsert: true });
                        const { data: urlData } = window.supabaseClient.storage.from('team-logos').getPublicUrl(fileName);
                        const logoUrl = `${urlData.publicUrl}?t=${Date.now()}`; 
                        await window.supabaseClient.from('teams').update({ logo_url: logoUrl }).eq('id', newTeam.id);
                    }
                }

                const { data: newMem } = await window.supabaseClient.from('team_members')
                    .insert([{ team_id: newTeam.id, user_id: currentUser.id, role: 'member', status: 'accepted' }])
                    .select().single();

                if (newMem && newMem.status === 'pending') {
                    await window.supabaseClient.from('team_members').update({ status: 'accepted' }).eq('id', newMem.id);
                }

                showNotification("Takım başarıyla kuruldu!", "success");
                setTimeout(() => location.reload(), 1500);
            } catch (err) { 
                showNotification(err.message, "error"); 
                btn.disabled = false; 
                btn.innerHTML = 'TAKIMI OLUŞTUR'; 
            }
        });

        function attachDynamicSearchEvent() {
            const input = document.getElementById('dynamicSearch');
            if (!input) return;
            input.addEventListener('input', async function() {
                const query = this.value;
                const list = document.getElementById('dynamicSearch-list');
                list.innerHTML = ''; if (query.length < 2) return;
                try {
                    const { data: profiles } = await window.supabaseClient.from('profiles').select('id, username, ign').or(`ign.ilike.%${query}%,username.ilike.%${query}%`).limit(8);
                    if (!profiles) return;
                    const { data: bMem } = await window.supabaseClient.from('team_members').select('user_id').eq('status', 'accepted');
                    const busyIds = new Set(bMem?.map(m => m.user_id) || []);
                    const { data: bCap } = await window.supabaseClient.from('teams').select('captain_id');
                    bCap?.forEach(c => busyIds.add(c.captain_id));

                    profiles.filter(p => !busyIds.has(p.id)).forEach(u => {
                        const div = document.createElement('div');
                        const ignDisplay = (u.ign && u.ign !== 'Belirlenmedi') ? `<span style="color:var(--neon-mor); font-size:11px; margin-left:5px;">(${u.ign})</span>` : '';
                        div.innerHTML = `<i class="fas fa-user-plus"></i> <b>${u.username}</b> ${ignDisplay}`;
                        div.onclick = async () => {
                            try {
                                await window.supabaseClient.rpc('send_team_invite', { p_team_id: myTeamData.id, p_user_id: u.id, p_role: 'member' });
                                showNotification("Davet gönderildi!", "success"); 
                                fetchRoster();
                            } catch(e) { showNotification("Hata oluştu.", "error"); }
                        };
                        list.appendChild(div);
                    });
                } catch(e) {}
            });
        }

        // === ARKA PLAN GÜVENLİĞİ ===
        async function kickPlayer(mId, name) { 
            if (isRosterLocked) {
                showNotification("ROSTER KİLİDİ: Aktif bir başvuru sürecinde olduğunuz için oyuncu çıkaramazsınız!", "error");
                return;
            }
            openConfirmModal(`<b>${name}</b> takımdan çıkarılsın mı?`, async () => { 
                try { 
                    await window.supabaseClient.from('team_members').delete().eq('id', mId); 
                    showNotification("Oyuncu çıkarıldı.", "info"); 
                    fetchRoster(); 
                } catch(e){} 
            }); 
        }

        async function disbandTeam() { 
            if (isRosterLocked) {
                showNotification("ROSTER KİLİDİ: Aktif başvuru varken takım dağıtılamaz! Önce başvuruyu geri çekin.", "error");
                return;
            }
            openConfirmModal("Takım dağıtılsın mı? Bu işlem geri alınamaz!", async () => { 
                try {
                    await window.supabaseClient.from('team_members').delete().eq('team_id', myTeamData.id); 
                    await window.supabaseClient.from('teams').delete().eq('id', myTeamData.id); 
                    location.reload(); 
                } catch (e) { showNotification("Hata oluştu.", "error"); }
            }); 
        }

        async function leaveTeam() { 
            if (isRosterLocked) {
                showNotification("ROSTER KİLİDİ: Aktif başvuru sürecinde takımdan ayrılamazsınız!", "error");
                return;
            }
            openConfirmModal("Takımdan ayrılmak istediğine emin misin?", async () => { 
                try {
                    await window.supabaseClient.from('team_members').delete().eq('team_id', myTeamData.id).eq('user_id', currentUser.id); 
                    location.reload(); 
                } catch (e) { showNotification("Hata oluştu.", "error"); }
            }); 
        }

        document.addEventListener('DOMContentLoaded', initTeamPage);
    </script>
</body>
</html>
