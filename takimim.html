<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Takımım | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        .team-page-container { max-width: 1100px; margin: 40px auto; padding: 20px; flex: 1; animation: fadeIn 0.4s ease; display: none; }
        
        /* OLUŞTURMA STATE (BASVURU BENZERİ) */
        .auth-card { background: rgba(10, 10, 10, 0.95); padding: 40px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 800px; margin: 0 auto; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--gri-yazi); font-weight: bold; }
        .input-group input { width: 100%; padding: 12px 15px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; outline: none; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        .input-group input:focus { border-color: var(--neon-mor); }
        .input-group input[readonly] { background: #0a0a0a; border-color: var(--neon-mor); color: var(--neon-mor); font-weight: bold; }
        .input-group input.main-captain { border-color: var(--mavi-onay); color: var(--mavi-onay); }
        
        .player-wrapper { position: relative; display: flex; align-items: center; }
        .status-tick { position: absolute; right: 40px; font-size: 18px; display: none; }
        .status-tick.grey { display: block; color: #444; }
        .status-tick.blue { display: block; color: var(--mavi-onay); filter: drop-shadow(0 0 5px var(--mavi-onay)); }
        .remove-player { position: absolute; right: 10px; font-size: 16px; color: var(--kirmizi-iptal); cursor: pointer; display: none; transition: 0.3s; }
        .remove-player:hover { transform: scale(1.2); filter: drop-shadow(0 0 5px var(--kirmizi-iptal)); }
        .autocomplete-items { position: absolute; border: 1px solid var(--neon-mor); border-top: none; z-index: 99; top: 100%; left: 0; right: 0; background-color: #0a0a0a; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; font-size: 13px; }
        .autocomplete-items div:hover { background-color: var(--neon-mor); }
        
        .save-btn { padding: 15px; width: 100%; background: var(--neon-mor); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 20px;}
        .save-btn:hover { box-shadow: 0 0 15px var(--neon-mor); transform: translateY(-2px); }
        
        /* TEAM PROFILE STATE */
        .team-profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 40px 20px; position: relative; margin-bottom: 30px; }
        .team-profile-header::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100vw; height: 100%; background: radial-gradient(circle at center, rgba(96, 29, 194, 0.15) 0%, rgba(5, 5, 5, 0) 70%); z-index: -1; pointer-events: none; }
        .team-profile-logo { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; background: #0a0a0a; border: 4px solid var(--neon-mor); padding: 5px; box-shadow: 0 0 30px rgba(96, 29, 194, 0.4); margin-bottom: 20px; transition: 0.3s; }
        .team-profile-name { font-size: 36px; font-weight: 900; color: white; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .team-profile-tag { font-size: 16px; background: var(--neon-mor); color: white; padding: 4px 12px; border-radius: 8px; font-weight: bold; letter-spacing: 2px; }
        .team-profile-meta { color: var(--gri-yazi); font-size: 13px; margin-top: 10px; }
        .team-role-badge { display: inline-block; border: 1px solid #555; color: #aaa; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; margin-left: 10px; vertical-align: middle; }
        .team-role-badge.captain { border-color: gold; color: gold; background: rgba(255, 215, 0, 0.1); }

        .lock-alert { background: rgba(255, 75, 75, 0.1); border-left: 4px solid var(--kirmizi-iptal); color: var(--kirmizi-iptal); padding: 15px 20px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        
        .roster-title { text-align: center; font-size: 24px; font-weight: 900; color: white; margin-bottom: 30px; text-transform: uppercase; position: relative; }
        .roster-title::after { content: ''; display: block; width: 60px; height: 3px; background: var(--neon-mor); margin: 10px auto 0; border-radius: 2px; }

        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .player-card { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; overflow: hidden; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.4); position: relative; }
        .player-card.pending { opacity: 0.6; border: 1px dashed #555; }
        .player-card-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1a1a1a; position: relative; }
        .player-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #333; background: #111; display:flex; justify-content:center; align-items:center; color:#555;}
        .player-card.captain .player-avatar { border-color: gold; }
        .player-names { flex: 1; overflow: hidden; }
        .player-ign { font-size: 18px; font-weight: 900; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px; }
        .player-username { font-size: 12px; color: var(--gri-yazi); display: block; margin-top: 2px; }
        
        .player-role { font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; cursor: pointer; transition: 0.3s;}
        .player-role:hover { opacity: 0.8; }
        .role-cap { background: rgba(255, 215, 0, 0.1); color: gold; border: 1px solid gold; cursor: default;}
        .role-main { background: rgba(0, 212, 255, 0.1); color: #00d4ff; border: 1px solid #00d4ff; }
        .role-sub { background: rgba(255, 255, 255, 0.05); color: #aaa; border: 1px solid #555; }
        .role-pending { background: rgba(255, 152, 0, 0.1); color: #ff9800; border: 1px solid #ff9800; cursor: default;}

        .btn-kick { position: absolute; top: 15px; right: 15px; background: transparent; color: #555; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-kick:hover { color: var(--kirmizi-iptal); background: rgba(255, 75, 75, 0.1); }

        .player-stats-row { display: grid; grid-template-columns: repeat(4, 1fr); background: #111; padding: 15px 10px; text-align: center; }
        .stat-box { display: flex; flex-direction: column; gap: 3px; border-right: 1px solid #222; }
        .stat-box:last-child { border-right: none; }
        .stat-value { font-size: 16px; font-weight: 900; color: white; }
        .stat-label { font-size: 10px; color: var(--gri-yazi); font-weight: bold; }

        .action-btn { padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; font-size: 13px; display: flex; align-items: center; gap: 8px; justify-content: center;}
        .btn-disband { background: rgba(255, 75, 75, 0.1); color: var(--kirmizi-iptal); border: 1px solid var(--kirmizi-iptal); width: max-content; margin: 0 auto; }
        .btn-disband:hover { background: var(--kirmizi-iptal); color: white; box-shadow: 0 0 15px rgba(255, 75, 75, 0.4); }

        /* Dynamic Slot Styles */
        .dynamic-slot { animation: slideInUp 0.3s ease; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ana-siyah); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>Veriler Çekiliyor...</h2>
    </div>

    <div id="header-alani"></div>
    <div id="toast-container"></div>

    <main class="team-page-container" id="createTeamSection">
        <div class="auth-card">
            <h2 class="section-title" style="text-align: center; border:none;">TAKIMINI <span>KUR</span></h2>
            <form id="teamForm">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <div class="input-group" style="flex: 2; min-width: 200px;">
                        <label>Takım Adı *</label>
                        <input type="text" id="newTeamName" placeholder="Örn: OBB Tigers" required>
                    </div>
                    <div class="input-group" style="flex: 1; min-width: 100px;">
                        <label>Takım Kısaltması *</label>
                        <input type="text" id="newTeamTag" placeholder="OBB" required maxlength="5">
                    </div>
                </div>
                <div class="input-group">
                    <label>Takım Logosu (PNG, JPG, WEBP, Max 2MB)</label>
                    <input type="file" id="newTeamLogo" accept="image/png, image/jpeg, image/jpg, image/webp">
                    <span style="font-size:11px; color:#555;">Logo zorunlu değildir, sonradan ekleyebilirsiniz.</span>
                </div>
                <button type="submit" class="save-btn" id="btnCreateTeam">TAKIMI OLUŞTUR</button>
            </form>
        </div>
    </main>

    <main class="team-page-container" id="myTeamSection">
        
        <div class="team-profile-header">
            <img src="img/unknown.webp" id="tLogo" class="team-profile-logo" alt="Takım Logosu">
            <h2 class="team-profile-name"><span id="tName">YÜKLENİYOR...</span> <span class="team-profile-tag" id="tTag">[TAG]</span></h2>
            <p class="team-profile-meta">Kuruluş Tarihi: <span id="tDate" style="color: white; font-weight: bold;">-</span> <span id="myRoleBadge" class="team-role-badge">YÜKLENİYOR</span></p>
        </div>

        <div class="lock-alert" id="lockAlert" style="display: none;">
            <i class="fas fa-lock"></i>
            <div>
                <strong>KADRO KİLİTLİ!</strong><br>
                Takımınız aktif bir turnuvada onay aldığı için turnuva bitene kadar kadro değişikliği yapamazsınız.
            </div>
        </div>

        <h3 class="roster-title">TAKIM KADROSU</h3>
        
        <div class="roster-grid" id="rosterList">
            </div>

        <div id="memberActionArea" style="display:none;">
            <button class="action-btn btn-disband" onclick="leaveTeam()"><i class="fas fa-sign-out-alt"></i> Takımdan Ayrıl</button>
        </div>
        
        <div id="captainActionArea" style="display:none; margin-top:40px;">
            <button class="action-btn btn-disband" onclick="disbandTeam()"><i class="fas fa-bomb"></i> Takımı Tamamen Dağıt</button>
        </div>
    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        let currentUser = null;
        let myTeamData = null;
        let isCaptain = false;
        let isRosterLocked = false;
        let totalMembers = 0; // Kaptan dahil kabul eden ve bekleyen toplam üye sayısı

        async function initTeamPage() {
            try {
                const { data: { user }, error: authErr } = await window.supabaseClient.auth.getUser();
                if (authErr || !user) {
                    window.location.href = "kayit.html";
                    return;
                }
                currentUser = user;
                
                // Profil kontrolü: Username ve IGN var mı?
                const { data: profile } = await window.supabaseClient.from('profiles').select('username, ign').eq('id', currentUser.id).single();
                if (!profile?.username) {
                    showNotification("Devam etmeden önce profilinizi tamamlamalısınız.", "error");
                    setTimeout(() => window.location.href = 'profil.html', 2000);
                    return;
                }

                await fetchMyTeam();
            } catch (err) {
                console.error("Başlatma hatası:", err);
            } finally {
                document.getElementById('loadingScreen').style.display = 'none';
            }
        }

        async function fetchMyTeam() {
            try {
                let { data: teamAsCaptain } = await window.supabaseClient.from('teams').select('*').eq('captain_id', currentUser.id).maybeSingle();
                
                if (teamAsCaptain) {
                    myTeamData = teamAsCaptain;
                    isCaptain = true;
                } else {
                    const { data: membership } = await window.supabaseClient.from('team_members').select('team_id').eq('user_id', currentUser.id).eq('status', 'accepted').maybeSingle();
                    if (membership) {
                        const { data: teamData } = await window.supabaseClient.from('teams').select('*').eq('id', membership.team_id).single();
                        myTeamData = teamData;
                        isCaptain = false;
                    }
                }

                if (!myTeamData) {
                    document.getElementById('createTeamSection').style.display = 'block';
                    return;
                }

                const { data: appData } = await window.supabaseClient.from('tournament_applications')
                    .select('status').eq('team_id', myTeamData.id).eq('status', 'approved').limit(1).maybeSingle();
                
                if (appData) { isRosterLocked = true; }

                renderTeamUI();
                await fetchRoster();

            } catch (err) {
                console.error("Takım bilgisi çekilemedi:", err);
                showNotification("Sistem hatası.", "error");
            }
        }

        function renderTeamUI() {
            document.getElementById('myTeamSection').style.display = 'block';
            document.getElementById('tName').innerText = myTeamData.name;
            document.getElementById('tTag').innerText = `[${myTeamData.tag}]`;
            if(myTeamData.logo_url) document.getElementById('tLogo').src = myTeamData.logo_url;
            
            const dateObj = new Date(myTeamData.created_at);
            document.getElementById('tDate').innerText = dateObj.toLocaleDateString('tr-TR');

            const roleBadge = document.getElementById('myRoleBadge');
            if (isCaptain) {
                roleBadge.innerText = "KAPTAN";
                roleBadge.className = "team-role-badge captain";
                if(!isRosterLocked) document.getElementById('captainActionArea').style.display = 'block';
            } else {
                roleBadge.innerText = "ÜYE";
                roleBadge.className = "team-role-badge";
                if(!isRosterLocked) document.getElementById('memberActionArea').style.display = 'block';
            }

            if (isRosterLocked) { document.getElementById('lockAlert').style.display = 'flex'; }
        }

        async function fetchRoster() {
            const grid = document.getElementById('rosterList');
            grid.innerHTML = '';

            try {
                const { data: captainProfile } = await window.supabaseClient.from('profiles').select('username, ign, avatar_url, matches_played').eq('id', myTeamData.captain_id).single();
                
                const { data: members } = await window.supabaseClient.from('team_members')
                    .select('id, user_id, role, status, profiles(username, ign, avatar_url, matches_played)')
                    .eq('team_id', myTeamData.id)
                    .order('created_at', { ascending: true });

                totalMembers = 1; // Kaptan = 1
                let mainCount = 1; // Kaptan Asil sayılır
                
                // 1. Kaptanı Listele
                grid.innerHTML += createPlayerCard(myTeamData.captain_id, null, captainProfile?.username, captainProfile?.ign, 'KAPTAN', 'role-cap', 'accepted', captainProfile?.avatar_url, captainProfile?.matches_played);

                // 2. Diğer Üyeleri Listele
                if (members) {
                    const filteredMembers = members.filter(m => m.user_id !== myTeamData.captain_id);
                    totalMembers += filteredMembers.length;
                    
                    filteredMembers.forEach(m => {
                        const prof = Array.isArray(m.profiles) ? m.profiles[0] : m.profiles;
                        let roleText = m.role === 'main' ? 'ASİL' : 'YEDEK';
                        let roleClass = m.role === 'main' ? 'role-main' : 'role-sub';
                        
                        if (m.role === 'main' && m.status === 'accepted') mainCount++;

                        if (m.status === 'pending') {
                            roleText = 'DAVET EDİLDİ';
                            roleClass = 'role-pending';
                        }
                        
                        grid.innerHTML += createPlayerCard(m.user_id, m.id, prof?.username, prof?.ign, roleText, roleClass, m.status, prof?.avatar_url, prof?.matches_played, m.role);
                    });
                }

                // 3. Dinamik Boş Slot Ekleme (Sadece Kaptan ve Kilitli Değilse ve 10 kişiden azsa)
                if (isCaptain && !isRosterLocked && totalMembers < 10) {
                    const nextRole = totalMembers < 5 ? 'main' : 'sub'; // İlk 5'e kadar asil, sonrası yedek
                    const nextRoleText = nextRole === 'main' ? 'Asil Oyuncu Ekle' : 'Yedek Oyuncu Ekle';
                    
                    grid.innerHTML += `
                        <div class="player-card dynamic-slot" style="display:flex; flex-direction:column; justify-content:center; align-items:center; padding:30px; border:1px dashed var(--neon-mor); background:rgba(96,29,194,0.05);">
                            <div style="width:100%; position:relative;">
                                <input type="text" id="dynamicSearch" class="player-search" autocomplete="off" placeholder="Kullanıcı Adı veya IGN Ara..." style="width:100%; padding:10px; background:#000; border:1px solid #333; border-radius:8px; color:white; outline:none; text-align:center;">
                                <div id="dynamicSearch-list" class="autocomplete-items"></div>
                            </div>
                            <span style="font-size:12px; color:var(--gri-yazi); margin-top:10px;"><i class="fas fa-plus"></i> ${nextRoleText}</span>
                        </div>
                    `;
                    attachDynamicSearchEvent(nextRole);
                }

            } catch (err) {
                console.error("Kadro hatası:", err);
                grid.innerHTML = '<div style="color:red; grid-column:1/-1; text-align:center;">Kadro yüklenirken hata oluştu.</div>';
            }
        }

        function createPlayerCard(userId, memberId, username, ign, roleText, roleClass, status, avatarUrl, matchesPlayed, dbRole) {
            const displayName = ign && ign !== 'Belirlenmedi' ? ign : (username || 'İsimsiz');
            const subName = ign && ign !== 'Belirlenmedi' ? `@${username}` : '';
            const finalAvatar = avatarUrl || ''; 
            
            let avatarHTML = `<div class="player-avatar"><i class="fas fa-user"></i></div>`;
            if (finalAvatar) {
                avatarHTML = `<img src="${finalAvatar}" class="player-avatar" onerror="this.outerHTML='<div class=\\'player-avatar\\'><i class=\\'fas fa-user\\'></i></div>'">`;
            }

            let kickBtnHTML = '';
            // Kaptan, kilitli değil ve kişi kendisi değilse ATMA ve ROL DEĞİŞTİRME işlevi ekle
            if (isCaptain && !isRosterLocked && userId !== currentUser.id) {
                kickBtnHTML = `<button class="btn-kick" onclick="kickPlayer('${memberId}', '${username}')" title="Daveti İptal Et/At"><i class="fas fa-times"></i></button>`;
                
                // Eğer oyuncu kabul ettiyse rolünü değiştirebilsin
                if (status === 'accepted') {
                    const currentMainCount = Array.from(document.querySelectorAll('.role-main')).length + 1; // +1 kaptan
                    if (dbRole === 'main') {
                        roleText = `<span onclick="changeRole('${memberId}', 'sub')" title="Yedek Yap" style="cursor:pointer;"><i class="fas fa-exchange-alt"></i> ASİL</span>`;
                    } else if (dbRole === 'sub') {
                        // Sadece asil sayısı 5'ten küçükse asil yapabilsin
                        if (currentMainCount < 5) {
                            roleText = `<span onclick="changeRole('${memberId}', 'main')" title="Asil Yap" style="cursor:pointer;"><i class="fas fa-exchange-alt"></i> YEDEK</span>`;
                        } else {
                            roleText = `<span title="Asil kadro dolu" style="opacity:0.5;">YEDEK</span>`;
                        }
                    }
                }
            }
            
            const cardClass = status === 'pending' ? 'player-card pending' : (roleClass === 'role-cap' ? 'player-card captain' : 'player-card');

            return `
                <div class="${cardClass}">
                    <div class="player-card-header">
                        ${avatarHTML}
                        <div class="player-names">
                            <div class="player-ign">${displayName}</div>
                            <span class="player-username">${subName}</span>
                            <div style="margin-top:5px;"><span class="player-role ${roleClass}">${roleText}</span></div>
                        </div>
                        ${kickBtnHTML}
                    </div>
                    <div class="player-stats-row">
                        <div class="stat-box"><span class="stat-value" style="color:var(--neon-mor);">${matchesPlayed || 0}</span><span class="stat-label">MAÇ</span></div>
                        <div class="stat-box"><span class="stat-value">0</span><span class="stat-label">K</span></div>
                        <div class="stat-box"><span class="stat-value">0</span><span class="stat-label">D</span></div>
                        <div class="stat-box"><span class="stat-value">0</span><span class="stat-label">A</span></div>
                    </div>
                </div>
            `;
        }

        // --- TAKIM KURMA (CREATE TEAM) ---
        document.getElementById('teamForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnCreateTeam');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> OLUŞTURULUYOR...';

            try {
                const name = document.getElementById('newTeamName').value.trim();
                const tag = document.getElementById('newTeamTag').value.trim().toUpperCase();
                const logoFile = document.getElementById('newTeamLogo').files[0];
                let logoUrl = "";

                if (logoFile) {
                    const ext = logoFile.name.split('.').pop().toLowerCase();
                    if (!['png', 'jpg', 'jpeg', 'webp'].includes(ext)) throw new Error("Sadece PNG, JPG, WEBP yükleyebilirsiniz.");
                    if (logoFile.size > 2 * 1024 * 1024) throw new Error("Logo 2MB'dan küçük olmalıdır.");
                    
                    const fileName = `logo_${currentUser.id}_${Date.now()}.${ext}`; 
                    const { error: uploadErr } = await window.supabaseClient.storage.from('team-logos').upload(fileName, logoFile, { cacheControl: '3600', upsert: true });
                    if (uploadErr) throw uploadErr;
                    
                    const { data } = window.supabaseClient.storage.from('team-logos').getPublicUrl(fileName);
                    logoUrl = data.publicUrl;
                }

                const { data: newTeam, error } = await window.supabaseClient.from('teams').insert({
                    captain_id: currentUser.id, name: name, tag: tag, logo_url: logoUrl
                }).select().single();
                
                if (error) throw error;

                // Kaptanı otomatik asil olarak ekle (Gerçi captain_id yetiyor ama team_members'da da dursun ileride lazım olursa)
                await window.supabaseClient.from('team_members').insert({
                    team_id: newTeam.id, user_id: currentUser.id, role: 'main', status: 'accepted'
                });

                showNotification("Takım başarıyla kuruldu!", "success");
                setTimeout(() => location.reload(), 1500);

            } catch (err) {
                showNotification("Takım kurulamadı: " + err.message, "error");
                btn.disabled = false; btn.innerHTML = 'TAKIMI OLUŞTUR';
            }
        });

        // --- DİNAMİK ARAMA VE DAVET (SEARCH & INVITE) ---
        function attachDynamicSearchEvent(autoRole) {
            const input = document.getElementById('dynamicSearch');
            if (!input) return;

            input.addEventListener('blur', function() {
                setTimeout(() => { document.getElementById('dynamicSearch-list').innerHTML = ''; }, 200);
            });

            input.addEventListener('input', async function() {
                const query = this.value;
                const list = document.getElementById('dynamicSearch-list');
                list.innerHTML = '';
                if (query.length < 2) return;

                try {
                    const { data: profiles } = await window.supabaseClient.from('profiles')
                        .select('id, username, ign')
                        .or(`ign.ilike.%${query}%,username.ilike.%${query}%`)
                        .limit(10);
                    
                    if (!profiles || profiles.length === 0) return;

                    // Bu takımda zaten olanları filtrele
                    const { data: existing } = await window.supabaseClient.from('team_members').select('user_id').eq('team_id', myTeamData.id);
                    const existingIds = existing ? existing.map(e => e.user_id) : [];
                    existingIds.push(myTeamData.captain_id);

                    const filtered = profiles.filter(p => !existingIds.includes(p.id));

                    filtered.forEach(u => {
                        const div = document.createElement('div');
                        const disp = u.ign ? `${u.ign} (${u.username})` : u.username;
                        div.innerHTML = `<i class="fas fa-user-plus"></i> ${disp}`;
                        div.onclick = async () => {
                            input.value = "Davet Gönderiliyor...";
                            input.disabled = true;
                            list.innerHTML = '';
                            
                            try {
                                const { error } = await window.supabaseClient.from('team_members').insert({
                                    team_id: myTeamData.id, user_id: u.id, role: autoRole, status: 'pending'
                                });
                                if (error) throw error;

                                await window.supabaseClient.from('bildirimler').insert([{ 
                                    kullanici_id: u.id, baslik: "Yeni Takım Daveti!", 
                                    mesaj: `${myTeamData.name} takımı sizi davet etti. Profilinizden kabul edebilirsiniz.`, tip: 'sistem' 
                                }]);
                                
                                fetchRoster(); // Listeyi yenile ve yeni boş slot aç

                            } catch(e) {
                                showNotification("Davet gönderilemedi.", "error");
                                input.value = ''; input.disabled = false;
                            }
                        };
                        list.appendChild(div);
                    });
                } catch(e) {}
            });
        }

        async function kickPlayer(memberId, username) {
            if (!confirm(`Bu oyuncuyu takımdan atmak (veya davetini iptal etmek) istediğinize emin misiniz?`)) return;
            try {
                const { error } = await window.supabaseClient.from('team_members').delete().eq('id', memberId);
                if (error) throw error;
                fetchRoster(); 
            } catch (err) { showNotification("İşlem başarısız.", "error"); }
        }

        async function changeRole(memberId, newRole) {
            try {
                const { error } = await window.supabaseClient.from('team_members').update({ role: newRole }).eq('id', memberId);
                if (error) throw error;
                fetchRoster();
            } catch (err) { showNotification("Rol değiştirilemedi.", "error"); }
        }

        async function disbandTeam() {
            if (!confirm("DİKKAT: Takımı tamamen dağıtmak istediğinize emin misiniz? Bu işlem geri alınamaz!")) return;
            try {
                await window.supabaseClient.from('team_members').delete().eq('team_id', myTeamData.id);
                const { error } = await window.supabaseClient.from('teams').delete().eq('id', myTeamData.id);
                if (error) throw error;
                showNotification("Takım dağıtıldı.", "success");
                setTimeout(() => window.location.reload(), 1500);
            } catch (err) { showNotification("Takım silinirken hata oluştu.", "error"); }
        }

        async function leaveTeam() {
            if (!confirm("Takımdan ayrılmak istediğinize emin misiniz?")) return;
            try {
                const { error } = await window.supabaseClient.from('team_members').delete().eq('team_id', myTeamData.id).eq('user_id', currentUser.id);
                if (error) throw error;
                showNotification("Takımdan ayrıldınız.", "success");
                setTimeout(() => window.location.reload(), 1500);
            } catch (err) { showNotification("Ayrılma işlemi başarısız.", "error"); }
        }

        // Realtime dinleyici: Birisi daveti kabul ederse listeyi otomatik yenile
        window.addEventListener('storage', function(e) {
            if (e.key === 'teamInviteSignal' && myTeamData) {
                fetchRoster(); 
            }
        });

        document.addEventListener('DOMContentLoaded', initTeamPage);
    </script>
</body>
