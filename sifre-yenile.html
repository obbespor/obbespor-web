<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Şifre Yenile | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        .auth-wrapper { min-height: calc(100vh - 160px); display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { background: rgba(10, 10, 10, 0.95); padding: 40px; border-radius: 20px; border: 1px solid #222; max-width: 450px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
        .auth-header h1 { font-size: 2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .purple-neon { color: var(--neon-mor); text-shadow: 0 0 15px var(--neon-mor); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--gri-yazi); font-weight: bold; }
        .input-group input { width: 100%; padding: 12px 15px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--neon-mor); }
        .update-btn { width: 100%; padding: 15px; background: var(--neon-mor); color: white; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .update-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-mor); }
        .update-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>

    <header class="main-nav">
        <a href="index.html" class="logo">OBB <span>E-SPORTS</span></a>
        <nav>
            <ul>
                <li><a href="index.html">ANA SAYFA</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card" id="authCardContainer">
            <div class="auth-header">
                <h1>ŞİFREYİ <span class="purple-neon">YENİLE</span></h1>
                <p style="color: var(--gri-yazi); font-size: 14px; margin-bottom: 25px;">Lütfen yeni hesabınız için güçlü bir şifre belirleyin.</p>
            </div>

            <form id="resetForm">
                <div class="input-group">
                    <label>Yeni Şifre</label>
                    <input type="password" id="newPass" placeholder="En az 6 karakter" required minlength="6">
                </div>
                <div class="input-group">
                    <label>Yeni Şifre (Tekrar)</label>
                    <input type="password" id="confirmPass" placeholder="Şifrenizi tekrar girin" required>
                </div>
                <button type="submit" class="update-btn" id="updateBtn">ŞİFREMİ GÜNCELLE</button>
            </form>
        </div>
    </div>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/app.js"></script>

    <script>
        let isRecoveryReady = false;

        // 1. URL'de PKCE Kodu var mı kontrol et ve zorla oturum aç
        async function handleRecoveryToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code'); 
            
            if (code) {
                console.log("Kurtarma kodu algılandı, oturum kuruluyor...");
                const { error } = await window.supabaseClient.auth.exchangeCodeForSession(code);
                if (!error) {
                    isRecoveryReady = true;
                    return;
                }
            }
            
            // Eski usül Hash kontrolü
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                isRecoveryReady = true;
            }
        }

        // 2. Supabase Oturum Durumu Dinleyicisi
        window.supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY' || session) {
                isRecoveryReady = true;
            }
        });

        // Sayfa yüklendiğinde güvenlik kontrolü
        document.addEventListener('DOMContentLoaded', async () => {
            await handleRecoveryToken();

            setTimeout(async () => {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                
                // Eğer oturum kurulamadıysa (Link gerçekten ölmüşse)
                if (!session && !isRecoveryReady) {
                    document.getElementById('newPass').disabled = true;
                    document.getElementById('confirmPass').disabled = true;
                    
                    const btn = document.getElementById('updateBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-lock"></i> LİNK GEÇERSİZ VEYA KULLANILMIŞ';
                    btn.style.background = "#333";
                    btn.style.color = "#888";
                    
                    showNotification("Bu bağlantı geçersiz veya daha önce kullanılmış. Lütfen yeni bir şifre sıfırlama isteği gönderin.", "error");
                }
            }, 1500); 
        });

        // --- FORM GÖNDERİMİ VE SUPABASE GÜVENLİĞİ ---
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const btn = document.getElementById('updateBtn');

            if (newPass !== confirmPass) {
                showNotification("Şifreler uyuşmuyor. Lütfen kontrol edin.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GÜNCELLENİYOR...';

            // Şifreyi Güncelle
            const { error } = await window.supabaseClient.auth.updateUser({
                password: newPass
            });

            if (error) {
                console.error("Güncelleme Hatası:", error);
                showNotification("İşlem başarısız oldu. Güvenlik süresi dolmuş olabilir.", "error");
                btn.disabled = false;
                btn.innerHTML = "ŞİFREMİ GÜNCELLE";
            } else {
                showNotification("Şifreniz başarıyla güncellendi! Ana sayfaya yönlendiriliyorsunuz.", "success");
                setTimeout(() => {
                    window.location.href = "index.html"; 
                }, 2000);
            }
        });
    </script>
</body>
</html>
