<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <meta name="keywords" content="e-spor, ordu e-spor, obb esports, valorant turnuvası, cs2 turnuvası, takım bul, e-spor kayıt, obb">

    <meta name="theme-color" content="#601dc2"> 
    
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OBB E-SPORTS">
    <meta property="og:title" content="Turnuvalarım | OBB E-SPORTS">
    <meta property="og:description" content="Ordu'dan yükselen e-spor topluluğu OBB E-SPORTS'a katıl! Turnuvalarda rekabet et ve zafere ulaş.">
    <meta property="og:url" content="https://obbesports.com">

    <meta property="og:image:width" content="1200">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Turnuvalarım | OBB E-SPORTS">
    <meta name="twitter:description" content="Ordu'dan yükselen e-spor topluluğu OBB E-SPORTS'a katıl! Turnuvalarda rekabet et ve zafere ulaş.">
    <meta name="twitter:image" content="https://obbesports.com/img/obblogo.png">

    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link rel="apple-touch-icon" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        .page-wrapper { flex: 1; padding: 50px 10%; max-width: 1400px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; }
        .page-header { margin-bottom: 40px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 20px; }
        .page-header h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .page-header h1 span { color: var(--neon-mor); }

        #empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; background: var(--card-bg); border: 1px dashed var(--neon-mor); border-radius: 15px; margin-top: 20px; }
        #empty-state i { font-size: 60px; color: var(--gri-yazi); margin-bottom: 20px; opacity: 0.5; }
        #active-state { display: none; }
        
        .showcase-card { display: flex; background: var(--card-bg); border: 1px solid rgba(96, 29, 194, 0.3); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; }
        .showcase-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--neon-mor), #b785f6); }
        .showcase-image { flex: 1; background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1000&auto=format&fit=crop') center/cover no-repeat; position: relative; min-height: 400px; }
        .showcase-image::after { content: ''; position: absolute; top: 0; right: 0; width: 50%; height: 100%; background: linear-gradient(to right, transparent, var(--card-bg)); }
        .showcase-content { flex: 1.2; padding: 40px; display: flex; flex-direction: column; justify-content: center; z-index: 2; height: 100%; }

        .status-badge { display: inline-block; background: rgba(96, 29, 194, 0.2); color: #b785f6; border: 1px solid var(--neon-mor); padding: 6px 15px; border-radius: 30px; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; width: max-content; }
        .tourney-title { font-size: 32px; font-weight: 900; margin-bottom: 10px; line-height: 1.2; }
        .tourney-meta { display: flex; gap: 20px; color: var(--gri-yazi); font-size: 14px; margin-bottom: 30px; }
        .tourney-meta span i { color: var(--neon-mor); margin-right: 5px; }

        .team-section { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-top: auto; }
        .team-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .team-header h3 { font-size: 20px; font-weight: 700; margin: 0; }
        .team-tag { background: #111; padding: 4px 10px; border-radius: 5px; font-size: 12px; color: var(--gri-yazi); font-weight: bold; }
        .roster-list { display: flex; flex-direction: column; gap: 10px; }
        .roster-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 8px; border-left: 3px solid transparent; transition: 0.3s; }
        .roster-item:hover { border-left-color: var(--neon-mor); background: rgba(96, 29, 194, 0.1); }
        .roster-user { display: flex; align-items: center; gap: 12px; }
        .roster-user img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .roster-role { font-size: 11px; font-weight: bold; text-transform: uppercase; color: var(--gri-yazi); }
        .role-captain { color: #b785f6; font-weight: 900;}

        @media (max-width: 768px) {
            .page-wrapper { padding: 30px 5%; }
            .showcase-card { flex-direction: column; overflow: visible !important; height: auto !important; }
            .showcase-image { display: none; }
            .showcase-content { padding: 25px 20px; height: auto !important; }
            .tourney-meta { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="header-alani"></div>

    <main class="page-wrapper">
        <div class="page-header">
            <h1>Turnuva <span>Geçmişim</span></h1>
            <p style="color: var(--gri-yazi);">Güncel başvuruların ve takım istatistiklerin.</p>
        </div>

        <div id="empty-state">
            <i class="fas fa-ghost"></i>
            <h2>Turnuva Geçmişi Bulunamadı</h2>
            <p>Şu an herhangi bir turnuvaya kayıtlı veya bir takımda görünmüyorsun.</p>
            <a href="turnuvalar.html" class="nav-btn" style="margin-top: 15px;">Turnuvalara Göz At</a>
        </div>

        <div id="active-state">
            <div class="showcase-card">
                <div class="showcase-image" id="showcaseImage"></div>
                <div class="showcase-content">
                    <span class="status-badge" id="appStatusBadge">Kura Bekleniyor</span>
                    <h2 class="tourney-title" id="display-tourney-name">Yükleniyor...</h2>
                    <div class="tourney-meta">
                        <span><i class="fas fa-calendar-alt"></i> Yakında</span>
                        <span><i class="fas fa-trophy"></i> Belirtilmemiş</span>
                    </div>

                    <div class="team-section">
                        <div class="team-header">
                            <h3 id="display-team-name">Takım Adı Yükleniyor...</h3>
                            <span class="team-tag" id="display-team-tag">[...]</span>
                        </div>
                        <div class="roster-list" id="display-roster"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const emptyState = document.getElementById('empty-state');
            const activeState = document.getElementById('active-state');

            try {
                const db = window.supabaseClient;
                const { data: { session } } = await db.auth.getSession();
                if (!session) { emptyState.style.display = 'flex'; return; }

                const userId = session.user.id;

                // 1. Kullanıcının üyesi olduğu takımı bul (YENİ MİMARİ)
                const { data: myTeamMembership } = await db.from('team_members')
                    .select('team_id')
                    .eq('user_id', userId)
                    .in('status', ['accepted', 'pending'])
                    .limit(1)
                    .maybeSingle();

                if (!myTeamMembership) { 
                    emptyState.style.display = 'flex'; 
                    return; 
                }
                const teamId = myTeamMembership.team_id;

                // 2. Takım bilgilerini 'teams' tablosundan çek
                const { data: teamData } = await db.from('teams')
                    .select('name, tag, captain_id, logo_url')
                    .eq('id', teamId)
                    .single();

                if (!teamData) { 
                    emptyState.style.display = 'flex'; 
                    return; 
                }

                // 3. Takımın turnuva başvurusunu çek
                const { data: appData } = await db.from('tournament_applications')
                    .select('status, tournaments(name)')
                    .eq('team_id', teamId)
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .maybeSingle();

                // Eğer başvurusu yoksa (henüz takım oluşturma aşamasındaysa)
                if (!appData) { 
                    emptyState.style.display = 'flex'; 
                    return; 
                }
                
                emptyState.style.display = 'none'; 
                activeState.style.display = 'block'; 

                // DOM Güncellemeleri
                document.getElementById('display-tourney-name').innerText = appData.tournaments?.name || "OBB 1. Topluluk Turnuvası";
                document.getElementById('display-team-name').innerText = teamData.name || "İsimsiz Takım";
                document.getElementById('display-team-tag').innerText = teamData.tag ? `[${teamData.tag}]` : "[-]";
                
                // Takım logosunu arka plan olarak ayarla
                if (teamData.logo_url) {
                    document.getElementById('showcaseImage').style.backgroundImage = `url('${teamData.logo_url}')`;
                }

                // Durum Rozetini Güncelle
                const badge = document.getElementById('appStatusBadge');
                if (appData.status === 'approved') { 
                    badge.innerText = "ONAYLANDI"; 
                    badge.style.color = "var(--yesil-guven)"; 
                    badge.style.borderColor = "var(--yesil-guven)"; 
                    badge.style.background = "rgba(0, 230, 118, 0.1)";
                } else if (appData.status === 'pending') { 
                    badge.innerText = "İncelemede"; 
                    badge.style.color = "var(--mavi-onay)"; 
                    badge.style.borderColor = "var(--mavi-onay)"; 
                    badge.style.background = "rgba(0, 210, 255, 0.1)";
                } else if (appData.status === 'rejected') {
                    badge.innerText = "REDDEDİLDİ"; 
                    badge.style.color = "var(--kirmizi-iptal)"; 
                    badge.style.borderColor = "var(--kirmizi-iptal)"; 
                    badge.style.background = "rgba(255, 75, 75, 0.1)";
                }

                // 4. Kadroyu 'team_members' tablosundan çek
                const rosterContainer = document.getElementById('display-roster');
                rosterContainer.innerHTML = ''; 

                const { data: members } = await db.from('team_members')
                    .select('role, user_id, status, profiles(username, avatar_url)')
                    .eq('team_id', teamId)
                    .neq('status', 'rejected');

                if (members) {
                    // Kaptanı listeye ilk olarak ekle
                    const captain = members.find(m => m.user_id === teamData.captain_id);
                    if (captain) {
                        rosterContainer.innerHTML += `
                            <div class="roster-item" style="border-left-color: var(--neon-mor);">
                                <div class="roster-user"><img src="${captain.profiles?.avatar_url || 'img/obblogo.png'}"><span class="nick">${captain.profiles?.username || 'Kaptan'}</span></div>
                                <span class="roster-role role-captain"><i class="fas fa-crown"></i> Kaptan</span>
                            </div>`;
                    }
                    
                    // Diğer oyuncuları ekle
                    members.forEach(member => {
                        if (member.user_id === teamData.captain_id) return; 
                        const username = member.profiles?.username || "Oyuncu";
                        const roleText = member.status === 'pending' ? '<i class="fas fa-clock"></i> Bekliyor' : (member.role === 'main' ? 'Asil' : 'Yedek');
                        rosterContainer.innerHTML += `
                            <div class="roster-item">
                                <div class="roster-user"><img src="${member.profiles?.avatar_url || 'img/obblogo.png'}"><span class="nick">${username}</span></div>
                                <span class="roster-role">${roleText}</span>
                            </div>`;
                    });
                }
            } catch (error) { 
                console.error("Turnuva geçmişi yüklenirken hata oluştu:", error);
                emptyState.style.display = 'flex'; 
                activeState.style.display = 'none';
            }
        });
    </script>
</body>
</html>
