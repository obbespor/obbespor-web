<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maç Yönetimi | OBB E-SPOR ADMIN</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        nav ul li a { cursor: pointer; }
        .active-admin-tab { color: var(--neon-mor) !important; border-bottom: 2px solid var(--neon-mor); padding-bottom: 3px; }

        .admin-container { padding: 40px 10%; flex: 1; }
        .section-title { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 10px; color: white; }
        .section-title span { color: var(--neon-mor); }

        .match-management-card { background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px; }
        .form-control { background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; font-family: 'Poppins', sans-serif; outline: none; transition: 0.3s; font-size: 14px; }
        .form-control:focus { border-color: var(--neon-mor); box-shadow: 0 0 15px rgba(96, 29, 194, 0.3); }

        .api-fetch-box { background: rgba(96, 29, 194, 0.05); border: 1px dashed var(--neon-mor); padding: 25px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; position: relative; }
        .api-badge { position: absolute; top: -12px; left: 20px; background: var(--neon-mor); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .api-input-row { display: flex; gap: 15px; align-items: center; }
        .api-fetch-box input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 15px 20px; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
        .api-fetch-box input:focus { border-color: var(--neon-mor); box-shadow: 0 0 15px rgba(96, 29, 194, 0.3); }
        .btn-fetch { background: var(--neon-mor); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; white-space: nowrap; display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif; text-transform: uppercase; }
        .btn-fetch:hover { box-shadow: 0 0 20px rgba(96, 29, 194, 0.5); transform: translateY(-2px); }

        .match-score-header { display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid #222;}
        .team-score-input { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        /* DÜZENLENEBİLİR TAKIM İSİMLERİ */
        .team-name-input { text-align: center; font-weight: 900; background: transparent; border: none; border-bottom: 1px dashed #555; color: white; font-size: 24px; text-transform: uppercase; outline: none; width: 220px; padding-bottom: 5px; transition: 0.3s; }
        .team-name-input:focus { border-bottom-color: var(--neon-mor); background: rgba(255,255,255,0.05); }
        
        .big-score-input { background: #000; border: 2px solid #444; color: white; width: 90px; height: 90px; text-align: center; font-size: 40px; font-weight: 900; border-radius: 15px; outline: none; transition: 0.3s; }
        .big-score-input:focus { border-color: var(--neon-mor); box-shadow: 0 0 15px rgba(96, 29, 194, 0.3); }
        .vs-text { text-align: center; font-size: 24px; font-weight: 900; color: var(--gri-yazi); display: flex; flex-direction: column; gap: 10px; }
        
        .map-input { background: #111; border: 1px solid #444; color: var(--neon-mor); padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; text-align: center; text-transform: uppercase; outline: none; transition: 0.3s; width: 150px; }
        .map-input:focus { border-color: white; color: white; }

        .stats-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .team-stats-box h4 { font-size: 15px; margin-bottom: 15px; text-transform: uppercase; border-left: 4px solid; padding-left: 10px; transition: 0.3s; }
        
        .player-stat-row { display: grid; grid-template-columns: 90px 1.5fr 1.5fr 45px 45px 45px; gap: 10px; margin-bottom: 10px; align-items: center; background: #0d0d0d; padding: 10px; border-radius: 10px; border: 1px solid #222; transition: 0.3s; }
        .player-stat-row:hover { border-color: #444; background: #111; }
        
        .player-stat-row input, .player-stat-row select { background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 6px; font-size: 13px; outline: none; transition: 0.3s; width: 100%; text-align: center; }
        .player-stat-row input:focus, .player-stat-row select:focus { border-color: var(--neon-mor); }
        .player-stat-row input.ign-input { text-align: left; font-weight: bold; color: white; }
        
        .agent-input-group { display: flex; align-items: center; gap: 5px; }
        .agent-icon { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; border: 1px solid #444; background: #222; }

        .stat-label { font-size: 10px; color: var(--gri-yazi); text-align: center; font-weight: bold; }
        
        .btn-save-match { background: linear-gradient(45deg, #1f8536, #28a745); color: white; border: none; padding: 20px; border-radius: 12px; font-weight: 900; font-size: 18px; width: 100%; cursor: pointer; margin-top: 40px; transition: 0.3s; text-transform: uppercase; display: flex; justify-content: center; align-items: center; gap: 10px; letter-spacing: 1px; }
        .btn-save-match:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(40, 167, 69, 0.4); }

        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }

        @media (max-width: 768px) {
            .api-input-row { flex-direction: column; }
            .btn-fetch { width: 100%; justify-content: center; }
            .match-score-header { flex-direction: column; gap: 20px; }
            .stats-grid-container { grid-template-columns: 1fr; }
            .player-stat-row { grid-template-columns: 45px 1fr 1fr 35px 35px 35px; gap: 5px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>Güvenlik Kontrolü Yapılıyor...</h2>
    </div>

    <header class="main-nav" id="mainHeader">
        <a href="index.html" class="logo">OBB <span>ADMIN</span></a>
        <nav>
            <ul>
                <li><a href="index.html">ANA SAYFA</a></li>
                <li><a href="admin.html">ONAY</a></li>
                <li><a href="admin.html">ONAYLI</a></li>
                <li><a href="admin.html">DUYURU</a></li>
                <li><a href="#" class="active-admin-tab">BRACKET</a></li>
                <li id="authAction"><a href="kayit.html" class="nav-btn">YÜKLENİYOR...</a></li>
            </ul>
        </nav>
    </header>

    <div id="toast-container"></div>

    <main class="admin-container">
        <h2 class="section-title">MAÇ & İSTATİSTİK <span>YÖNETİMİ</span></h2>
        
        <div class="match-management-card">
            <div class="form-group" style="margin-bottom: 30px;">
                <label style="color:var(--neon-mor); font-weight: bold; text-transform: uppercase; font-size: 14px;">1. Önce Turnuva Eşleşmesini Seçin (Veya Tamamen Manuel Girin)</label>
                <select id="matchSelector" class="form-control" onchange="initHybridUI(this.value)">
                    <option value="">-- Yeni / Manuel Maç Girişi --</option>
                    <option value="m1">OBB 1. TOPLULUK TURNUVASI (Fikstürden Seç)</option>
                </select>
            </div>

            <div id="dynamicMatchArea" style="display: none; animation: fadeIn 0.5s ease;">
                <div class="api-fetch-box">
                    <span class="api-badge">Opsiyonel: API İle Otomatik Doldur</span>
                    <div class="api-input-row">
                        <input type="text" id="apiMatchId" placeholder="Valorant Match ID (Elinizde Varsa)">
                        <button class="btn-fetch" id="btnFetchApi" onclick="fetchValorantData()">
                            <i class="fas fa-bolt"></i> VERİLERİ ÇEK
                        </button>
                    </div>
                </div>

                <div class="match-score-header">
                    <div class="team-score-input">
                        <input type="text" id="teamAName" class="team-name-input" placeholder="SOL TAKIM ADI" onkeyup="syncTeamName('A', this.value)" onblur="fetchTeamProfiles('A', this.value)">
                        <input type="number" id="scoreA" class="big-score-input" value="0" min="0">
                    </div>
                    <div class="vs-text">
                        VS
                        <input type="text" id="mapNameInput" class="map-input" placeholder="HARİTA YAZIN">
                    </div>
                    <div class="team-score-input">
                        <input type="text" id="teamBName" class="team-name-input" placeholder="SAĞ TAKIM ADI" onkeyup="syncTeamName('B', this.value)" onblur="fetchTeamProfiles('B', this.value)">
                        <input type="number" id="scoreB" class="big-score-input" value="0" min="0">
                    </div>
                </div>

                <div class="stats-grid-container">
                    <div class="team-stats-box">
                        <h4 id="headerTeamA" style="color: #00d2ff; border-left-color: #00d2ff;">SOL TAKIM <span>(Mavi)</span></h4>
                        <div id="teamAPlayersInputs"></div>
                    </div>
                    <div class="team-stats-box">
                        <h4 id="headerTeamB" style="color: #ff4b4b; border-left-color: #ff4b4b;">SAĞ TAKIM <span>(Kırmızı)</span></h4>
                        <div id="teamBPlayersInputs"></div>
                    </div>
                </div>

                <button class="btn-save-match" id="btnSaveMatch" onclick="saveMappedStats()">
                    <i class="fas fa-save"></i> İSTATİSTİKLERİ KAYDET VE BİTİR
                </button>
            </div>
        </div>
    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        async function initAdminBracketPage() {
            try {
                const response = await fetch("components/footer.html");
                if (response.ok) document.getElementById("footer-alani").innerHTML = await response.text();
            } catch(e) { console.error("Footer yüklenemedi", e); }

            if (typeof checkUserStatus === "function") await checkUserStatus();
            checkAdminAccess();
        }

        async function checkAdminAccess() {
            try {
                const { data: { user }, error: authError } = await window.supabaseClient.auth.getUser();
                if (authError || !user) throw new Error("Giriş yapılmadı.");
                const { data: profile } = await window.supabaseClient.from('profiles').select('role').eq('id', user.id).single();
                if (!profile || profile.role !== 'admin') throw new Error("Yetkisiz erişim.");
                document.getElementById('loadingScreen').style.display = 'none';
                
                initHybridUI("manuel"); 
            } catch (err) { window.location.replace("index.html"); }
        }

        function initHybridUI(val) {
            const area = document.getElementById('dynamicMatchArea');
            if(!val) { area.style.display = 'none'; return; }
            area.style.display = 'block';
            
            generateEmptyRows('teamAPlayersInputs');
            generateEmptyRows('teamBPlayersInputs');
        }

        function generateEmptyRows(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = `
                <div class="player-stat-row" style="background: transparent; border: none; padding-bottom: 0;">
                    <span class="stat-label">AJAN</span><span class="stat-label" style="text-align:left;">OYUN İÇİ NİCK</span><span class="stat-label">PROFİL EŞLEŞTİR</span><span class="stat-label">K</span><span class="stat-label">D</span><span class="stat-label">A</span>
                </div>
            `;
            
            for(let i=0; i<5; i++) {
                container.innerHTML += `
                    <div class="player-stat-row">
                        <div class="agent-input-group">
                            <img src="img/agents/unknown.png" class="agent-icon" id="${containerId}_icon_${i}">
                            <input type="text" class="agent-name-input" placeholder="Ajan" onkeyup="updateAgentIcon(this, '${containerId}_icon_${i}')">
                        </div>
                        <input type="text" class="ign-input" placeholder="IGN">
                        <select class="user-matcher-select"><option value="">-- Takım İsmi Girin --</option></select>
                        <input type="number" class="k-input" value="0" min="0">
                        <input type="number" class="d-input" value="0" min="0">
                        <input type="number" class="a-input" value="0" min="0">
                    </div>`;
            }
        }

        // 1. TAKIM İSMİ YAZILDIKÇA BAŞLIĞI DEĞİŞTİR (SENKRONİZASYON)
        function syncTeamName(team, name) {
            const header = document.getElementById(team === 'A' ? 'headerTeamA' : 'headerTeamB');
            const defaultName = team === 'A' ? 'SOL TAKIM' : 'SAĞ TAKIM';
            const color = team === 'A' ? '#00d2ff' : '#ff4b4b';
            
            header.innerHTML = `${name.toUpperCase() || defaultName} <span style="font-size:12px; color:${color}; opacity:0.7;">${team === 'A' ? '(Mavi)' : '(Kırmızı)'}</span>`;
        }

        // 2. TAKIM İSMİ YAZILIP ÇIKILDIĞINDA (ONBLUR) SUPABASE'DEN OYUNCULARI ÇEK
        async function fetchTeamProfiles(team, teamName) {
            if (!teamName || teamName.length < 2) return;
            
            const containerId = team === 'A' ? 'teamAPlayersInputs' : 'teamBPlayersInputs';
            const selects = document.getElementById(containerId).querySelectorAll('.user-matcher-select');
            
            // Yükleniyor efekti
            selects.forEach(select => select.innerHTML = '<option value="">Aranıyor...</option>');

            try {
                // --- 1. ADIM: TAKIMIN ID'SİNİ BUL ---
                const { data: teamData, error: teamErr } = await window.supabaseClient
                    .from('tournament_applications')
                    .select('id')
                    .ilike('team_name', `%${teamName.trim()}%`) 
                    .limit(1)
                    .single();

                if (teamErr || !teamData) {
                    throw new Error("Bu isimde bir takım bulunamadı.");
                }

                // --- 2. ADIM: BULUNAN ID İLE OYUNCULARI GETİR ---
                const { data: players, error: playersErr } = await window.supabaseClient
                    .from('profiles')
                    .select('id, username')
                    .eq('team_id', teamData.id); // İşte bağlantı noktası!

                if (playersErr) throw playersErr;

                let optionsHtml = '<option value="">-- Profil Seç --</option>';
                if (players && players.length > 0) {
                    players.forEach(p => {
                        optionsHtml += `<option value="${p.id}">${p.username}</option>`;
                    });
                    showNotification(`${teamName} oyuncuları bulundu!`, "info");
                } else {
                    optionsHtml = '<option value="">-- Bu takımda kayıtlı oyuncu yok --</option>';
                }

                // Tüm dropdownları doldur
                selects.forEach(select => select.innerHTML = optionsHtml);

            } catch (err) {
                console.warn("Takım araması başarısız:", err.message);
                selects.forEach(select => select.innerHTML = '<option value="">Takım Bulunamadı</option>');
            }
        }

        // AJAN İKONU GÜNCELLEYİCİ
        function updateAgentIcon(inputEl, iconId) {
            const val = inputEl.value.trim().toLowerCase();
            const icon = document.getElementById(iconId);
            if(val.length > 2) {
                icon.src = `https://ui-avatars.com/api/?name=${val}&background=random&color=fff`;
            } else {
                icon.src = "img/agents/unknown.png";
            }
        }

        // --- OPTIONAL: API FONKSİYONU ---
        async function fetchValorantData() {
            const matchId = document.getElementById('apiMatchId').value.trim();
            if (!matchId) return showNotification("Lütfen bir Match ID girin!", "error");

            const apiKey = "BURAYA_HDEV_ANAHTARINI_YAPIŞTIR";

            const btn = document.getElementById('btnFetchApi');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> BAĞLANILIYOR...';
            btn.disabled = true;

            try {
                const apiUrl = `https://api.henrikdev.xyz/valorant/v2/match/${matchId}?region=eu`;
                const response = await fetch(apiUrl, {
                    headers: { 'Authorization': apiKey }
                });
                const result = await response.json();

                if (result.status !== 200) {
                     throw new Error(result.errors ? result.errors[0].message : "Maç verisi çekilemedi.");
                }

                const data = result.data;
                document.getElementById('mapNameInput').value = data.metadata.map.toUpperCase();
                
                document.getElementById('scoreA').value = data.teams.blue.rounds_won;
                document.getElementById('scoreB').value = data.teams.red.rounds_won;

                const bluePlayers = data.players.all_players.filter(p => p.team.toLowerCase() === 'blue');
                const redPlayers = data.players.all_players.filter(p => p.team.toLowerCase() === 'red');

                populateRows('teamAPlayersInputs', bluePlayers);
                populateRows('teamBPlayersInputs', redPlayers);

                showNotification("Veriler API'den otomatik dolduruldu!", "success");

            } catch (err) {
                console.error("API Hatası:", err);
                showNotification("API Hatası: " + err.message, "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-bolt"></i> VERİLERİ ÇEK';
                btn.disabled = false;
            }
        }

        function populateRows(containerId, players) {
            const rows = document.getElementById(containerId).querySelectorAll('.player-stat-row');
            players.forEach((p, i) => {
                const actualRow = rows[i+1]; 
                if(actualRow) {
                    actualRow.querySelector('.agent-icon').src = p.assets.agent.small;
                    actualRow.querySelector('.agent-name-input').value = p.character;
                    actualRow.querySelector('.ign-input').value = `${p.name}#${p.tag}`;
                    actualRow.querySelector('.k-input').value = p.stats.kills;
                    actualRow.querySelector('.d-input').value = p.stats.deaths;
                    actualRow.querySelector('.a-input').value = p.stats.assists;
                }
            });
        }

        // 3. TÜM VERİLERİ (API VEYA MANUEL) SUPABASE'E KAYDET
        async function saveMappedStats() {
            const btn = document.getElementById('btnSaveMatch');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> KAYDEDİLİYOR...';
            btn.disabled = true;

            try {
                // Temel Verileri Al
                const teamA = document.getElementById('teamAName').value || 'Belirsiz Takım A';
                const teamB = document.getElementById('teamBName').value || 'Belirsiz Takım B';
                const scoreA = parseInt(document.getElementById('scoreA').value) || 0;
                const scoreB = parseInt(document.getElementById('scoreB').value) || 0;
                const mapName = document.getElementById('mapNameInput').value || 'Bilinmiyor';

                if(scoreA === 0 && scoreB === 0) throw new Error("Skorlar girilmemiş!");

                // A. BRACKET_MATCHES Tablosuna Ekle/Güncelle
                const { data: matchData, error: matchErr } = await window.supabaseClient
                    .from('bracket_matches')
                    .insert([{
                        round_name: 'Fikstür Maçı',
                        round_order: 1,
                        series_score_a: scoreA,
                        series_score_b: scoreB,
                        status: 'finished'
                    }])
                    .select().single();

                if(matchErr) throw matchErr;

                // B. MATCH_MAPS Tablosuna Haritayı Ekle
                const { data: mapData, error: mapErr } = await window.supabaseClient
                    .from('match_maps')
                    .insert([{
                        match_id: matchData.id,
                        map_name: mapName,
                        score_a: scoreA,
                        score_b: scoreB
                    }])
                    .select().single();

                if(mapErr) throw mapErr;

                // C. OYUNCU İSTATİSTİKLERİNİ TOPLA
                const collectData = (containerId) => {
                    const rows = document.getElementById(containerId).querySelectorAll('.player-stat-row');
                    const stats = [];
                    // index 0 başlık olduğu için atlıyoruz
                    for(let i=1; i<rows.length; i++) {
                        const row = rows[i];
                        stats.push({
                            map_id: mapData.id,
                            user_id: row.querySelector('.user-matcher-select').value || null, 
                            in_game_name: row.querySelector('.ign-input').value || 'Bilinmiyor',
                            agent_name: row.querySelector('.agent-name-input').value || 'unknown',
                            kills: parseInt(row.querySelector('.k-input').value) || 0,
                            deaths: parseInt(row.querySelector('.d-input').value) || 0,
                            assists: parseInt(row.querySelector('.a-input').value) || 0
                        });
                    }
                    return stats;
                };

                const insertData = [...collectData('teamAPlayersInputs'), ...collectData('teamBPlayersInputs')];

                // D. MATCH_PLAYER_STATS Tablosuna Oyuncuları Ekle
                const { error: statsErr } = await window.supabaseClient
                    .from('match_player_stats')
                    .insert(insertData);

                if(statsErr) throw statsErr;

                showNotification("Maç verileri, harita ve K/D/A istatistikleri başarıyla kaydedildi!", "success");
                
            } catch(err) {
                console.error("Kayıt Hatası:", err);
                showNotification("Hata: " + err.message, "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> İSTATİSTİKLERİ KAYDET VE BİTİR';
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', initAdminBracketPage);
    </script>
</body>
</html>
