<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başvurular Sona Erdi | OBB E-SPORTS</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        /* --- BAŞVURU KAPANDI ÖZEL SAYFA TASARIMI --- */
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1; /* Header ve Footer arasını doldurur */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background-image: radial-gradient(circle at center, rgba(96, 29, 194, 0.1) 0%, transparent 70%);
        }

        .closed-box {
            background: #111111;
            border: 1px solid #222;
            border-top: 4px solid var(--neon-mor, #601dc2);
            border-radius: 15px;
            padding: 50px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease forwards;
        }

        .closed-box i.main-icon {
            font-size: 60px;
            color: var(--neon-mor, #601dc2);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(96, 29, 194, 0.4));
        }

        .closed-box h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .closed-box p {
            color: #888888;
            font-size: 16px;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 15px 35px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        /* Yayın Butonu Tasarımı */
        .btn-live {
            background: #ff0000;
            color: white;
            border: 1px solid transparent;
        }

        .btn-live:hover {
            background: #cc0000;
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.5);
            transform: translateY(-3px);
        }

        /* Fikstür Butonu Tasarımı */
        .btn-bracket {
            background: var(--neon-mor, #601dc2);
            color: white;
            border: 1px solid transparent;
        }

        .btn-bracket:hover {
            background: #4a1596;
            box-shadow: 0 5px 20px rgba(96, 29, 194, 0.5);
            transform: translateY(-3px);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .closed-box { padding: 40px 20px; }
            .closed-box h1 { font-size: 24px; }
            .action-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="header-alani"></div>

    <main class="main-content">
        <div class="closed-box">
            <i class="fas fa-lock main-icon"></i>
            <h1>Başvurular Sona Erdi</h1>
            <p>İlk turnuvamız için başvuru süresi dolmuştur. Gösterdiğiniz yoğun ilgi için teşekkür ederiz. Heyecana ortak olmak, eşleşmeleri görmek ve turnuvayı canlı izlemek için aşağıdaki bağlantıları kullanabilirsiniz.</p>
            
            <div class="btn-group">
                <a href="canli.html" class="action-btn btn-live">
                    <i class="fas fa-broadcast-tower"></i> YAYIN
                </a>
                <a href="bracket.html" class="action-btn btn-bracket">
                    <i class="fas fa-sitemap"></i> FİKSTÜR
                </a>
            </div>
        </div>
    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
