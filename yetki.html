<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kullanıcı Yetkilendirme | OBB E-SPORTS</title>
    <link rel="icon" type="image/png" href="img/obblogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <style>
        nav ul li a { cursor: pointer; }
        .active-admin-tab { color: var(--neon-mor) !important; border-bottom: 2px solid var(--neon-mor); padding-bottom: 3px; }
        
        .admin-container { padding: 40px 10%; flex: 1; animation: fadeIn 0.4s ease; display: block; }
        .section-title { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 10px; color: white;}
        .section-title span { color: var(--neon-mor); }
        .header-with-btn { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 10px; }
        .header-with-btn .section-title { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }

        /* ADMIN RÜTBE PANELİ STİLLERİ */
        .user-search-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .user-search-container input { flex: 1; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; font-family: 'Poppins', sans-serif; outline: none; transition: 0.3s; }
        .user-search-container input:focus { border-color: var(--neon-mor); }
        .user-search-container button { background: var(--neon-mor); color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .user-search-container button:hover { box-shadow: 0 0 15px rgba(96,29,194,0.5); }
        
        .user-result-card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .user-result-info strong { display: block; color: white; font-size: 16px; margin-bottom: 5px; }
        .user-result-info span { color: var(--gri-yazi); font-size: 12px; display: block; }
        .role-badge { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .role-admin { background: rgba(96, 29, 194, 0.2); color: var(--neon-mor); border: 1px solid var(--neon-mor); }
        .role-player { background: rgba(255, 255, 255, 0.1); color: #ccc; border: 1px solid #555; }
        
        .action-buttons-role { display: flex; gap: 10px; }
        .btn-make-admin { background: rgba(96, 29, 194, 0.2); color: var(--neon-mor); border: 1px solid var(--neon-mor); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .btn-make-admin:hover { background: var(--neon-mor); color: white; }
        .btn-remove-admin { background: rgba(255, 75, 75, 0.1); color: var(--kirmizi-iptal); border: 1px solid var(--kirmizi-iptal); padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .btn-remove-admin:hover { background: var(--kirmizi-iptal); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ana-siyah); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: var(--neon-mor); }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="margin-bottom: 20px;"></i>
        <h2>Güvenlik Kontrolü Yapılıyor...</h2>
    </div>

    <!-- HEADER -->
    <header class="main-nav" id="mainHeader">
        <a href="index.html" class="logo">OBB <span>ADMIN</span></a>
        <nav>
            <ul>
                <li><a href="index.html">ANA SAYFA</a></li>
                <li><a href="onay.html">ONAY</a></li>
                <li><a href="onayli.html">ONAYLI</a></li>
                <li><a href="takvim.html">TAKVİM <i class="far fa-calendar-alt" style="font-size: 10px; margin-left: 3px;"></i></a></li>
                <li><a href="yetki.html" class="active-admin-tab">YETKİ <i class="fas fa-users-cog" style="font-size: 10px; margin-left: 3px;"></i></a></li>
                <li><a href="admin.html">DİĞER ARAÇLAR <i class="fas fa-cog" style="font-size: 10px; margin-left: 3px;"></i></a></li>
                <li id="authAction"><a href="kayit.html" class="nav-btn">YÜKLENİYOR...</a></li>
            </ul>
        </nav>
    </header>

    <div id="toast-container"></div>

    <main class="admin-container" id="rutbeSection">
        <div class="header-with-btn">
            <h2 class="section-title">YETKİLENDİRME <span>(RÜTBE)</span></h2>
        </div>
        <p style="font-size: 13px; color: var(--gri-yazi); margin-bottom: 20px;">Turnuva yetkilisi atamak veya yetki almak için kullanıcı adıyla arama yapın.</p>
        
        <div class="user-search-container">
            <input type="text" id="adminSearchInput" placeholder="Kullanıcı adı girin...">
            <button onclick="searchUserForAdmin()"><i class="fas fa-search"></i> Ara</button>
        </div>
        
        <div id="adminSearchResult"></div>
    </main>

    <div id="footer-alani"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/bildirimler.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        let currentUser = null;

        async function initPage() {
            try {
                const response = await fetch("components/footer.html");
                if (response.ok) document.getElementById("footer-alani").innerHTML = await response.text();
            } catch(e) {}

            if (typeof checkUserStatus === "function") await checkUserStatus();
            checkAdminAccess();
        }

        async function checkAdminAccess() {
            try {
                if (!window.supabaseClient) throw new Error("Supabase bağlantısı yok.");
                const { data: { user }, error: authError } = await window.supabaseClient.auth.getUser();
                if (authError || !user) throw new Error("Giriş yapılmadı.");
                currentUser = user;

                const { data: profile, error: profileError } = await window.supabaseClient.from('profiles').select('role').eq('id', user.id).single();
                if (profileError || profile.role !== 'admin') throw new Error("Yetkisiz erişim.");

                document.getElementById('loadingScreen').style.display = 'none';

            } catch (err) {
                window.location.replace("index.html"); // Yetkisizse anasayfaya at
            }
        }

        async function searchUserForAdmin() {
            const username = document.getElementById('adminSearchInput').value.trim();
            const resultDiv = document.getElementById('adminSearchResult');
            
            if (!username) {
                showNotification("Lütfen bir kullanıcı adı girin.", "error");
                return;
            }

            resultDiv.innerHTML = '<div style="color: #777; font-size: 13px;">Aranıyor...</div>';

            try {
                const { data, error } = await window.supabaseClient
                    .from('profiles')
                    .select('id, username, role')
                    .ilike('username', username)
                    .single();

                if (error || !data) {
                    resultDiv.innerHTML = '<div style="color: var(--kirmizi-iptal); font-size: 13px; padding: 10px; background: rgba(255,75,75,0.1); border-radius: 5px;">Kullanıcı bulunamadı.</div>';
                    return;
                }

                const roleClass = data.role === 'admin' ? 'role-admin' : 'role-player';
                const roleText = data.role === 'admin' ? 'YÖNETİCİ' : 'OYUNCU';

                let actionButton = '';
                if (data.id === currentUser.id) {
                    actionButton = `<span style="color: #777; font-size: 12px; font-style: italic;">(Bu sensin)</span>`;
                } else if (data.role === 'admin') {
                    actionButton = `<button class="btn-remove-admin" onclick="changeUserRole('${data.id}', 'player')"><i class="fas fa-user-minus"></i> Yetkiyi Al</button>`;
                } else {
                    actionButton = `<button class="btn-make-admin" onclick="changeUserRole('${data.id}', 'admin')"><i class="fas fa-user-check"></i> Admin Yap</button>`;
                }

                resultDiv.innerHTML = `
                    <div class="user-result-card">
                        <div class="user-result-info">
                            <strong>${data.username}</strong>
                            <span class="role-badge ${roleClass}">${roleText}</span>
                        </div>
                        <div class="action-buttons-role">
                            ${actionButton}
                        </div>
                    </div>
                `;

            } catch (err) {
                console.error("Arama hatası:", err);
                showNotification("Arama sırasında bir hata oluştu.", "error");
            }
        }

        async function changeUserRole(targetUserId, newRole) {
            try {
                // Not: Güvenli RLS (Row Level Security) güncellemesi için
                const { error } = await window.supabaseClient.from('profiles')
                    .update({ role: newRole })
                    .eq('id', targetUserId);

                if (error) throw error;

                showNotification(newRole === 'admin' ? "Kullanıcıya başarıyla Admin yetkisi verildi!" : "Kullanıcının Admin yetkisi alındı.", "success");
                searchUserForAdmin(); // Arayüzü güncelle

            } catch (err) {
                console.error("Yetki değiştirme hatası:", err);
                showNotification("Hata: " + (err.message || "Yetki değiştirilirken bir hata oluştu."), "error");
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
